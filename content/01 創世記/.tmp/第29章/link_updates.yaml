- title: 拿鶴
  path: link_folder/人物/拿鶴.md
  summary: 雅各在井旁向哈蘭牧人詢問「拿鶴的孫子拉班」，以確認自己已到母族相關地區。
  relation: 拿鶴在本章作為拉班家族身分的標記，連接雅各尋找母族與亞伯拉罕本族線索。
