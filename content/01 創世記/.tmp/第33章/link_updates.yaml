- title: 巴旦亞蘭
  path: link_folder/地點/巴旦亞蘭.md
  summary: "雅各「從巴旦亞蘭回來」（18節），平安到達迦南地示劍。結束在巴旦亞蘭服事拉班二十年的寄居生涯。"
  relation: "本章標記雅各巴旦亞蘭階段的完全結束，地理與屬靈上都進入應許之地新階段。"
