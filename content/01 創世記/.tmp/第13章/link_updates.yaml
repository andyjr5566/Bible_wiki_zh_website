updates:
- title: 亞伯拉罕之約
  path: link_folder/神學/亞伯拉罕之約.md
  summary: 羅得離開後，神吩咐亞伯蘭向四方觀看，應許把所見之地賜給他和後裔直到永遠，並使後裔如地上塵沙不可數算。
  relation: 第13章擴展第12章的土地與大國應許，又命亞伯蘭縱橫走遍此地；當時他仍以寄居者身分支搭帳棚，尚未實際統治全地。
  sources: [經文, 創世記第十三章註解, 創世記第十三章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第13章.txt, raw_data/ccbiblestudy_CT_genesis_13.txt, raw_data/ccbiblestudy_GT_genesis_13.txt, raw_data/kingcomments_genesis_13.txt, raw_data/biblehub_study_genesis_13.txt]
- title: 帳棚與祭壇
  path: link_folder/主題/帳棚與祭壇.md
  summary: 亞伯蘭回到伯特利與艾之間從前支搭帳棚、築壇之處，再次求告耶和華；後來搬到希伯崙幔利的橡樹旁居住並築壇。
  relation: 本章以帳棚標示亞伯蘭持續遷徙寄居，以祭壇和求告標示他對神應許的敬拜回應；羅得則漸漸移近所多瑪，未記築壇。
  sources: [經文, 創世記第十三章註解, 創世記第十三章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第13章.txt, raw_data/ccbiblestudy_CT_genesis_13.txt, raw_data/ccbiblestudy_GT_genesis_13.txt, raw_data/kingcomments_genesis_13.txt, raw_data/biblehub_study_genesis_13.txt]
- title: 羅得的世俗選擇與後果
  path: link_folder/主題/羅得的世俗選擇與後果.md
  summary: 羅得看見約但河平原水源豐富，選擇全平原向東遷移，住在平原城邑並漸漸把帳棚挪到所多瑪。
  relation: 敘事立即補充所多瑪人罪大惡極，後續第14、19章又記羅得被擄與城市受審判；來源據此評價他的選擇只顧眼前利益。
  sources: [經文, 創世記第十三章註解, 創世記第十三章拾穗, Kingcomments, BibleHub Study]
