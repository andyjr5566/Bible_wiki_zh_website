- title: 神的同在與保護
  path: link_folder/神學/神的同在與保護.md
  summary: '創32章雙重顯現展現神的同在與保護：（1）瑪哈念：雅各「仍舊行路」、神的使者「遇見他」（v.1），雅各看見說「這是神的軍兵」、命名瑪哈念「二軍兵」（v.2）。天軍主動顯現（非夢中、非禱告求得），護衛雅各歸途（詩34:7「耶和華的使者在敬畏祂的人四圍安營」；王下6:17以利沙見火車火馬）。CT/GT：神差天軍護送雅各回迦南，雅各卻仍懼怕以掃（v.7），顯露「忘了神應許、忘了所見天軍」（話中之光）。（2）雅博渡口：神主動來與雅各摔跤（v.24「有一個人來和他摔跤」），對付天然力量（大腿窩），賜新名以色列、賜福、保全性命（v.30「我面對面見了神、性命仍得保全」）。何西阿12:4「與天使摔跤、哭泣懇求」揭示保護方式：神親自介入對付老我、賜新身分。'
  relation: '神的同在與保護貫穿雅各一生：創28:15:15「我與你同在」、創31:5、42「我父親的神與我同在」、創32:1-2瑪哈念天軍、創32:24-30雅博摔跤毗努伊勒、創35:3「苦難日應允我、與我同行的神」、創48:15-16「一生牧養我的神」。本章展示保護的兩面：外在護衛（天軍）與內在對付（摔跤破碎老我），後者更深、更持久（跛腿終身、以色列新身分)。'
