- title: 利未
  path: link_folder/人物/利未.md
  summary: '創世記第34章中，利未作為底拿同母哥哥，與西緬共同策劃執行屠城報復：設計割禮詭計（13-17節），第三日趁男丁疼痛殺盡全城（25-26節），並參與擄掠（27-29節）。對父親責備同聲辯護：「他豈可待我們妹子如同妓女」（31節）。CT、KC一致指出利未西緬行動雖出於家庭榮譽，手段卻屬「血氣之勇、詭詐殘暴」，違背神聖割禮意義與誠信原則。雅各臨終咒詛「利未的怒氣暴烈」（創49:5-7），反而使利未後裔分散在以色列中，後成為祭司支派（出32:26-29），顯出神主權轉化。'
  relation: '本章為利未生平決定性事件：以暴力報復取代神的公義，卻因神主權被轉化為祭司支派的呼召（出32:26-29；申33:8-11）。展現「人意圖謀惡，神卻謀善」（創50:20）的救贖悖論。'
