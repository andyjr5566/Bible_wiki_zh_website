- title: 底拿
  path: link_folder/人物/底拿.md
  summary: '創世記第34章記載底拿（利亞所生）出去見那地女子，被示劍城主之子示劍強暴玷污（1-2節）。此事引發雅各諸子詭計以割禮為條件，西緬利未趁機屠城報復。底拿被留在示劍家中（26節「把底拿從示劍家裡帶出來」），顯示她遭強留不得自由。CT指出底拿約14-15歲，其「出去」有負面含義，暗示離開父母保護；GT引用丁良才、聖經精讀本指出底拿參加示劍拜偶像節期。'
  relation: '本章為底拿生平最詳細記載，展示聖約家庭女兒因缺乏屬靈保護（雅各久居示劍未上伯特利）而遭世俗侵害，進而觸發家族悲劇。'
