- title: 利亞
  path: link_folder/人物/利亞.md
  summary: "利亞與孩子們在行列中間（次於兩使女），到以掃面前下拜。作為雅各首娶卻失寵的妻子，其位置反映雅各家庭的偏愛結構。"
  relation: "本章簡短記載利亞在見以掃時的行動，與創29-31章她爭寵、生育、隨雅各離開拉班的經歷連貫。"
  sources:
