book: 創世記
chapter: 20
updates:
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 亞伯拉罕在基拉耳再次稱撒拉為妹子，使亞比米勒把她取去；真相揭露後他受外邦王責備，最後仍照神吩咐以先知身分代禱。
  relation: 本章同時記錄亞伯拉罕因恐懼重犯欺騙，以及神沒有取消其先知職分；他的禱告成為亞比米勒全家恢復生育的途徑。
  sources: &all_sources
