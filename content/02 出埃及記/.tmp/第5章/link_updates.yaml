- title: 埃及
  path: link_folder/地點/埃及.md
  summary: |
    本章中埃及是壓迫場景的具體展現：法老從王宮發令（v6），百姓被逼「散在埃及遍地撿碎稭當作草」（v12）。埃及在此不再是出4章的地理目的地，而成為殘酷奴役系統的縮影——法老是「埃及王」（v4），督工是埃及人，磚是埃及建築的原料，而以色列人是「這地的賤民」（v5, GT）。
  relation: |
    本章使埃及的神學象徵具體化為社會壓迫機制：法老、督工、官長三層統治；草料政策、磚數要求、責打制度構成壓迫系統。KC將埃及與撒但統治下的世界體系對比：撒但奪取、殺害、毀壞（約10:10），正如法老對以色列人的對待。CT靈訓指出埃及預表「這世界的王」系統——只有加重負擔而不給釋放。
  sources:
