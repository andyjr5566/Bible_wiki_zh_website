book: 創世記
chapter: 17
updates:
- title: 以實瑪利
  path: link_folder/人物/以實瑪利.md
  summary: 神應允亞伯拉罕為以實瑪利所求，賜福使他昌盛、極其繁多，生十二個族長並成為大國；以實瑪利十三歲時與亞伯拉罕全家一同受割禮。
  relation: 以實瑪利蒙受繁衍成國的福分，也領受亞伯拉罕家之約的割禮記號；但本章明確把永遠之約堅定在撒拉所生的以撒及其後裔身上。
  sources:
  - https://biblehub.com/study/genesis/17.htm
  - https://www.kingcomments.com/en/bible-studies/Gen/17
  - https://www.ccbiblestudy.org/Old%20Testament/01Gen/01CT17.htm
