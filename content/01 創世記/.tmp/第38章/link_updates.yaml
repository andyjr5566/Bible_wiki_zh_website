updates:
- title: 猶大（雅各之子）
  path: link_folder/人物/猶大（雅各之子）.md
  summary: 創世記38章中，猶大離開弟兄下到亞杜蘭，娶迦南女子，後來因未將示拉給他瑪而虧負兒婦；在他瑪拿出印、帶子、杖後，他承認「她比我更有義」，並不再與她同寢。
  relation: 本章補足猶大從創37賣約瑟後的道德失敗與轉折起點，顯出他在家庭責任、性倫理與認罪悔改上的關鍵變化。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_38.txt, raw_data/ccbiblestudy_GT_genesis_38.txt, raw_data/kingcomments_genesis_38.txt, raw_data/biblehub_study_genesis_38.txt]
- title: 迦南人
  path: link_folder/人物/迦南人.md
  summary: 猶大離開弟兄後娶一位迦南人的女兒，來源將此視為雅各家在迦南地被婚姻與文化同化的危險例證。
  relation: 本章把迦南人從外部民族背景推進到雅各家內部婚姻，說明聖約族群若不分別，會在家庭與後裔層面受到深刻影響。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_38.txt, raw_data/ccbiblestudy_GT_genesis_38.txt, raw_data/kingcomments_genesis_38.txt, raw_data/biblehub_study_genesis_38.txt]
- title: 神的主權
  path: link_folder/神學/神的主權.md
  summary: 創世記38章充滿猶大、俄南與他瑪事件中的罪與羞辱，但神仍藉法勒斯保存猶大線，使其進入大衛與基督的家譜。
  relation: 本章呈現神的主權不是取消人的罪責，而是在敗壞與悔改交織的歷史中推進救贖應許。
  sources: [GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_GT_genesis_38.txt, raw_data/kingcomments_genesis_38.txt, raw_data/biblehub_study_genesis_38.txt]
- title: 聖約子民與世界的界限
  path: link_folder/神學/聖約子民與世界的界限.md
  summary: 猶大離開弟兄、與亞杜蘭人來往並娶迦南女子，來源以此警戒信徒離開屬靈群體後容易被世界吸引與同化。
  relation: 本章把「界限」問題具體放在婚姻、友誼與家庭後果中，顯明界限失守會影響下一代與整個聖約家族。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_38.txt, raw_data/ccbiblestudy_GT_genesis_38.txt, raw_data/kingcomments_genesis_38.txt, raw_data/biblehub_study_genesis_38.txt]
- title: 婚宴與剪羊毛風俗
  path: link_folder/文化/婚宴與剪羊毛風俗.md
  summary: 猶大喪妻後上亭拿到剪羊毛的人那裡；來源指出剪羊毛常伴隨宴樂與慶典，也使人容易在歡樂與鬆懈中受試探。
  relation: 本章延伸既有剪羊毛風俗主題，顯示此時節不只提供行動時機，也成為猶大被試探與他瑪設計相遇的背景。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_38.txt, raw_data/ccbiblestudy_GT_genesis_38.txt, raw_data/kingcomments_genesis_38.txt, raw_data/biblehub_study_genesis_38.txt]
- title: 申命記7_3-4 禁止與迦南人通婚
  path: link_folder/互文/申命記7_3-4 禁止與迦南人通婚.md
  summary: 猶大娶迦南人的女兒，來源把此事與日後禁止與迦南人通婚的原則相連，因其會帶來信仰與文化同化。
  relation: 本章提供申命記7章禁令的敘事背景之一：問題不只是族群身分，而是婚姻會牽動敬拜、倫理與後裔方向。
  sources: [CT, GT, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_38.txt, raw_data/ccbiblestudy_GT_genesis_38.txt, raw_data/biblehub_study_genesis_38.txt]
