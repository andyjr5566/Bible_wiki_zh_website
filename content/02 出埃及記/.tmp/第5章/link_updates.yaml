- title: 法老
  path: link_folder/人物/法老.md
  summary: |
    本章法老首次出現於敘事中（此前只有4:21-23神的預告）。他面對摩西和亞倫的宣告，回答：「耶和華是誰，使我聽祂的話，容以色列人去呢？我不認識耶和華，也不容以色列人去」（v2）。當天就下令加倍苦待以色列人（v6-9）：扣除草料、不減磚量、斥責懶惰、稱神的應許為「虛謊的言語」。以色列官長哀求時（v15-16），法老連罵「你們是懶惰的！你們是懶惰的！」（v17），拒絕聽任何解釋。
  relation: |
    本章展示法老的真實性格——驕傲、剛硬、蔑視真神、壓迫弱者。KC指出「耶和華是誰」不是尋求認識，而是驕傲的頂峰，肉體不順服神（羅8:7）。CT分析法老非不知道耶和華存在，而是以埃及諸神的優越感蔑視奴隸民族的神。本章也將法老描繪為撒但的預表（KC/CT），其策略——加重擔子使無暇聽真道、扭曲真理（稱神言為虛謊）——正是撒但的模式（約8:44）。
