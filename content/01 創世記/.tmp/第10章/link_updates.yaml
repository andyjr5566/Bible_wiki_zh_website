book: 創世記
chapter: 10
updates:
- title: 閃
  path: link_folder/人物/閃.md
  summary: 閃被稱為希伯子孫之祖；其兒子以攔、亞述、亞法撒、路德、亞蘭的後裔按宗族、方言、地土與邦國分布。
  relation: 閃的家系放在列國表最後，並經希伯、法勒延續到第11章的亞伯蘭家譜；這使列國敘事轉向應許家系。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 含
  path: link_folder/人物/含.md
  summary: 含的兒子是古實、麥西、弗與迦南；其支系涉及埃及、努比亞、迦南及周邊地區，並包括寧錄的國度敘事。
  relation: 第10章顯示含系不是現代單一種族分類；其中迦南與亞摩利等群體的語言在現代語言學中通常歸入閃語族。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 雅弗
  path: link_folder/人物/雅弗.md
  summary: 雅弗的兒孫形成列國表第一支，多與安那托利亞、愛琴海、黑海及更北方的古代民族與海島地區相連。
  relation: 一些傳統註釋把雅弗概括連於歐洲；背景研讀資料則提醒，個別古名與現代國家的直接等同多有不確定性。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 亞述
  path: link_folder/地點/亞述.md
  summary: 第10章在寧錄國度由示拿諸城轉向尼尼微、利河伯、迦拉與利鮮時提到亞述；亞述可作地名，也可在句法上作建城者。
  relation: 本章把亞述地區納入洪水後早期城市與國度發展，並為後來亞述帝國在聖經敘事中的角色預作背景。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 迦南境界由西頓沿基拉耳方向至迦薩，再向所多瑪、蛾摩拉、押瑪、洗扁直到拉沙，勾勒地中海東岸與約旦河谷周邊範圍。
  relation: 這段地理說明把第9章對迦南的宣告落在古代土地與族群中，也預備亞伯拉罕進入迦南的後續敘事。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 生養眾多與治理
  path: link_folder/主題/生養眾多與治理.md
  summary: 洪水後挪亞三子的後裔形成各宗族、方言、地土與邦國，在地上分布，呈現生養眾多並遍滿全地的結果。
  relation: 第10章先給出列國分布的總覽，第11章再敘述人在示拿聚集及神使他們分散的經過，顯出遍滿全地命令的延續。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 挪亞三子神諭的性質
  path: link_folder/解經爭議/挪亞三子神諭的性質.md
  summary: 第10章展開閃、含、雅弗後裔的宗族與地理分布，使第9章的三子神諭進入後續歷史敘事。
  relation: 列國表可作傳統預言解讀的歷史對照，但它列的是古代民族與地區，不能僅憑名稱把每項宣告直接套入現代國家。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 迦南咒詛的種族主義誤用
  path: link_folder/解經爭議/迦南咒詛的種族主義誤用.md
  summary: 第10章列出含的兒子古實、麥西、弗、迦南，並只把迦南支系置於第9章宣告的後續地理背景中。
  relation: 含系包含多個古代地區與語言群體，列國表本身也沒有膚色分類；因此第9章的宣告對象仍須按經文限定為迦南。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 雅弗住在閃的帳棚
  path: link_folder/互文/雅弗住在閃的帳棚.md
  summary: 第10章分別展開雅弗與閃的後裔；雅弗多向海島與北西方分布，閃的家系則經希伯與法勒通往亞伯蘭。
  relation: 這些地理與家譜資料為傳統上將雅弗擴張、住在閃帳棚解作領土接觸或分享應許提供後續敘事背景。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 巴別塔
  path: link_folder/主題/巴別塔.md
  summary: 第10章把巴別列為寧錄國度在示拿地的起頭，並反覆描述列國已有不同方言、宗族、地土與邦國。
  relation: 第11章回述眾人在示拿建城造塔、語言被變亂而分散；第10章提供結果總覽，第11章敘述原因與過程。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第10章.txt, raw_data/ccbiblestudy_CT_genesis_10.txt, raw_data/ccbiblestudy_GT_genesis_10.txt, raw_data/kingcomments_genesis_10.txt, raw_data/biblehub_study_genesis_10.txt]
- title: 寧錄與敵基督
  path: link_folder/互文/寧錄與敵基督.md
  summary: 寧錄被描述為英雄、英勇獵戶及以巴別為國度起頭的人；中文傳統註解與Kingcomments由此發展反叛權勢的預表閱讀。
  relation: 把寧錄連於帖撒羅尼迦後書2章或啟示錄13章屬跨經卷靈意與預表；創世記10章本身沒有稱他為敵基督。
  sources: [經文, 創世記第十章註解, 創世記第十章拾穗, Kingcomments, BibleHub Study]
