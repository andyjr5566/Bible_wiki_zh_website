- title: 以掃
  path: link_folder/人物/以掃.md
  summary: '創32章：雅各派使者往西珥地/以東地見以掃，報告自己在拉班寄居二十年、如今富有牲畜僕婢、不為爭產而來、盼望蒙恩。使者回報以掃帶四百人迎面而來，雅各極懼怕愁煩。雅各備五百八十頭牲畜分五群作解恨之禮，吩咐僕人稱「僕人雅各、主以掃」，盼望藉禮物緩和以掃怒氣、解其恨、容納見面。以掃作為獵人性格（創25:27）、依靠刀劍生活（創27:40），已成為擁有強大戰鬥力的部落族長，四百人顯示報復宣戰而非和解意圖（聖經精讀本）。'
  relation: '雅各與以掃恩怨始於創25:29-34長子名分、創27騙取祝福、創27:41以掃懷恨要殺雅各。本章為二十二年後首次正面對決鋪墊。雅各策略（分隊、禮物、謙稱）反映對以掃性格精準把握（華爾頓：分群遞送消磨銳氣、混雜僕人成人質）。創33章最終和好驗證神對雅各的保護（創32:9-12禱告應驗）。'
  sources: ["CT", "GT", "KC", "BH"]
