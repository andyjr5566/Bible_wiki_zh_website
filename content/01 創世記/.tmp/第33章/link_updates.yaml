- title: 毗努伊勒
  path: link_folder/地點/毗努伊勒.md
  summary: "雅各離開毗努伊勒（創32:31「日出時經過毗努伊勒」）前往見以掃。毗努伊勒經歷（見神面、得新名、大腿扭傷）成為雅各面對以掃勇氣的根基。"
  relation: "本章為毗努伊勒經歷的直接後續行動：雅各帶著「見神面仍存活」的見證、跛行的身體、以色列的新名，去面對二十年的仇敵。"
