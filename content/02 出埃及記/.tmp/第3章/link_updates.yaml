book: 出埃及記
chapter: 3
source_set: &sources [CT, GT, KC, BH]
source_file_set: &source_files [raw_data/ccbiblestudy_CT_exodus_3.txt, raw_data/ccbiblestudy_GT_exodus_3.txt, raw_data/kingcomments_exodus_3.txt, raw_data/biblehub_study_exodus_3.txt]
updates:
- title: 神聽見百姓的哀求
  path: link_folder/神學/神聽見百姓的哀求.md
  summary: 神再次宣告以色列人的哀聲達到祂面前，祂已聽見督工之下的呼喊，也看見埃及人的欺壓。
  relation: 第2章記哀聲上達於神，第3章則把神的聽見展開為下來拯救、差遣摩西與領百姓進入應許地的行動。
  sources: *sources
  source_files: *source_files
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: 摩西牧養葉忒羅羊群到了何烈山，在燃燒卻不燒毀的荊棘前蒙神呼召，受差遣去見法老並領以色列人出埃及。
  relation: 四十年前摩西自行施救失敗，如今使命由神主動發起；神以「我必與你同在」回答他「我是甚麼人」的疑問。
  sources: *sources
  source_files: *source_files
- title: 法老
  path: link_folder/人物/法老.md
  summary: 神差摩西和以色列長老去見埃及王，預告法老不肯容百姓離開，直到神以大能的手和奇事攻擊埃及。
  relation: 法老的抵抗早在摩西回埃及前已被神知道，後續衝突將顯明神的主權不是被法老的剛硬打亂。
  sources: *sources
  source_files: *source_files
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: 神稱受苦的以色列為「我的百姓」，看見、聽見並知道他們的痛苦，差摩西把他們從埃及領出。
  relation: 以色列的民族身分在本章進一步成為與耶和華立約、被祂認領並蒙召事奉祂的百姓身分。
  sources: *sources
  source_files: *source_files
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 神向摩西自稱亞伯拉罕、以撒、雅各的神，並以父祖之神的身分應許領後裔進入迦南。
  relation: 神對亞伯拉罕的應許跨越世代，成為差遣摩西、賜地與拯救以色列的根基。
  sources: *sources
  source_files: *source_files
- title: 以撒
  path: link_folder/人物/以撒.md
  summary: 神自稱以撒的神，與亞伯拉罕、雅各並列，顯明同一盟約在父祖世代間延續。
  relation: 耶穌後來引用本章說神是活人的神；以撒雖已離世，仍在神的盟約與復活盼望中被提名。
  sources: *sources
  source_files: *source_files
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 神自稱雅各的神；正在埃及受苦的民族正是雅各後裔，神要照父祖應許領他們出來。
  relation: 雅各家進埃及的歷史在此轉向出埃及，顯明神沒有因年代久遠而放棄祂給雅各的應許。
  sources: *sources
  source_files: *source_files
- title: 迦南人
  path: link_folder/人物/迦南人.md
  summary: 神應許把以色列領到流奶與蜜之地，並列出迦南人等當地群體。
  relation: 迦南人代表應許地現有居民之一，使「美好寬闊之地」同時帶有未來進入與衝突的歷史現實。
  sources: *sources
  source_files: *source_files
- title: 赫人
  path: link_folder/人物/赫人.md
  summary: 赫人列於神所應許之地的居民名單，與迦南人、亞摩利人等並列。
  relation: 本章延續創世記已出現的赫人背景，將其置於以色列未來承受迦南的應許中。
  sources: *sources
  source_files: *source_files
- title: 亞摩利人
  path: link_folder/人物/亞摩利人.md
  summary: 亞摩利人列於迦南地居民名單，是神應許領以色列前往之地的群體之一。
  relation: 創世記15章曾提亞摩利人的罪孽尚未滿盈，本章則宣告以色列將離開埃及、走向那地。
  sources: *sources
  source_files: *source_files
- title: 希未人
  path: link_folder/歷史/希未人.md
  summary: 希未人列於應許地六族名單，是以色列將要進入之地的既有居民。
  relation: 本章的群體列表提供迦南並非空地的背景，也預告後續征服與立約警告。
  sources: *sources
  source_files: *source_files
- title: 耶布斯人
  path: link_folder/人物/耶布斯人.md
  summary: 耶布斯人是本章應許地居民名單的最後一族，後來與耶路撒冷地區密切相關。
  relation: 其列名把父祖所得的賜地應許推向以色列全族日後進入迦南的歷史。
  sources: *sources
  source_files: *source_files
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 神看見埃及人欺壓以色列，宣告要下來拯救，並預告以奇事攻擊埃及，使百姓蒙恩且不空手離去。
  relation: 埃及在本章既是奴役之地，也是神將公開施行審判與救贖、顯明自己聖名的舞台。
  sources: *sources
  source_files: *source_files
- title: 耶和華的使者
  path: link_folder/神學/耶和華的使者.md
  summary: 耶和華的使者在荊棘火焰中向摩西顯現，隨後敘事直接說耶和華與神從荊棘中呼叫並說話。
  relation: 使者與耶和華／神之間緊密而交疊的表達，是理解舊約神顯現與使者身分的重要經文。
  sources: *sources
  source_files: *source_files
- title: 耶和華的使者是否為神顯現
  path: link_folder/解經爭議/耶和華的使者是否為神顯現.md
  summary: 第2節稱耶和華的使者顯現，第4節起卻由耶和華與神直接說話；來源因此有神顯現、受差使者及基督預顯等不同理解。
  relation: 本章支持使者以神權柄說話的特殊身分，但「必然是道成肉身前的基督」屬基督教神學推論，不是經文直接命名。
  sources: *sources
  source_files: *source_files
- title: 神的同在
  path: link_folder/神學/神的同在.md
  summary: 摩西問自己何能去見法老，神沒有列舉摩西資格，而是應許「我必與你同在」，並以日後在何烈山事奉為證據。
  relation: 差遣的充分根基不在摩西自我能力，而在差遣者的同在；這也反轉他四十年前憑己力施救的方式。
  sources: *sources
  source_files: *source_files
- title: 神的記念
  path: link_folder/神學/神的記念.md
  summary: 神啟示自己是父祖的神，並說「耶和華」是祂直到永遠的名、直到萬代的記念。
  relation: 第2章神記念盟約而採取行動，第3章則把「記念」連到祂永恆的聖名與世代相傳的身分。
  sources: *sources
  source_files: *source_files
