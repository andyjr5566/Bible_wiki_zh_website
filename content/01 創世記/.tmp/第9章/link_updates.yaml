book: 創世記
chapter: 9
updates:
- title: 挪亞之約
  path: link_folder/神學/挪亞之約.md
  summary: 神與挪亞、他的兒子與後裔，以及一切活物堅立永約，應許不再以洪水滅絕凡有血肉者或毀壞地，並以虹作記號。
  relation: 第9章完整展開第6章18節初次宣告的約；約由神主動承擔，涵蓋人類與受造界，使洪水後世界能在穩定秩序中延續。
- title: 血的尊重
  path: link_folder/神學/血的尊重.md
  summary: 神准許人以動物為食，卻禁止吃帶血的肉，並宣告人或獸若流人血，神必追討。
  relation: 本章把血與生命相連，表明人雖獲得使用動物的權利，生命終極仍屬於神，不可任意吞吃或殺害。
- title: 人的尊嚴與神的形像
  path: link_folder/神學/人的尊嚴與神的形像.md
  summary: 神以「神造人是照自己的形像造的」作禁止殺人及追討流血之罪的理由。
  relation: 洪水與人的墮落沒有抹去受造形像；每個人的生命仍具有源於神的尊嚴，傷害人也冒犯造人的神。
- title: 罪性的持續
  path: link_folder/神學/罪性的持續.md
  summary: 蒙拯救且被稱為義人的挪亞在新世界栽葡萄園後醉酒赤身，家庭隨即出現羞辱與分裂。
  relation: 洪水處理了敗壞世界，卻沒有從人心除去罪；挪亞的失敗表明新的外在環境本身不能造出無罪新人類。
- title: 虹
  path: link_folder/主題/虹.md
  summary: 神把虹放在雲彩中，作祂與地、挪亞後裔及各樣活物之永約記號；神看見虹便記念不再以洪水滅絕凡有血肉者。
  relation: 虹把可能帶來恐懼的雲彩轉成神信實的可見保證；原文也可指弓，使武器形象轉為和平記號。
- title: 遮蓋與宣揚
  path: link_folder/主題/遮蓋與宣揚.md
  summary: 含看見父親赤身便到外邊告訴兄弟；閃和雅弗則倒退進帳棚，用衣服遮蓋父親而不觀看其赤身。
  relation: 本章以兩種反應對照如何面對他人羞恥：來源強調尊重與愛的遮蓋，同時不把遮蓋誤解為對持續罪行一概噤聲。
- title: 挪亞與亞當的平行
  path: link_folder/互文/挪亞與亞當的平行.md
  summary: 挪亞像亞當一樣領受生養眾多、遍滿地面及管理活物的使命，卻也在所栽種的果實前失去節制並顯露赤身。
  relation: 平行顯明洪水後是新開始卻不是全新無罪創造；祝福與使命延續，罪與羞恥也再次進入家庭。
- title: 基督徒是否可吃血
  path: link_folder/解經爭議/基督徒是否可吃血.md
  summary: 創世記9章4節在摩西律法以前禁止吃帶血的肉；使徒行傳15章20、29節又要求外邦信徒禁戒血與勒死的牲畜。
  relation: 爭議在於新約命令是持續的普世倫理、為生命神聖所作的規範，或為猶太與外邦信徒相交所作的牧養安排；本章提供討論的早期經文根基。
- title: 為何咒詛迦南而非含
  path: link_folder/解經爭議/為何咒詛迦南而非含.md
  summary: 犯錯者在敘事中是含，挪亞醒後卻宣告「迦南當受咒詛」；來源提出迦南可能涉事、父罪影響後裔或神諭預示迦南後來惡行等解釋。
  relation: 經文沒有明說選擇迦南的原因，故各說應保留為解釋而非定論；此咒詛更不可擴張到含的所有後裔或現代族群。
- title: 閃
  path: link_folder/人物/閃.md
  summary: 閃與雅弗拒絕觀看挪亞的赤身，共同倒退進入帳棚遮蓋父親；挪亞後來稱頌「耶和華─閃的神」。
  relation: 第9章把閃的尊重行動與其特殊神諭相連，為第10至12章由閃的家系轉向亞伯拉罕作預備。
- title: 含
  path: link_folder/人物/含.md
  summary: 含看見父親挪亞赤身，便到外邊告訴閃與雅弗；本章四次以他是迦南之父的關係鋪陳後續咒詛。
  relation: 經文責任焦點在含如何處理父親的羞恥，但挪亞點名咒詛的是迦南，不能把它擴張成含所有後裔的咒詛。
- title: 雅弗
  path: link_folder/人物/雅弗.md
  summary: 雅弗與閃一同倒退遮蓋挪亞；挪亞祝願神使雅弗擴張，使他住在閃的帳棚裡。
  relation: 「擴張」與雅弗名字形成文字呼應；來源又以住在閃帳棚解作分享閃的福分，並作外邦人同得應許的互文。
- title: 人的全面敗壞
  path: link_folder/神學/人的全面敗壞.md
  summary: 洪水後的人仍需以刑罰約束流血暴力，連義人挪亞也會醉酒失控，家庭隨即出現羞辱與分裂。
  relation: 第9章證實外在審判和更新環境沒有除去罪性；世界得保存不是因人心已改善，而是因神守約施憐憫。
- title: 無條件之約
  path: link_folder/神學/無條件之約.md
  summary: 神主動與挪亞後裔及一切活物堅立永約，獨自承擔不再以洪水滅絕一切有血肉者的應許。
  relation: 本章沒有把約的保全繫於人或動物先完成某項義務，虹只作應許的記號，而不是人取得約的功德。
- title: 洪水後自然秩序的保存
  path: link_folder/神學/洪水後自然秩序的保存.md
  summary: 第9章的不再以洪水毀滅之約，使第8章稼穡、寒暑、冬夏、晝夜繼續運作的應許得到正式立約保障。
  relation: 自然秩序的穩定與挪亞之約相連，惠及全人類及一切活物，不以受造物的道德表現作交換條件。
- title: 神的記念
  path: link_folder/神學/神的記念.md
  summary: 神宣告虹出現在雲彩中時，祂看見便記念與人類和一切有血肉活物所立的永約。
  relation: 「記念」不是神曾忘記，而是以擬人化約語保證祂必按應許行動，不再讓水成為滅絕一切活物的洪水。
- title: 赤身露體與羞恥
  path: link_folder/神學/赤身露體與羞恥.md
  summary: 挪亞醉酒後在帳棚內赤身，含把所見告訴弟兄，閃與雅弗則背臉遮蓋父親。
  relation: 本章延續亞當犯罪後赤身與羞恥的主題，也以三子的不同反應呈現宣揚羞恥和保護尊嚴的對照。
- title: 生養眾多與治理
  path: link_folder/主題/生養眾多與治理.md
  summary: 神賜福挪亞和兒子，要他們生養眾多、遍滿地面，並把走獸、飛鳥、昆蟲與魚交在他們手中。
  relation: 第9章重申創1章使命，卻加入動物驚恐及可作食物的洪水後條件，顯示使命延續而受造關係已改變。
- title: 創世記9章洪水後准吃肉
  path: link_folder/互文/創世記9章洪水後准吃肉.md
  summary: 神把一切活著的動物賜作食物，如同先前所賜的菜蔬，但禁止吃仍帶生命之血的肉。
  relation: 本章是吃肉的明確准許，不是強迫每個人吃肉；飲食權利同時受生命屬神與不可吃血的限制。
- title: 洪水範圍的爭論
  path: link_folder/解經爭議/洪水範圍的爭論.md
  summary: 神應許不再讓洪水滅絕一切有血肉者或毀壞地；這不排除後世地區性洪災。
  relation: 約的措辭指向不重演創7至9章所描述的毀滅事件，但本章本身沒有用現代地理術語重新裁定原洪水的全球或地區範圍。
