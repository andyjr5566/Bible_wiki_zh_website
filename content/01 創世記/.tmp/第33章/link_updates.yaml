- title: 以掃
  path: link_folder/人物/以掃.md
  summary: "以掃帶四百人來迎雅各，卻跑前擁抱、親嘴、雙雙流淚，稱雅各「兄弟」（與雅各稱「我主」強烈對比）；說「我的已經夠了」拒收禮物，後在雅各堅持下收下；提議同行並前導，又提議留人保護，雅各皆拒；當日起行回西珥。以掃的態度反映神已改變其心（箴21:1），但來12:16稱其為「貪戀世俗的人」。"
  relation: "本章完成創27:41以掃懷恨要殺雅各的線索，見證神主權使仇敵與人和好（箴16:7）。以掃展現慷慨寬恕，但屬世俗生命本質未變（未問神、稱滿足、非屬靈領袖）。"
  sources:
  - CT
  - GT
  - KC
  - BH
  source_files:
