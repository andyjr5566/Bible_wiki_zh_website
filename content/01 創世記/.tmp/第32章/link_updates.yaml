- title: 雅各
  path: link_folder/人物/雅各.md
  summary: '創32章：雅各離開巴旦亞蘭返回迦南途中，在瑪哈念遇見神的使者（天軍顯現），得知以掃帶四百人來迎而極懼怕愁煩，將隊伍分為兩隊自保；隨後向神禱告，引用神的吩咐與應許（創31:3；28:13-15），承認不配蒙恩、數算二十年來神的慈愛誠實（只拿杖過約旦河、如今成兩隊），懇求神救脫離以掃之手，持定「後裔如海沙」的應許。當夜在雅博渡口獨自留下，與神（耶和華的使者＝道成肉身前的基督）摔跤至黎明，大腿窩被摸扭傷，堅持不放手除非得祝福，神將其名從「雅各」（奪取者）改為「以色列」（與神較力得勝者），雅各命名該地為毗努伊勒（神之面），見神面對面而性命保全，日出時跛行過河。何西阿12:3-4 解釋摔跤本質為「哭泣懇求」的禱告爭戰。'
  relation: '本章為雅各生命關鍵轉折：從靠詭詐謀算（分隊、重禮求和）轉為單單倚靠神（禱告、摔跤求福），大腿扭傷成為終身記號，預表「軟弱時剛強」（林後12:10）。呼應創28:12-15伯特利異象、創31:3神命令回鄉、創31:42「敬畏以撒的神」守護。'
  sources: ["CT", "GT", "KC", "BH"]
