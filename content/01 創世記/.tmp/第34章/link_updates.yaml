- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: '創世記第34章中，迦南地作為事件背景：雅各全家居住示劍（迦南中部），底拿出去見「那地的女子」（1節），示劍為「那地的主」（2節），哈抹邀雅各「同住、做買賣、置產業」（10節），雅各擔心「在迦南人和比利洗人中有了臭名」（30節）。BH詳細解經指出迦南地為神應許亞伯拉罕之地（創12:7），示劍地處以巴路山基利心山間，為古代交通要衝。哈抹提議「地都在你們面前」（10節）實則試圖以地利誘惑聖約族群妥協同化。GT引用華爾頓指出迦南諸城邦政治結構：示劍為城邦國家，哈抹為王/族長。'
  relation: '本章展示聖約族群在應許之地面對迦南文化滲透的屬靈爭戰：雅各久居示劍（創33:18）未上伯特利，導致家庭邊界模糊，底拿事件成為神管教雅各回歸伯特利（創35:1）的催化劑。'
