book: 創世記
chapter: 5
updates:
- title: 亞當
  path: link_folder/人物/亞當.md
  summary: 亞當的後代記錄從他開始；經文回顧神照自己的樣式造人，並記亞當一百三十歲生塞特、共活九百三十歲就死了。
  relation: 亞當在本章既是家譜起點，也是墮落後人類死亡命運的代表；塞特按亞當自己的形像樣式而生，顯明罪與死已進入人類承傳。
  sources: [經文, CT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 塞特
  path: link_folder/人物/塞特.md
  summary: 塞特在亞當一百三十歲時出生，是亞當按自己形像樣式所生的兒子；他一百零五歲生以挪士，共活九百一十二歲。
  relation: 塞特在本章承接亞伯被殺後神另立的後裔線，與該隱線形成對比，成為通往挪亞並最終通往救贖歷史的家譜支線。
  sources: [經文, CT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 以挪士
  path: link_folder/人物/以挪士.md
  summary: 以挪士是塞特的兒子，九十歲生該南，共活九百零五歲；其名字有軟弱、必死的人之意。
  relation: 以挪士在第4章已連於求告耶和華名的開始，在第5章則進入塞特線家譜，凸顯敬虔線在死亡陰影下延續。
  sources: [經文, CT, GT, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 該南
  path: link_folder/人物/該南.md
  summary: 該南是以挪士的兒子，七十歲生瑪勒列，共活九百一十歲；來源記其名可作得業者，也有與該隱之名相近的討論。
  relation: 該南在本章維持塞特家譜的連續性；其名字含義被 CT 用於屬靈歷程，指向追求基督作產業。
  sources: [經文, CT, GT, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 瑪勒列
  path: link_folder/人物/瑪勒列.md
  summary: 瑪勒列是該南的兒子，六十五歲生雅列，共活八百九十五歲；名字可解作神的稱讚。
  relation: 瑪勒列是亞當到挪亞十代中的第五代，來源以其名義連於蒙神喜悅與稱讚的屬靈歷程。
  sources: [經文, CT, GT, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 雅列
  path: link_folder/人物/雅列.md
  summary: 雅列是瑪勒列的兒子，一百六十二歲生以諾，共活九百六十二歲；名字有卑下、向下流出等解釋。
  relation: 雅列作為以諾的父親，把家譜推向本章最重要的例外人物；來源也以其名字說明謙卑與蒙恩的屬靈次序。
  sources: [經文, CT, GT, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 以諾
  path: link_folder/人物/以諾.md
  summary: 以諾六十五歲生瑪土撒拉後與神同行三百年，共活三百六十五歲；神將他取去，他就不在世了。
  relation: 以諾是第5章死亡副歌中的唯一例外；來源都把他視為因信與神同行、蒙神喜悅、未經死亡被神接去的人，並連到希伯來書11章與猶大書。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 瑪土撒拉
  path: link_folder/人物/瑪土撒拉.md
  summary: 瑪土撒拉是以諾的兒子，一百八十七歲生拉麥，共活九百六十九歲，是聖經記載最長壽的人。
  relation: 本章來源特別把瑪土撒拉名字與洪水年代連起來：187 加 182 加挪亞六百歲時洪水來到，正好是 969 年，顯出審判前神長久忍耐。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 拉麥（塞特族）
  path: link_folder/人物/拉麥（塞特族）.md
  summary: 塞特族拉麥是瑪土撒拉的兒子，一百八十二歲生挪亞，共活七百七十七歲；他為挪亞命名時說兒子必安慰人脫離咒詛地的勞苦。
  relation: 本章把塞特族拉麥的渴望之言與該隱族拉麥的自誇之言形成對比；他盼望安息，卻也顯示真正安息需經審判與神的救恩而來。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 挪亞
  path: link_folder/人物/挪亞.md
  summary: 挪亞在第5章被介紹為拉麥的兒子，名字與安息、安慰相連；五百歲時生閃、含、雅弗。
  relation: 第5章使挪亞在洪水敘事前登場，將亞當到挪亞的家譜收束到神將藉以保存人類的代表人物；來源也把他與審判中蒙保守的預表相連。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 閃
  path: link_folder/人物/閃.md
  summary: 閃是挪亞三子之一，名字有名、名聲之意；第5章只在結尾介紹他與含、雅弗同為挪亞後裔。
  relation: 閃在本章被列在三子之首，來源指出這與後續亞伯拉罕、以色列以及基督家譜的路線有關；其出生順序則需按創世記11章再細辨。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 含
  path: link_folder/人物/含.md
  summary: 含是挪亞三子之一，名字有熱、溫暖之意；第5章在挪亞五百歲生三子時介紹他。
  relation: 含在本章只作洪水後列國分布的伏筆，與閃、雅弗一同標示新世界將由挪亞三子展開。
  sources: [經文, CT, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 雅弗
  path: link_folder/人物/雅弗.md
  summary: 雅弗是挪亞三子之一，名字有擴張、增大、美好之意；第5章在結尾與閃、含同列。
  relation: 雅弗在本章作洪水後民族分布的伏筆；來源也提到他的出生順序可能早於閃，需由創世記10至11章綜合判斷。
  sources: [經文, CT, GT, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 形像與樣式
  path: link_folder/神學/形像與樣式.md
  summary: 第5章回顧神造人時照自己的樣式造，又記亞當生塞特時是照亞當自己的形像樣式而生。
  relation: 本章使形像與樣式從創造論延伸到墮落後承傳：人仍有受造尊貴，卻也承受亞當犯罪後的死亡處境。
  sources: [經文, CT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 死亡的普遍性
  path: link_folder/神學/死亡的普遍性.md
  summary: 第5章重複八次「就死了」，即使洪水前先祖長壽，也無人能逃過死亡，唯有以諾成為例外。
  relation: 本章直接展示創世記2章17節警告的後果；來源把重複的死亡句式稱為喪鐘，並連到羅馬書5章、6章對罪與死的說明。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 與神同行
  path: link_folder/神學/與神同行.md
  summary: 以諾生瑪土撒拉後與神同行三百年；第24節再次重複這句，並以神將他取去作結。
  relation: 本章使與神同行成為死亡陰影中的生命見證；來源說明這是信心、順服、與神交通的生活，且不排斥家庭與日常責任。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
- title: 洪水前先祖名字含義
  path: link_folder/原文/洪水前先祖名字含義.md
  summary: CT 以第5章十代先祖名字串連屬靈歷程：從亞當的屬土，到塞特的新生命、以挪士的軟弱、以諾的學習、挪亞的安息。
  relation: 此條目在本章提供名字含義的整理框架，但應作來源提供的靈訓線索，不取代經文家譜本身的歷史與神學重點。
  sources: [CT]
  source_files: [raw_data/ccbiblestudy_CT_genesis_5.txt]
- title: 安慰與安息
  path: link_folder/主題/安慰與安息.md
  summary: 拉麥給兒子起名挪亞，盼望他在耶和華咒詛地所帶來的操作與勞苦中安慰人；挪亞名字與安息、安慰相近。
  relation: 本章把安息盼望放在咒詛地與死亡副歌之中；來源指出挪亞不能終極成就此安息，真正安息須由神藉救恩帶來。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第5章.txt, raw_data/ccbiblestudy_CT_genesis_5.txt, raw_data/ccbiblestudy_GT_genesis_5.txt, raw_data/kingcomments_genesis_5.txt, raw_data/biblehub_study_genesis_5.txt]
