book: 出埃及記
chapter: 5
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: |
    本章記錄摩西和亞倫第一次到法老面前傳達神的命令（v1-3）。法老藐視拒絕後，摩西目睹百姓被加倍苦待、工頭挨打、官長向他抱怨（v20-21）。摩西在挫折中回到神面前，發出三次哀問：「你為什麼苦待這百姓呢？為什麼打發我去呢？…你一點也沒有拯救他們。」（v22-23）。
  relation: |
    本章是摩西從出4章順從的高峰跌入挫折的深谷。他首次經歷「順服神反而使情況更糟」的信仰考驗。KC指出摩西此時眼目從神身上轉移到百姓反應上，期待被感激卻遭敵意，大失所望。他對神的哀訴是真實的信仰掙扎——不是不信，而是在黑暗中期盼理解。本章結束時摩西仍在神面前（v22），表明他未放棄與神的關係，只是尚未學會定睛於差遣者而非結果。
