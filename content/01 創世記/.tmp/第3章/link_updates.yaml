book: 創世記
chapter: 3
updates:
- title: 亞當
  path: link_folder/人物/亞當.md
  summary: 亞當聽從妻子的話，吃了神禁止的果子；他受神審問時推諉責任，並在判決後給妻子起名叫夏娃。
  relation: 本章顯明亞當作受託者與代表者的失敗，死亡、勞苦與地受咒詛都因他的悖逆進入人的處境。
- title: 夏娃
  path: link_folder/人物/夏娃.md
  summary: 夏娃與蛇對話，對神的話作了減少、增添與削弱，隨後見果子可喜愛便摘下吃，又給丈夫吃。
  relation: 本章正式給出夏娃之名；她既是受騙者，也是眾生之母，承接女人後裔應許中的生命盼望。
- title: 伊甸
  path: link_folder/地點/伊甸.md
  summary: 伊甸園從神人相交、生命樹所在之地，變成犯罪後人躲避神、最後被逐出的地點。
  relation: 本章說明伊甸不只是創造祝福的園子，也是人因罪失去神同在與生命樹通路的場景。
- title: 耶和華神的名字
  path: link_folder/神學/耶和華神的名字.md
  summary: 本章持續使用「耶和華神」，顯示創造主也是主動呼喚、審問、判決並預備遮蓋的立約之神。
  relation: 這名稱貫穿墮落敘事，使神的主權、聖潔、公義與恩典都在同一位神身上顯明。
- title: 蛇
  path: link_folder/人物/蛇.md
  summary: 蛇比田野活物更狡猾，藉質疑神的話引誘女人；神未詢問牠，直接宣告咒詛與女人後裔的得勝。
  relation: 本章把蛇呈現為撒但使用的媒介，也讓牠成為試探、欺騙與神審判的核心角色。
- title: 試探的本質
  path: link_folder/神學/試探的本質.md
  summary: 蛇的試探先扭曲神的命令，再否認死亡後果，最後以「如神知道善惡」刺激人的驕傲。
  relation: 本章提供試探的基本模式：懷疑神的話、懷疑神的美意、追求脫離神的自主智慧。
- title: 神的命令與自由意志
  path: link_folder/主題/神的命令與自由意志.md
  summary: 人在可以吃園中樹果的豐富允許中，面對不可吃分別善惡樹的命令，卻選擇越界。
  relation: 本章顯明自由不是脫離神命令的自主，而是在信靠神話語中持守生命。
- title: 分別善惡的樹
  path: link_folder/神學/分別善惡的樹.md
  summary: 分別善惡樹成為試探焦點；人吃後眼睛明亮，卻不是得著神聖智慧，而是經歷羞恥、罪咎與死亡。
  relation: 本章展示這樹作為神設立界限與人選擇悖逆的試驗點。
- title: 罪的起源（創世記3章）
  path: link_folder/神學/罪的起源（創世記3章）.md
  summary: 罪從人受蛇欺騙、懷疑神的話、追求如神的自主開始，最後藉摘取與吃果子成為實際悖逆。
  relation: 本章是全書罪論的敘事根基，說明罪不是物質本身的問題，而是受造者不信並違背神。
- title: 罪的後果（創世記3章）
  path: link_folder/神學/罪的後果（創世記3章）.md
  summary: 犯罪後立刻出現羞恥、害怕、躲避神、推諉責任，並帶來生產苦楚、婚姻張力、土地咒詛、勞苦與死亡。
  relation: 本章將罪的後果擴展到人與神、自己、配偶、土地和生命樹通路的全部關係。
- title: 死的三層
  path: link_folder/神學/死的三層.md
  summary: 人沒有立刻肉身死亡，卻立刻與神隔絕、陷入羞恥與恐懼，並被宣告終必歸於塵土。
  relation: 本章說明神「必定死」的警告包括屬靈隔絕、肉身死亡與若無救贖將持續的死亡狀態。
- title: 赤身露體與羞恥
  path: link_folder/神學/赤身露體與羞恥.md
  summary: 犯罪前赤身露體不羞恥；犯罪後二人知道自己赤身露體，便用無花果葉編裙遮蓋。
  relation: 本章顯示罪使人的身體意識、良心與關係都被羞恥扭曲，需要神所預備的遮蓋。
- title: 推諉罪責
  path: link_folder/神學/推諉罪責.md
  summary: 亞當把責任推給女人並間接責怪神，女人又把責任推給蛇；二人都未直接承認自己的罪。
  relation: 本章顯明罪不只使人犯罪，也使人逃避光照、掩飾自己並破壞彼此關係。
- title: 女人的後裔
  path: link_folder/神學/女人的後裔.md
  summary: 神宣告蛇與女人、蛇的後裔與女人的後裔彼此為仇，女人的後裔要傷蛇的頭，蛇要傷他的腳跟。
  relation: 本章在審判中給出救贖應許，成為基督勝過撒但與死亡的最初福音預告。
- title: 生命樹
  path: link_folder/神學/生命樹.md
  summary: 人犯罪後被阻止再摘生命樹果子，免得以墮落狀態永遠活著；生命樹道路被把守。
  relation: 本章使生命樹從可親近的生命供應，轉為被隔絕的永生標記，也預備日後恢復的盼望。
- title: 無花果葉與皮衣
  path: link_folder/神學/無花果葉與皮衣.md
  summary: 人用無花果葉遮蓋羞恥，神則用皮子作衣服給他們穿，顯明人的自救與神的供應不同。
  relation: 本章以兩種遮蓋對比人的行為不足與神藉犧牲預備遮蓋的恩典。
- title: 你在那裡
  path: link_folder/主題/你在那裡.md
  summary: 神呼喚那人「你在那裡」，不是因不知道位置，而是主動尋找並引導人面對自己的狀態。
  relation: 本章顯明犯罪的人躲避神，神卻以問題開始審問與挽回。
- title: 用肚子行走，終身吃土
  path: link_folder/原文/用肚子行走，終身吃土.md
  summary: 神宣告蛇要用肚子行走、終身吃土；來源指出這表明極深降卑、衰敗與蒙羞。
  relation: 本章中蛇的咒詛不只是動物狀態的改變，也象徵撒但及其工作終要被貶低。
- title: 荊棘與蒺藜
  path: link_folder/主題/荊棘與蒺藜.md
  summary: 地因亞當受咒詛，長出荊棘和蒺藜；來源將其看作受咒詛與生活艱難的表號。
  relation: 本章把人的罪與土地的抗拒相連，也為基督戴荊棘冠冕承擔咒詛的互文提供背景。
- title: 汗流滿面才得糊口
  path: link_folder/原文/汗流滿面才得糊口.md
  summary: 亞當必汗流滿面才得糊口，直到歸於塵土；勞苦成為墮落後人維生的常態。
  relation: 本章將工作從伊甸中的修理看守，轉為受咒詛土地上的辛苦求食。
- title: 眾生之母
  path: link_folder/神學/眾生之母.md
  summary: 亞當給妻子起名叫夏娃，因她是眾生之母；來源指出這顯示他對女人後裔應許仍有信心。
  relation: 本章在死亡判決後出現生命之名，使夏娃的命名成為審判中的盼望記號。
- title: 皮衣與血祭
  path: link_folder/神學/皮衣與血祭.md
  summary: 神用皮子作衣服給亞當和妻子穿；來源多指出皮子意味牲畜被殺，預表藉流血而有遮蓋。
  relation: 本章顯明神在判決中仍供應恩典，人的羞恥不能靠樹葉解決，需要神所預備的遮蓋。
- title: 基路伯與火劍
  path: link_folder/神學/基路伯與火劍.md
  summary: 神在伊甸園東邊安設基路伯和四面轉動發火焰的劍，把守生命樹道路。
  relation: 本章以基路伯與火劍顯明神的榮耀、聖潔與公義，也顯示罪人不能憑自己返回生命樹。
