book: 創世記
chapter: 44
updates:
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: 約瑟命家宰把銀杯放入便雅憫口袋，追上兄弟並指控偷杯；他只准其餘兄弟離去，以此查驗他們會否再次棄下父親所愛的兒子。
  relation: 銀杯試驗把兄弟帶回類似多坍事件的抉擇，直到猶大願代替便雅憫作奴僕，約瑟才確認他們已改變。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 猶大（雅各之子）
  path: link_folder/人物/猶大（雅各之子）.md
  summary: 猶大代表兄弟承認神已查出他們的罪孽，向約瑟詳述父親與便雅憫生命相連，最後請求自己代替便雅憫作奴僕。
  relation: 昔日提議賣約瑟為奴的猶大，如今願為弟弟失去自由，並把父親的哀痛置於自己的利益之前。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 便雅憫
  path: link_folder/人物/便雅憫.md
  summary: 約瑟的銀杯被暗放在便雅憫口袋中，使他面臨獨自作奴僕的判決。兄弟們沒有棄下他，猶大更願代替他受罰。
  relation: 便雅憫在試驗中是無辜卻被指控的人；他使哥哥們有機會證明自己不再因父親的偏愛而傷害弟弟。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 雅各本人沒有出場，卻是猶大代求的中心。猶大說雅各的命與便雅憫的命相連，若再失去兒子，必悲悲慘慘地下陰間。
  relation: 雅各先前失去約瑟的哀痛成為兄弟是否真正悔改的衡量：他們如今不願再次以父親的痛苦換取自身安全。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 雅各眾子離開埃及城不遠便因銀杯被追回，重新回到約瑟屋中受審；猶大在埃及官員面前提出代替便雅憫為奴的請求。
  relation: 埃及在本章同時是司法權力與家族復和試驗的場域。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 兄弟以自己曾從迦南地帶回口袋銀子，作為不可能偷取銀杯的證據；猶大的代求則反覆指向在迦南等待的父親。
  relation: 回到迦南不再只是旅程終點，而取決於兄弟是否能把便雅憫平安帶回。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 對兄弟的試驗
  path: link_folder/神學/對兄弟的試驗.md
  summary: 銀杯事件讓兄弟可把便雅憫留為奴僕而自行平安回家，重現他們昔日犧牲約瑟、欺騙父親的選擇。
  relation: 兄弟一同回城，猶大願代替便雅憫，表明他們不再棄下弟弟；試驗由此達到目的。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 猶大的認罪與悔改
  path: link_folder/神學/猶大的認罪與悔改.md
  summary: 猶大不為偷杯一事強辯，承認神已查出眾人的罪孽；他信守作保承諾，請求代替便雅憫作奴僕。
  relation: 悔改在本章表現為承認往罪、體恤父親、保護弟弟並承擔實際代價，而不只是一番言詞。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 悔改與良心的覺醒
  path: link_folder/神學/悔改與良心的覺醒.md
  summary: 兄弟明知自己未偷銀杯，仍把當前危機理解為神查出舊日罪孽；他們不再各自逃生，而願和便雅憫共同作奴僕。
  relation: 良心使他們越過眼前指控，面對多年未處理的罪；行為上的團結則證明悔改已有結果。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 約瑟的夢（應驗）
  path: link_folder/神學/約瑟的夢（應驗）.md
  summary: 猶大和弟兄回到約瑟屋中，再次在他面前俯伏於地。
  relation: 這是約瑟故事中兄弟第三次向他下拜；夢的應驗已完整，約瑟卻仍把重點放在家族關係能否恢復。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 古代近東的作保制度
  path: link_folder/文化/古代近東的作保制度.md
  summary: 猶大引用自己向父親所作的保證，並請求實際留下作奴僕，以換取受保的便雅憫回家。
  relation: 本章顯示作保不是抽象承諾；擔保人必須在危機發生時承擔受保人的後果。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
- title: 陰間（Sheol）
  path: link_folder/原文/陰間（Sheol）.md
  summary: 猶大兩次說，若便雅憫不能回去，兄弟們將使年老的父親白髮蒼蒼、悲悲慘慘地下陰間。
  relation: 此處的陰間與死亡相連，表達雅各將因喪子之痛悲慘而死，不是在描述死後獎懲。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_44.txt, raw_data/ccbiblestudy_GT_genesis_44.txt, raw_data/kingcomments_genesis_44.txt, raw_data/biblehub_study_genesis_44.txt]
