- title: 伯特利
  path: link_folder/地點/伯特利.md
  summary: '創32章：雅各禱告引用「你曾對我說回本地本族去、我要厚待你」（v.9），指創28:15伯特利異象應許、創31:3、13神命令回鄉提醒許願。雅各許願。瑪哈念天軍顯現（v.1-2）與二十年前伯特利天梯異象（創28:12）形成含攝結構（華爾頓/GT），證神認可雅各為約繼承人。雅博摔跤、毗努伊勒見神面（v.30）、改名以色列（v.28）、賜福（v.29），全然應驗伯特利之約（創28:20-21「耶和華必作我的神」）。'
  relation: '伯特利為雅各屬靈生命關鍵地標：創28:10-22初次異象立約許願、創31:13神自稱「伯特利的神」命令回鄉提醒許願、創32:1-2瑪哈念天軍呼應天梯含攝結構、創32:24-30雅博摔跤毗努伊勒深化約關係、創35:1、9-15再次顯現確立約、賜名以色列、立柱澆油。本章為「伯特利之約」歸途階段性應驗與深化。'
  sources: ["CT", "GT", "KC", "BH"]
