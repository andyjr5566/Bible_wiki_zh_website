  - target: "link_folder/人物/約瑟.md"
    chapter: 39
    action: "append"
    title: 約瑟
    path: "link_folder/人物/約瑟.md"
    summary: 約瑟被賣到埃及，在護衛長波提乏家中蒙耶和華同在、百事順利，獲委管家；遭波提乏妻子色誘，因怕得罪神而拒絕並逃跑；被誣告下監，在獄中仍蒙神同在、獲司獄信任管理全獄。四次強調「耶和華與約瑟同在」（2,3,21,23節），展現神在順境逆境中同在的保守。
    relation: 本章是約瑟在埃及受試煉的關鍵轉折，從管家到囚犯，身分跌落卻神同在不變，預備後續為法老解夢、治理埃及。
    sources: ["BH", "CT", "GT", "KC"]
    source_files: ["raw_data/biblehub_study_genesis_39.txt", "raw_data/ccbiblestudy_CT_genesis_39.txt", "raw_data/ccbiblestudy_GT_genesis_39.txt", "raw_data/kingcomments_genesis_39.txt"]

  - target: "link_folder/人物/波提乏.md"
    chapter: 39
    action: "append"
    title: 波提乏
    path: "link_folder/人物/波提乏.md"
    summary: 波提乏作為約瑟的主人全程出現。見耶和華與約瑟同在、凡事順利，提拔約瑟為管家，將一切所有的交託他手中（只留自己飯食）。後聽信妻子誣告，怒而將約瑟下在王的囚犯監獄。來源指出波提乏或許不全信妻子話（否則可依律處死約瑟），此舉或歸功神暗中保護。
    relation: 波提乏是約瑟進入埃及權力核心的第一道門戶；其家成為約瑟經歷神同在、學習管理、遭受不義受苦的場域。
    sources: ["BH", "CT", "GT", "KC"]
    source_files: ["raw_data/biblehub_study_genesis_39.txt", "raw_data/ccbiblestudy_CT_genesis_39.txt", "raw_data/ccbiblestudy_GT_genesis_39.txt", "raw_data/kingcomments_genesis_39.txt"]

  - target: "link_folder/人物/法老.md"
    chapter: 39
    action: "append"
    title: 法老
    path: "link_folder/人物/法老.md"
    summary: 法老未直接出場，但波提乏是「法老的內臣、護衛長」，約瑟被關進「王的囚犯被囚之處」，暗示法老的司法/囚禁體系介入。約瑟由此進入王室禁錮政治犯的圈子，後續得遇酒政膳長、為法老解夢。
    relation: 本章將約瑟從波提乏家庭層面推進到法老國家機器層面，為創41章約瑟見法老鋪路。
    sources: ["BH", "CT", "GT", "KC"]
    source_files: ["raw_data/biblehub_study_genesis_39.txt", "raw_data/ccbiblestudy_CT_genesis_39.txt", "raw_data/ccbiblestudy_GT_genesis_39.txt", "raw_data/kingcomments_genesis_39.txt"]

  - target: "link_folder/地點/埃及.md"
    chapter: 39
    action: "append"
    title: 埃及
    path: "link_folder/地點/埃及.md"
    summary: 埃及作為本章全程背景地。約瑟被帶下埃及、在波提乏家、在王的監獄，均在埃及境內。來源指出埃及不與希伯來人同席（43:32）、視希伯來人為不潔淨（46:34），波提乏妻誣告時利用「希伯來人」標籤激起種族歧視。喜克索王朝（Hyksos，外族統治）背景或為波提乏身為埃及本國人之護衛長提供歷史語境。
    relation: 本章在埃及展現「神的同在不受地理限制」——無論在管家豪宅或黑暗監獄，耶和華同在使約瑟凡事順利。
    sources: ["BH", "CT", "GT", "KC"]
    source_files: ["raw_data/biblehub_study_genesis_39.txt", "raw_data/ccbiblestudy_CT_genesis_39.txt", "raw_data/ccbiblestudy_GT_genesis_39.txt", "raw_data/kingcomments_genesis_39.txt"]