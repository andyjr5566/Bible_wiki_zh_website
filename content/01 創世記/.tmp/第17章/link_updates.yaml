- title: 以實瑪利十二族
  path: link_folder/主題/以實瑪利十二族.md
  summary: 神應許以實瑪利將生十二個族長，並使他成為大國；創世記第25章後來列出十二子的名字。
  relation: 第17章先預告十二族長，第25章的家譜形成敘事內的應驗；這項福分與以撒承受永遠之約的應許並列但不混同。
  sources:
  - https://biblehub.com/study/genesis/17.htm
  - https://www.ccbiblestudy.org/Old%20Testament/01Gen/01GT17.htm
  source_files:
