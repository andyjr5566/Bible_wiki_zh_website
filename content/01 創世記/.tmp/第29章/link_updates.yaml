- title: 神的保守與帶領
  path: link_folder/神學/神的保守與帶領.md
  summary: 雅各離開伯特利後順利到達母族地區，正巧在井旁遇見拉結；來源把這理解為神在雅各路上的護理與帶領。
  relation: 本章顯示創世記28章神同在與保守的應許開始落實，即使雅各之後仍要經過拉班家的管教與磨練。
