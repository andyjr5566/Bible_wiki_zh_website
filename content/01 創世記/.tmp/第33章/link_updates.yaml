- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: "雅各平安回到迦南地（18節），在示劍城東支搭帳棚、買地、築壇。應驗神在伯特利的應許（創28:15「保守你、領你回這地」）。"
  relation: "本章為雅各進入迦南地的首個定居點（示劍），但非神指定的伯特利，顯示雅各順服仍有保留。"
