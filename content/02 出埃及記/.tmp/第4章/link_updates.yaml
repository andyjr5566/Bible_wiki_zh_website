- title: 米甸地
  path: link_folder/地點/米甸地.md
  summary: |
    本章v19神在米甸對摩西說話，吩咐他回埃及去，因為尋索他命的人都死了。米甸在此是摩西返回埃及前神最後一次向他說話的地點，也是摩西四十年寄居生活的終結場景。
  relation: |
    米甸地從出2章的逃難與成家之地，在本章轉為離開之地。神在米甸發出歸回的指令，使米甸成為摩西從逃亡到受差的轉折點。
