book: 創世記
chapter: 15
updates:
- title: 亞伯蘭
  path: link_folder/人物/亞伯蘭.md
  summary: 神在異象中應許作亞伯蘭的盾牌並賞賜他，排除以利以謝作後嗣，應許親生後裔如眾星；亞伯蘭信耶和華，神以此為他的義。
  relation: 神又以切約儀式確認土地應許，預告後裔受苦與歸回；亞伯蘭沉睡時，代表神臨在的火煙獨自經過肉塊。
  sources: [經文, 創世記第十五章註解, 創世記第十五章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第15章.txt, raw_data/ccbiblestudy_CT_genesis_15.txt, raw_data/ccbiblestudy_GT_genesis_15.txt, raw_data/kingcomments_genesis_15.txt, raw_data/biblehub_study_genesis_15.txt]
- title: 利乏音人
  path: link_folder/人物/利乏音人.md
  summary: 利乏音人列在神應許賜給亞伯蘭後裔之地的十個居民群體中。
  relation: 第15章從第14章四王擊敗的利乏音人，轉為土地應許範圍內的居民名單；不同時期的名稱可能涵蓋相關支系或地域。
  sources: [經文, 創世記第十五章註解, 創世記第十五章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第15章.txt, raw_data/ccbiblestudy_CT_genesis_15.txt, raw_data/ccbiblestudy_GT_genesis_15.txt, raw_data/kingcomments_genesis_15.txt, raw_data/biblehub_study_genesis_15.txt]
- title: 亞摩利人
  path: link_folder/人物/亞摩利人.md
  summary: 神說亞伯蘭後裔要到第四代才返回，因亞摩利人的罪孽尚未滿盈；亞摩利人也列在應許地十族中。
  relation: 本章把歸回時間與當地居民的道德審判相連，顯示賜地並非立即發生；「亞摩利人」在此也可概括迦南居民。
  sources: [經文, 創世記第十五章註解, 創世記第十五章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第15章.txt, raw_data/ccbiblestudy_CT_genesis_15.txt, raw_data/ccbiblestudy_GT_genesis_15.txt, raw_data/kingcomments_genesis_15.txt, raw_data/biblehub_study_genesis_15.txt]
