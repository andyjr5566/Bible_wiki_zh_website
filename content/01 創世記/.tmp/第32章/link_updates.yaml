- title: 敬畏以撒的神
  path: link_folder/神學/敬畏以撒的神.md
  summary: '創32章：雅各禱告稱神為「我父親以撒的神」（v.9），創31:42、53 稱「我父親以撒所敬畏的神」、「以撒所敬畏的神」。本章雅博渡口摔跤、毗努伊勒見神面，驗證「敬畏以撒的神」非抽象稱謂、乃真實介入歷史的立約之神。v.12持定「你曾說我必厚待你」的應許，神回應以摔跤對質、改名以色列、賜福、保全性命。KC強調：雅各單指「敬畏以撒的神」而拉班（創31:53）混稱「亞伯拉罕的神和拿鶴的神」，顯示雅各純正信仰與拉班混合多神論背景的對比。'
  relation: '「敬畏以撒的神」為雅各家族獨特守護神稱謂（創31:42、53；32:9），強調立約信仰的純正性與代際傳承。本章將此稱謂從拉班追兵時的見證（創31:42「若不是我父親以撒所敬畏的神……你必打發我空手而去」）推進到面對以掃威脅時的禱告倚靠（v.9-12）、再到毗努伊勒面對面相遇（v.30）。何西阿12:5「耶和華萬軍之神、耶和華是他的紀念」將「敬畏以撒的神」認定為耶和華自我啟示的名。'
