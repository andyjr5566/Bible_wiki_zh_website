book: 創世記
chapter: 1
updates:
- title: 創造（從無到有）
  path: link_folder/神學/創造（從無到有）.md
  summary: '創世記第1章宣告神在起初創造天地，並在第21、27節再次用創造語彙描述生命與人的出現。四份來源都把此章視為神從無到有、憑主權創造萬有的根基。'
  relation: '本章是此條目的核心起點，顯明創造的主體是神，創造的範圍包括天地、生命與人。'
- title: 神的靈的角色
  path: link_folder/神學/神的靈的角色.md
  summary: '第2節說神的靈運行在水面上；來源以覆翼、愛育、賦生命和預備秩序描述此行動。'
  relation: '本章提供神的靈在創造與更新中主動工作的首個場景。'
- title: 神的話（創造媒介）
  path: link_folder/神學/神的話（創造媒介）.md
  summary: '「神說」反覆推動六日創造，神的命令一發出，事情就照著成就。'
  relation: '本章顯明神的話不是描述或建議，而是帶有創造能力的命令。'
- title: 三位一體在創造中的隱現
  path: link_folder/神學/三位一體在創造中的隱現.md
  summary: '第1-3節有神、神的靈與神說；第26節出現「我們要」。來源將此視為三一神在創造中的隱約顯明。'
  relation: '本章提供三位一體在舊約創造敘事中的重要線索，但仍以「隱現」而非完整教義展開來表述。'
- title: 形像與樣式
  path: link_folder/神學/形像與樣式.md
  summary: '第26-27節記載人按神的形像與樣式被造，來源討論人的性情、代表權柄、與神關係及男女同受造。'
  relation: '本章是此條目的直接經文根據，形像與樣式說明人的獨特地位。'
- title: 人的尊嚴與神的形像
  path: link_folder/神學/人的尊嚴與神的形像.md
  summary: '第26-27節把人的尊嚴根基放在神的形像上，並明說男與女同被創造。'
  relation: '本章補足此條目在創9之外的創造根基：人的價值先於墮落、律法與社會身分。'
- title: 人
  path: link_folder/人物/人.md
  summary: '第26-28節把人放在六日創造高峰：照神形像被造，承受賜福，並被託付治理受造界。'
  relation: '本章定義人作為受造者、形像承載者與受託管家的基本身分。'
- title: 空虛混沌的原意
  path: link_folder/背景/空虛混沌的原意.md
  summary: '第2節的空虛混沌在來源中有兩種處理：間隔／復造說視為審判後荒涼；連續創造說視為尚未成形、未充滿的初始狀態。'
  relation: '本章整理需把此條目連到解經爭議，避免把單一來源立場寫成所有來源一致。'
- title: 六日復造的結構
  path: link_folder/背景/六日復造的結構.md
  summary: '第3-31節以六日節奏呈現神的創造／復造工作：光暗、穹蒼、水地、光體、動物與人。'
  relation: '本章提供六日結構的完整經文基礎，也顯示此結構服務於秩序、生命與人的受託治理。'
- title: 各從其類
  path: link_folder/原文/各從其類.md
  summary: '第11-12、21、24-25節反覆使用「各從其類」，來源以此說明神創造中的界限、種類與秩序。'
  relation: '本章是此原文主題的集中出現處。'
- title: 治理與管理
  path: link_folder/原文/治理與管理.md
  summary: '第26、28節把治理與管理交給按神形像受造的人，來源說明這是代表神的權柄與管家責任。'
  relation: '本章顯明治理權不是自主占有，而是神委託人的受造界職分。'
- title: 生養眾多與治理
  path: link_folder/主題/生養眾多與治理.md
  summary: '第28節記載神賜福人類，使其生養眾多、遍滿地面、治理這地。'
  relation: '本章是此託付的起點，將生命繁衍與治理責任放在神的祝福之下。'
- title: 神看為好（甚好）
  path: link_folder/主題/神看為好（甚好）.md
  summary: '神多次看所造為好，並在第31節看一切所造都甚好。來源將此視為神對創造秩序、功用與完成狀態的認可。'
  relation: '本章提供「好／甚好」的完整重複結構，並把創造高峰連到人受造之後的總結。'
- title: 光與黑暗的分別
  path: link_folder/神學/光與黑暗的分別.md
  summary: '第3-5節記載神藉話語使光出現，並把光暗分開。來源把此分別連於神帶出秩序、真理、生命與屬靈光照。'
  relation: '本章是此主題的直接起點，光暗分開也預備後續各種分別行動。'
- title: 創造日長度問題
  path: link_folder/解經爭議/創造日長度問題.md
  summary: '第1章反覆以「晚上、早晨」標示六日；來源多採普通一日理解，但也提到創造日長度有不同解讀。'
  relation: '本章提供此爭議的主要經文根據，整理時需區分經文節奏與解經立場。'
- title: 創世記1章第1-2節間隔問題
  path: link_folder/解經爭議/創世記1章第1-2節間隔問題.md
  summary: '第1-2節的關係在來源中有間隔／復造說與連續創造說兩種處理。CT/GT 採前者，KC 與 BH 較強調神使未成形狀態進入秩序。'
  relation: '本章整理需把此問題標為解經爭議，避免把單一立場當作全章結論。'
- title: 光體作記號定節令
  path: link_folder/背景/光體作記號定節令.md
  summary: '第14-19節記載光體分晝夜、作記號、定節令、日子與年歲，並受神安排而服事地上秩序。'
  relation: '本章顯明日月星辰不是敬拜對象，而是神設立的時間與秩序標記。'
- title: 神命名與主權
  path: link_folder/文化/神命名與主權.md
  summary: '第5、8、10節記載神為光暗、空氣、旱地和海命名；來源指出命名表明主權與界定秩序。'
  relation: '本章以神的命名顯明創造包括界線、功用與權柄的指定。'
- title: 原初素食與受造界和平
  path: link_folder/主題/原初素食與受造界和平.md
  summary: '第29-30節記載神把植物賜給人與動物作食物；來源以此對照洪水後准吃肉，指出原初受造界的和平供應。'
  relation: '本章提供食物秩序的起點，顯明神供應生命並維持受造界和平。'
- title: 六日創造與信徒重生經歷
  path: link_folder/主題/六日創造與信徒重生經歷.md
  summary: 'CT 與 KC 將六日創造次序作屬靈應用，從光照、分別、結果、發光到生命成熟。'
  relation: '本章提供此屬靈應用的結構，但章檔需保持其為應用而非文意主線。'
- title: 詩篇33篇神話語創造
  path: link_folder/互文/詩篇33篇神話語創造.md
  summary: '來源以詩33:6、9 說明神說有就有、命立就立，回應創世記第1章「神說」的創造模式。'
  relation: '本章的神話語創造主題在詩篇33篇中得到詩意宣告。'
- title: 約翰福音1章道與創造
  path: link_folder/互文/約翰福音1章道與創造.md
  summary: '來源將創1的「起初」與「神說」連到約1:1-3，指出萬物藉著道而造。'
  relation: '本章與約翰福音1章共同支撐神的話／道作創造媒介的主題。'
- title: 詩篇8篇人的治理權柄
  path: link_folder/互文/詩篇8篇人的治理權柄.md
  summary: '第26-28節人的治理託付與詩篇8篇「使他管理你手所造的」相呼應。'
  relation: '本章給出人的治理權柄起點，詩篇8篇則在敬拜中反思此尊貴職分。'
- title: 創世記9章洪水後准吃肉
  path: link_folder/互文/創世記9章洪水後准吃肉.md
  summary: '第29-30節的植物食物安排與創9:3 洪水後准吃肉形成對照。'
  relation: '本章呈現原初食物秩序，第9章顯示墮落世界與洪水後的食物秩序變化。'
