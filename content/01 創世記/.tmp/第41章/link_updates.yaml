book: 創世記
chapter: 41
updates:
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: "約瑟從囚犯一躍成為埃及宰相（副車、印璽戒指、細麻衣、金鍊）。三十歲見法老（創41:46），解夢歸榮耀給神（創41:16），提出七年豐年征收五分之一、建積貨城備荒的完整治理方案（創41:33-36）。法老認出「神的靈在他裡頭」（創41:38），賜埃及名「撒發那忒巴內亞」、娶安城祭司波提非拉之女亞西納為妻（創41:45）。七個豐年巡行全地積糧如海沙（創41:47-49），荒年前生下瑪拿西、以法蓮（創41:50-52）。"
  relation: "本章是約瑟生平的最高轉折點：從受苦的囚犯到治理埃及的宰相，十三年（十七歲被賣→三十歲見法老）神的時間表精準應驗。約瑟的解夢、治理、積糧、生子，完整預表基督：受苦後得榮耀、三十歲開始事奉、成為「生命的糧」、娶外邦新婦、萬民來就糧食得生。"
- title: 法老
  path: link_folder/人物/法老.md
  summary: "法老連做兩夢（七牛、七穗），術士博士無法解（創41:1-8）。酒政推薦約瑟後召見，承認約瑟有「神的靈」（創41:38），任命為宰相，賜印璽戒指（權柄）、細麻衣、金鍊、副車，喝道「跪下」（創41:42-43）。宣告「若沒有你的命令，不許人擅自辦事」（創41:44），賜名撒發那忒巴內亞、賜妻亞西納（創41:45）。饑荒時命民眾「往約瑟那裡去」（創41:55）。"
  relation: "本章法老從「無法解夢的君王」轉為「認出神靈、委以重任的智慧統治者」。他的兩夢是神主權介入歷史的管道；他對約瑟的全權委託（印璽戒指、副車、生殺大權）使埃及成為饑荒中唯一有糧之地，保全了雅各家族。法老的回應預表外邦君王承認神的受膏者（基督）並委以權柄。"
- title: 司獄
  path: link_folder/人物/司獄.md
  summary: "本章未直接出現司獄，但承接創40章：司獄將酒政、膳長交給約瑟服事（創40:3-4），使約瑟得以接觸法老核心侍從、解夢獲推薦。創41:14「急忙帶他出監」暗示司獄配合釋放程序。"
  relation: "司獄在創40章的委託（將酒政膳長交給約瑟）是約瑟進入法老視野的關鍵間接管道。若無司獄的信任與委託，約瑟無法為酒政膳長解夢，酒政也無法兩年後向法老推薦。司獄的角色雖在背景，卻是神主權安排的關鍵一環。"
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: "本章埃及成為饑荒中「唯一有糧食」的地（創41:54）。七個大豐年遍地極盛（創41:47），約瑟建積貨城系統（創41:35,48），積糧如海沙（創41:49）。七個荒年來到，「各地都有饑荒，惟獨埃及全地有糧食」（創41:54），「各地的人都往埃及去，到約瑟那裡糴糧」（創41:57）。尼羅河是夢境背景與農業命脈（創41:1-3,17-18）。"
  relation: "本章埃及從「法老做夢的舞台」轉為「神藉約瑟預備的避難所」。七年豐收→七年饑荒的節奏完全在神掌握中（創41:28,32）。埃及的積貨城制度、尼羅河農業、宮廷禮儀（剃頭、賜名、印璽戒指）都成為神保全選民的工具。埃及的地理政治地位（天下糧倉）使其成為雅各家族下埃及、以色列民族形成的搖籃。"
- title: 約瑟預表基督
  path: link_folder/神學/約瑟預表基督.md
  summary: "本章提供最完整的約瑟預表基督圖景：(1) 受苦→榮耀：囚犯→宰相（創41:14,40-43），如基督受死→復活升天（腓2:5-11）；(2) 三十歲開始事奉（創41:46），同耶穌（路3:23）；(3) 「神的靈在他裡頭」（創41:38），如基督滿有聖靈（賽11:2）；(4) 生命的糧：積糧救萬民（創41:55-57），如基督是「生命的糧」（約6:35）；(5) 外邦新婦：娶亞西納（創41:45），如基督娶教會（弗5:25-32）；(6) 萬民來就：各地人來糴糧（創41:57），如萬民歸向基督；(7) 法老命「往約瑟那裡去」（創41:55），預表福音呼召「去見耶穌」（約2:5）。"
  relation: "本章是約瑟預表基督最濃密的一章，KC、BH、CT、GT 四大來源一致指出：約瑟的人生軌跡（受苦→榮耀、三十歲、生命的糧、外邦新婦、萬民來就）是舊約最完整的基督模型。這不只是類比，而是神預定的預表性歷史，為新約基督救贖工作提供實體預演。"