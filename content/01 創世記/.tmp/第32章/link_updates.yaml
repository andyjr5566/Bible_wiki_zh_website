- title: 伯特利的神
  path: link_folder/神學/伯特利的神.md
  summary: '創32章：神在雅博渡口摔跤中自顯為「伯特利的神」（呼應創31:13「我是伯特利的神、你在那裡用油澆柱子、向我許願」）。雅各二十年前在伯特利見天梯異象（創28:12-15）、立柱澆油、許願「神若與我同在、保守我……耶和華必作我的神」（創28:20-21）。本章瑪哈念天軍顯現（v.1-2）呼應伯特利天梯（含攝結構，華爾頓/GT），雅博摔跤、毗努伊勒見神面（v.30）、改名以色列（v.28）、賜福（v.29），全然應驗伯特利之約。雅各禱告引用「你曾對我說回本地本族去、我要厚待你」（v.9，創31:3；28:15），持定伯特利應許。'
  relation: '「伯特利的神」為雅各立約獨特啟示稱謂（創31:13；35:1、7、15），串聯創28:10-22初次異象立約、創31:3、13命令回鄉提醒許願、創32:1-2、24-30歸途雙重顯現應驗、創35:1、9-13再次顯現確立。本章為約應驗關鍵：神主動尋回雅各（瑪哈念遇見、雅博摔跤），雅各從「許願者」轉為「得福者」（以色列），大腿扭傷成終身記號（創32:31-32），預表「軟弱時剛強」（林後12:10）。'
