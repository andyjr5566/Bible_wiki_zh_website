- title: 亞伯拉罕之約
  path: link_folder/神學/亞伯拉罕之約.md
  summary: '創32章：雅各禱告中三度引用亞伯拉罕之約應許：（1）v.9「回你本地本族去、我要厚待你」（創31:3；28:13-15）；（2）v.12「我必定厚待你、使你後裔如海邊沙、多不可勝數」（創28:14）；（3）v.10「我先前只拿著杖過約旦河、如今成了兩隊」見證約中「賜福、增多」應許成就。雅各以約為憑據向神禱告（丁良才：禱告六要素含「依約、憑命」），神在雅博渡口摔跤、改名以色列、賜福，確立雅各為約的繼承人（華爾頓：改名代表立約繼承人身分確立，同創17:5亞伯蘭→亞伯拉罕）。'
  relation: '亞伯拉罕之約（創12:1-3；15；17）在雅各身上逐步應驗：創28:13-15伯特利重申、創31:3命令回鄉、創31:13「我是伯特利的神」提醒許願、創32:9-12禱告持定、創32:28改名以色列確立繼承人身分、創35:9-13伯特利再立約。本章為約應驗關鍵節點：從「奪取者」雅各轉為「與神較力得勝者」以色列。'
  sources: ["CT", "GT", "KC", "BH"]
