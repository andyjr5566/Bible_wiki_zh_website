book: 創世記
chapter: 35
updates:
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: '創世記第35章中，雅各聽從神命令上伯特利，帶領全家除掉外邦神、自潔、更換衣裳，在伯特利築壇並稱那地為伊勒伯特利。神在伯特利再次向他顯現，重申改名以色列與亞伯拉罕、以撒之約；他也經歷底波拉、拉結、以撒相繼死亡，以及流便犯罪的家庭痛苦。'
  relation: '本章是雅各從示劍停滯回到伯特利的關鍵恢復，展現他由被動軟弱轉為承擔家庭屬靈責任。'
- title: 以掃
  path: link_folder/人物/以掃.md
  summary: '創世記第35章中，以掃被提及兩次：神吩咐雅各回到伯特利，正是紀念雅各當年逃避以掃時神向他顯現；章末以掃與雅各一同埋葬父親以撒。'
  relation: '本章呈現雅各與以掃衝突的收束：逃避以掃的伯特利記憶轉成敬拜之地，兄弟二人也在父親葬禮中同場出現。'
- title: 以撒
  path: link_folder/人物/以撒.md
  summary: '創世記第35章中，神向雅各重申「我所賜給亞伯拉罕和以撒的地」，顯示以撒仍在聖約承接線中。章末雅各回到幔利見父親以撒，以撒享壽一百八十歲，年紀老邁、日子滿足而死，由以掃和雅各埋葬。'
  relation: '本章記錄以撒生平終結，並把雅各回到父家與亞伯拉罕、以撒的應許地相連。'
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: '創世記第35章中，神在伯特利向雅各重申所賜給亞伯拉罕和以撒的地要賜給雅各與後裔；章末幔利也被稱為亞伯拉罕和以撒寄居之地。'
  relation: '本章把雅各的伯特利經歷接回亞伯拉罕之約，證明雅各不是另起新線，而是承受同一土地與後裔應許。'
- title: 利百加
  path: link_folder/人物/利百加.md
  summary: '創世記第35章提到利百加的奶母底波拉死在伯特利附近。來源推測底波拉可能長久服事利百加家，也可能與利百加去世的消息或雅各對母親的記憶有關。'
  relation: '本章沒有直接記載利百加本人，卻藉底波拉之死暗示利百加家族記憶與雅各歸回父家的哀傷背景。'
- title: 乳母底波拉
  path: link_folder/人物/乳母底波拉.md
  summary: '創世記第35章中，利百加的奶母底波拉死了，葬在伯特利下邊橡樹底下，那棵樹名叫亞倫巴古，意為哭泣的橡樹。來源指出她可能自利百加出嫁時就服事此家，雅各家為她深切哀哭。'
  relation: '本章是底波拉之死的主要記載，顯示她在雅各家中具有受尊敬的地位，也讓伯特利復興伴隨舊世代人物的埋葬。'
- title: 拉結
  path: link_folder/人物/拉結.md
  summary: '創世記第35章中，拉結在從伯特利往以法他的路上難產，臨死前給兒子起名便俄尼，雅各改名便雅憫。她死後葬在以法他路旁，雅各在墳上立碑。來源也把她之死與先前偷神像、雅各不知情發咒詛的敘事張力並列討論。'
  relation: '本章是拉結生平終結章節，將她長久盼子、便雅憫出生、伯利恆路旁之墓與後續拉結哀哭傳統連在一起。'
- title: 流便
  path: link_folder/人物/流便.md
  summary: '創世記第35章中，流便與父親雅各的妾辟拉同寢，以色列也聽見了。來源指出這是嚴重淫亂與亂倫，且在古代家庭秩序中也可能意味著挑戰父親族長權威，後來導致創49與代上5中失去長子名分。'
  relation: '本章為流便生平重大污點，解釋他雖為雅各長子卻不得居首位的原因。'
- title: 辟拉
  path: link_folder/人物/辟拉.md
  summary: '創世記第35章中，辟拉被稱為雅各父親的妾，流便與她同寢，以色列聽見。她也在十二子名單中被列為但和拿弗他利的生母。'
  relation: '本章把辟拉放在兩個脈絡中：一是作為拉結使女生下支派祖先，二是成為流便犯罪事件中的受牽連人物。'
- title: 利亞
  path: link_folder/人物/利亞.md
  summary: '創世記第35章的十二子名單中，利亞所生的是流便、西緬、利未、猶大、以薩迦、西布倫。這組名單顯示她在雅各十二子中所生最多，也奠定多個重要支派的來源。'
  relation: '本章補足利亞在十二支派起源中的地位，並把她兒子的排序放入完整家族名單。'
- title: 西緬
  path: link_folder/人物/西緬.md
  summary: '創世記第35章中，西緬列在利亞所生的雅各兒子名單中，位於流便之後、利未之前。此名單緊接在流便犯罪之後，預備後續雅各臨終對各子的評語。'
  relation: '本章將西緬放入十二子完整名單，承接創34章西緬利未事件，也預備創49章的支派命運。'
- title: 利未
  path: link_folder/人物/利未.md
  summary: '創世記第35章中，利未列在利亞所生的雅各兒子名單中，與西緬、猶大等同列。名單完成後，利未將作為以色列十二支派之一進入後續歷史。'
  relation: '本章把利未從創34章的報復行動帶入十二子正式名單，為其後裔分散與祭司職分的長期發展留下背景。'
- title: 猶大（雅各之子）
  path: link_folder/人物/猶大（雅各之子）.md
  summary: '創世記第35章中，猶大列在利亞所生的雅各兒子名單中。來源在十二支派脈絡中指出，猶大後來在王權與彌賽亞線上具有重要地位。'
  relation: '本章將猶大納入完整十二子名單，為後續猶大支派與君王應許的歷史發展提供家族根基。'
- title: 以薩迦（價值）
  path: link_folder/人物/以薩迦（價值）.md
  summary: '創世記第35章中，以薩迦列在利亞所生的雅各兒子名單中，位於猶大之後、西布倫之前。'
  relation: '本章把以薩迦從創30章出生敘事帶入十二子完整名單，確認其作為支派祖先的地位。'
- title: 西布倫（同住）
  path: link_folder/人物/西布倫（同住）.md
  summary: '創世記第35章中，西布倫列為利亞所生的雅各兒子之一，完成利亞六個兒子的名單。'
  relation: '本章確認西布倫在十二子與十二支派起源中的位置，承接創30章其出生與命名敘事。'
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: '創世記第35章中，約瑟與便雅憫同列為拉結所生之子。來源指出拉結兩子在雅各心中地位特殊，便雅憫出生後拉結一系也完整。'
  relation: '本章把約瑟放在拉結之子名單中，為後續約瑟與便雅憫的兄弟關係和創世記後半敘事鋪路。'
- title: 但（審判）
  path: link_folder/人物/但（審判）.md
  summary: '創世記第35章中，但被列為拉結使女辟拉所生之子，與拿弗他利同列。'
  relation: '本章確認但作為雅各十二子之一與支派祖先的地位，承接創30章其出生與命名背景。'
- title: 拿弗他利
  path: link_folder/人物/拿弗他利.md
  summary: '創世記第35章中，拿弗他利被列為拉結使女辟拉所生之子，與但同列。'
  relation: '本章把拿弗他利納入完整十二子名單，確認其在支派起源中的位置。'
- title: 悉帕
  path: link_folder/人物/悉帕.md
  summary: '創世記第35章中，悉帕被稱為利亞的使女，她所生的是迦得和亞設。'
  relation: '本章在十二子名單中確認悉帕作為兩個支派祖先生母的地位，也延續創30章使女代孕脈絡。'
- title: 迦得（萬幸）
  path: link_folder/人物/迦得（萬幸）.md
  summary: '創世記第35章中，迦得列為利亞使女悉帕所生之子，與亞設同列。'
  relation: '本章確認迦得作為雅各十二子之一與支派祖先的地位。'
- title: 亞設（有福）
  path: link_folder/人物/亞設（有福）.md
  summary: '創世記第35章中，亞設列為利亞使女悉帕所生之子，與迦得同列。'
  relation: '本章確認亞設作為雅各十二子之一與支派祖先的地位。'
- title: 伯特利
  path: link_folder/地點/伯特利.md
  summary: '創世記第35章中，神命雅各上伯特利去住並築壇。雅各帶全家除偶像、自潔後到達路斯就是伯特利，在那裡築壇、稱地為伊勒伯特利；神也在此再次向雅各顯現、賜福並重申應許。'
  relation: '本章是伯特利在雅各生命中的第二個高峰，從創28章逃難時的顯現之地，成為回歸、還願、敬拜與重新領受約的地方。'
- title: 路斯
  path: link_folder/地點/路斯.md
  summary: '創世記第35章中，雅各和一切與他同在的人到了迦南地的路斯，經文說路斯就是伯特利。來源保留其字義與伯特利改名脈絡。'
  relation: '本章再次把路斯與伯特利並列，顯示地名轉變與神顯現記憶之間的關係。'
- title: 示劍（城）
  path: link_folder/地點/示劍（城）.md
  summary: '創世記第35章中，雅各把家中外邦神像和耳環藏在示劍那裡的橡樹底下。來源指出示劍是創34章事件發生地，也是雅各離開前處理偶像與異教物品的地方。'
  relation: '本章把示劍從家庭危機地點轉為埋葬偶像、斷絕過往混雜的地點，與伯特利形成鮮明對比。'
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: '創世記第35章中，雅各到迦南地的路斯，即伯特利；神也重申要把賜給亞伯拉罕和以撒的地賜給雅各與後裔。'
  relation: '本章顯示迦南地不只是行程背景，而是神向族長重申土地應許的核心內容。'
- title: 巴旦亞蘭
  path: link_folder/地點/巴旦亞蘭.md
  summary: '創世記第35章中，經文說雅各從巴旦亞蘭回來，神又向他顯現並賜福。十二子名單末尾也說這些是雅各在巴旦亞蘭所生的兒子，雖便雅憫實際生於迦南地，來源也注意到此概括語。'
  relation: '本章把雅各在巴旦亞蘭的二十年生涯收束到伯特利應許重申與十二子名單完成。'
- title: 基列亞巴
  path: link_folder/地點/基列亞巴.md
  summary: '創世記第35章中，雅各到父親以撒那裡，到了基列亞巴的幔利；經文補充基列亞巴就是希伯崙。'
  relation: '本章把基列亞巴作為雅各回到父家的地理標記，連接幔利、希伯崙與族長寄居傳統。'
- title: 幔利
  path: link_folder/地點/幔利.md
  summary: '創世記第35章中，幔利位於基列亞巴，也就是希伯崙，是亞伯拉罕和以撒寄居的地方，雅各在此來到父親以撒那裡。'
  relation: '本章再次把幔利標示為族長世代延續之地，雅各從伯特利回到父家也回到亞伯拉罕、以撒的寄居記憶。'
- title: 希伯崙
  path: link_folder/地點/希伯崙.md
  summary: '創世記第35章中，基列亞巴就是希伯崙，亞伯拉罕和以撒曾在此寄居，雅各也來到父親以撒那裡。來源指出希伯崙在族長敘事中常與交通、寄居和家族墓地記憶相連。'
  relation: '本章將希伯崙作為雅各回歸父家的終點，也標誌以撒生命的終結。'
- title: 伯特利的神
  path: link_folder/神學/伯特利的神.md
  summary: '創世記第35章中，雅各在伯特利築壇，起名伊勒伯特利，意為伯特利之神。來源指出雅各由創33章稱神為以色列的神，進一步認識神是神家之神。'
  relation: '本章是「伯特利的神」概念的直接命名處，顯示神不只保護雅各個人，也在祂所顯現、所建立的家中掌權。'
- title: 祭壇敬拜
  path: link_folder/神學/祭壇敬拜.md
  summary: '創世記第35章中，神命雅各在伯特利築壇，雅各也宣告要為在遭難日子應允他、一路保佑他的神築壇。來源指出這是雅各履行創28章所許願的重要行動。'
  relation: '本章把祭壇敬拜與還願、回到神家、重申聖約應許相連。'
- title: 神的同在與保護
  path: link_folder/神學/神的同在與保護.md
  summary: '創世記第35章中，雅各見證神在他遭難日子應允禱告、在所行路上保佑他；他們起行時，神使周圍城邑甚驚懼，不追趕雅各眾子。'
  relation: '本章顯示神的同在不只是過去記憶，也在雅各順服回伯特利時具體保護全家免受創34章後果攻擊。'
- title: 神的應許應驗
  path: link_folder/神學/神的應許應驗.md
  summary: '創世記第35章中，神在伯特利重申雅各的新名、後裔、國族、君王與土地應許，呼應亞伯拉罕和以撒所得之約。便雅憫出生、十二子名單完成，也具體推進後裔應許。'
  relation: '本章把神過去在伯特利、雅博、亞伯拉罕和以撒身上的應許，集中重申並向十二支派歷史推進。'
- title: 全能的神（El Shaddai）
  path: link_folder/神學/全能的神（El Shaddai）.md
  summary: '創世記第35章中，神對雅各說「我是全能的神」，隨即吩咐他生養眾多，並應許一族、多國與君王從他而出。來源指出這稱號呼應神向亞伯拉罕顯現時的稱呼，強調神足以成就祂的約。'
  relation: '本章把全能的神與後裔、土地、君王應許連在一起，安慰剛經歷家庭混亂與死亡陰影的雅各。'
- title: 雅各改名以色列
  path: link_folder/歷史/雅各改名以色列.md
  summary: '創世記第35章中，神在伯特利重申「你的名原是雅各，從今以後不要再叫雅各，要叫以色列」。來源指出這確認創32章毗努伊勒改名經歷，並把雅各的新身分落實在伯特利敬拜與聖約更新中。'
  relation: '本章是雅各改名以色列的再確認，顯示新名不只屬於雅博渡口個人經歷，也屬於伯特利中與全族相關的約。'
- title: 家神像_特拉芬
  path: link_folder/文化/家神像_特拉芬.md
  summary: '創世記第35章中，雅各要求家人除掉外邦神，來源把這與拉結先前從拉班家偷取的家神像特拉芬，以及雅各家中可能累積的異教物品相連。'
  relation: '本章是特拉芬與家庭偶像問題被正式清理的關鍵場景，顯示回伯特利前必須斷絕異教依附。'
- title: 立石柱與澆油
  path: link_folder/文化/立石柱與澆油.md
  summary: '創世記第35章中，雅各在神與他說話的地方立石柱，在柱子上奠酒並澆油。來源指出這呼應創28章雅各在伯特利立柱澆油，但本章新增奠酒，表達更深的敬拜與喜樂。'
  relation: '本章是雅各立石柱與澆油行動的成熟回應，把早年逃難時的紀念帶入還願與重新敬拜。'
- title: 伯特利之約 (創28)
  path: link_folder/互文/伯特利之約 (創28).md
  summary: '創世記第35章中，神吩咐雅各回伯特利，明確提到祂是雅各逃避以掃時向他顯現的那位。來源一致指出，這是神提醒雅各履行創28章在伯特利所許的願。'
  relation: '本章是伯特利之約的回返與履行：創28章的逃難、顯現與許願，在創35章成為還願、潔淨與重申應許。'
- title: 雅博渡口經歷 (創32)
  path: link_folder/互文/雅博渡口經歷 (創32).md
  summary: '創世記第35章中，神再次確認雅各改名以色列，呼應創32章雅博渡口神給雅各的新名。來源指出本章把毗努伊勒的生命轉折帶到伯特利中完成。'
  relation: '本章顯示雅博渡口的新名不是孤立經歷，而要在伯特利的敬拜、潔淨與聖約更新中被確認。'
- title: 何西阿書12章雅各摔跤
  path: link_folder/互文/何西阿書12章雅各摔跤.md
  summary: '創世記第35章中，雅各在伯特利重新遇見神、聽見神說話。KC特別引用何西阿12章「在伯特利遇見耶和華，在那裡耶和華與我們說話」，指出何西阿把雅各伯特利經歷視為全以色列的屬靈記憶。'
  relation: '本章補足何西阿12章所概括的雅各生命軌跡：摔跤得名之後，仍要在伯特利尋見神並聽祂說話。'
