- title: 雅各二十年服事
  path: link_folder/歷史/雅各二十年服事.md
  summary: '創32章背景：雅各在巴旦亞蘭服事拉班二十年（創31:38、41），為兩女兒服事十四年、為羊群六年、工價被改十次（創31:7、41）。本章v.4-5雅各託使者對以掃說「我在拉班那裡寄居、直到如今……我有牛驢羊群僕婢」，見證二十年服事中神的信實供應：從「只拿杖過約旦河」（v.10）到「成了兩隊」（v.10）、擁五百八十頭牲畜作禮物（v.14-15）。GT/聖經精讀本：雅各寧願承受恐懼損失大量財產、也定意進入迦南地，這歸鄉意識成就後來希伯來人耶和華信仰與以色列民族形成的決定性因素。華爾頓：雅各重禮可比古近東國際朝貢（欣丹努獻亞述王禮物），證明雅各財富非虛構。'
  relation: '雅各二十年服事（創29-31）為創32章歸鄉鋪墊：財富積累（v.10、14-15）、家庭建立（兩妻兩妾十一子、創32:22）、屬靈操練（被欺詐十次改工價、神在夢中顯現保護創31:11-13）、立約離別（創31:44-54迦累得/米斯巴立約）。本章雅各面對以掃時的策略（分隊、禮物、謙稱）與禱告（v.9-12），皆根植於二十年服事中「神的同在與保護」經驗（創31:5、42）。何西阿12:12「雅各逃往亞蘭地、以色列為得妻子服事人、為得羊群看守羊群」總結此段歷史。'
