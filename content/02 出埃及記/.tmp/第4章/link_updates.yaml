book: 出埃及記
chapter: 4
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: |
    本章以摩西第四次、第五次推辭神的差遣開場，並記錄神賜他三個神蹟（杖變蛇、手長大痲瘋、水變血）作為憑證。摩西四次推辭：(1)百姓不信（v1），神以三神蹟回應；(2)拙口笨舌（v10），神宣告造口者必賜口才；(3)拒絕受差（v13），神發怒但仍以亞倫為輔助。摩西順從後回到米甸辭別葉忒羅，攜妻兒返回埃及。途中神欲殺摩西（v24-26）因未守割禮之約，西坡拉行割禮後釋放。摩西與亞倫在神的山相遇，招聚長老，施行神蹟，百姓信而敬拜。
  relation: |
    本章是摩西從推辭到順從的轉折。推辭反映他的自卑與自恃並存──從自認缺乏可信度與口才，到直接拒絕。神的回應策略不是移除摩西的軟弱，而是以同在的應許與話語賦權。割禮事件表明神對祂器皿的絕對要求：家中必須先遵守聖約。最後百姓相信並下拜的結局證實了神的信實，與摩西的憂慮形成反轉。
  sources:
  - CT_註解
  - GT_拾穗
  - KC_KingComments
  - BH_BibleHub Study
  source_files:
