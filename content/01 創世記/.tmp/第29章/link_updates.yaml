- title: 利百加
  path: link_folder/人物/利百加.md
  summary: 雅各向拉結表明自己是利百加的兒子，拉結便跑去告訴父親拉班。
  relation: 利百加的身分使雅各得以被拉班家認作親屬，也承接她先前吩咐雅各逃往拉班家的敘事。
