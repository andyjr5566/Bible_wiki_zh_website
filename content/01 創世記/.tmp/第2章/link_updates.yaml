book: 創世記
chapter: 2
updates:
- title: 亞當
  path: link_folder/人物/亞當.md
  summary: 亞當被詳述為神用地上塵土塑造、由神吹入生命氣息而成為有靈的活人；他被安置在伊甸園，受託修理看守，並為動物命名，顯出受造之人的尊貴、責任與智慧。
  relation: 本章補足第1章「造人」的細節，使亞當不只是人類代表，也是受託治理、與神相交、需要相配同伴的人；亞當沉睡後夏娃被造成，也成為基督與教會豫表的基礎。
- title: 夏娃
  path: link_folder/人物/夏娃.md
  summary: 本章尚未稱她為夏娃，但記載女人由亞當肋骨被神建造成，並被帶到亞當面前；她是與亞當同等、相配、可面對面相交的幫助者。
  relation: 第2章提供夏娃身分與婚姻神學的起點：女人不是動物中可尋得的助手，而是神親自為人預備的配偶；肋骨與「骨中的骨，肉中的肉」支撐她與亞當的親密、一體與平等。
- title: 人
  path: link_folder/人物/人.md
  summary: 人在第2章中被放在創造敘事焦點：尚未有人耕地，神便造人、安置人、吩咐人、託付人治理並為人預備配偶。
  relation: 本章顯出人既出於塵土而有受造與有限的一面，又由神吹入生命氣息而有接觸神、事奉神的尊貴；人被造不是孤立存在，而是在神、土地、受造物與婚姻關係中承擔責任。
- title: 伊甸
  path: link_folder/地點/伊甸.md
  summary: 伊甸被描述為神在東方所立的園子，是悅目、可食、由河水滋潤的地方；來源指出 Eden 有喜樂、愉悅、最高樂園的含義，地點精確位置仍難確定。
  relation: 伊甸在本章成為神安置人、供應人、託付人並試驗人順服的場所；它同時是四河祝福流出的源頭，並預示後來失樂園與末後恢復的主題。
- title: 比遜
  path: link_folder/地點/比遜.md
  summary: 比遜是從伊甸流出後分成的第一道河，環繞哈腓拉全地；來源解釋其名有自由流淌、豐富湧流之意，所在地今日難以確定。
  relation: 比遜與哈腓拉的金子、珍珠、紅瑪瑙連在一起，呈現伊甸祝福向外流出的豐盛，也讓本章的地理描述帶有供應、生命與榮美的神學象徵。
- title: 哈腓拉
  path: link_folder/地點/哈腓拉.md
  summary: 哈腓拉是比遜河所環繞之地，產金子、珍珠與紅瑪瑙；CT 指其位置已難確定，KC 以「沙地」作象徵性整理。
  relation: 哈腓拉使伊甸敘事不只停在園內，也指向園外地土與資源；本章藉哈腓拉的珍寶顯出受造界原初的豐富與神供應的美善。
- title: 基訓
  path: link_folder/地點/基訓.md
  summary: 基訓是第二道河，環繞古實全地；來源解釋其名有湧出、突破、眾水洪發之意，河道與位置也難以確定。
  relation: 基訓與古實連結，使四河描述呈現伊甸祝福流向不同地區；來源也用其湧流意象整理神生命供應向外擴展的面向。
- title: 古實
  path: link_folder/地點/古實.md
  summary: 本章古實是基訓環繞之地；來源提醒此處位置有爭議，未必等同後來非洲埃提阿伯，也可能指古代米所波大米相關地區。
  relation: 古實在第2章作為伊甸四河地理的一部分，顯示園中河水流向園外世界；來源亦以「黑暗」意象延伸神生命供應臨到罪人與萬民。
- title: 底格里斯
  path: link_folder/地點/底格里斯.md
  summary: 第三道河在和合本作希底結，來源明確辨識為底格里斯河，流在亞述東邊，是美索不達米亞兩大河之一。
  relation: 底格里斯把伊甸四河敘事接到古代近東的可辨地理；本章經文以它與亞述的位置關係，給伊甸敘事一個歷史地理錨點。
- title: 亞述
  path: link_folder/地點/亞述.md
  summary: 第2章提到希底結流在亞述東邊；來源將亞述視為古代近東重要地理標記，也指出後來聖經中亞述常成為敵對神百姓的帝國。
  relation: 本章中的亞述尚不是敘事角色，而是定位底格里斯的方位；它使伊甸四河記載與後來聖經歷史地理形成早期連接。
- title: 伯拉大河
  path: link_folder/地點/伯拉大河.md
  summary: 第四道河是伯拉河，即幼發拉底河；來源指出它是美索不達米亞主要河流，也在後來成為應許地邊界與先知書、啟示錄中的重要地理符號。
  relation: 伯拉河與底格里斯一同把伊甸敘事連到古代文明搖籃，也使創世記第2章的園子祝福與後來亞伯拉罕之約地界產生遠程互文。
- title: 創造（從無到有）
  path: link_folder/神學/創造（從無到有）.md
  summary: 第2章1-3節宣告天地萬物與萬象都完成，神歇了創造之工；4節以「來歷」引入創造敘事的新焦點，補述人與園子的細節。
  relation: 本章不是另起一個衝突的創造故事，而是從人、土地、園子、命令與婚姻角度回看創造，將第1章的宇宙性創造收束到神與人的關係。
- title: 安息
  path: link_folder/神學/安息.md
  summary: 神在第七日歇了祂創造的工，這安息不是疲倦，而是工作完成、目標達成；來源並連到基督成就救贖後給信徒的真正安息。
  relation: 第2章把安息置於人被造後的開端：人尚未工作便先面對神完成的工作；這成為安息日、福音安息與希伯來書4章安息主題的根基。
- title: 安息日
  path: link_folder/神學/安息日.md
  summary: 神賜福給第七日並定為聖日，因祂在這日歇了創造之工；GT 指出七日循環不同於古代近東依月相的不吉日，後來才在以色列律法中制度化。
  relation: 本章提供安息日神學的創造根基：第七日被祝福與分別為聖，不只是停止活動，也是承認神工作完成、讓人進入神安息的記號。
- title: 有靈的活人
  path: link_folder/神學/有靈的活人.md
  summary: 神用地上塵土造人，將生命氣息吹入鼻孔，人就成了活的魂；來源強調人兼具塵土的有限與神吹氣所賦予的尊貴。
  relation: 本章將人的生命追溯到神親自賜氣，說明人超越動物的關鍵不在材料，而在神使人能回應祂、事奉祂、與祂相交。
- title: 人的尊嚴與神的形像
  path: link_folder/神學/人的尊嚴與神的形像.md
  summary: 第2章從細節展示人的尊嚴：神親自塑造、吹入生命氣息、安置在園中、託付工作與命名權，並為他預備同等相配的女人。
  relation: 第1章明說人按神形像受造，第2章則以敘事方式呈現其含義：人有靈、有責任、有關係，也有在神權柄下治理受造物的使命。
- title: 生命樹
  path: link_folder/神學/生命樹.md
  summary: 生命樹在園中出現，與分別善惡樹形成對照；CT 將生命樹解為神自己，KC 強調人沒有獨立生命，必須倚靠生命樹，BH 連到永生與啟示錄恢復。
  relation: 第2章把生命樹放在人受命不可吃另一棵樹之前，顯出神先有豐富供應，再有界線與試驗；生命樹成為選擇神、倚靠神的象徵。
- title: 分別善惡的樹
  path: link_folder/神學/分別善惡的樹.md
  summary: 分別善惡樹是園中被禁止的樹；來源指出它象徵人不倚靠神、要自取判斷善惡的權柄，也成為順服與信靠的試驗。
  relation: 本章在墮落發生前先設立界線，使第3章的犯罪不只是吃果子，而是對神命令、神智慧與生命供應的背叛。
- title: 神的命令與自由意志
  path: link_folder/主題/神的命令與自由意志.md
  summary: 神先允許人自由吃園中各樣樹的果子，再禁止分別善惡樹；來源指出命令不是剝奪供應，而是在豐盛中設立順服界線。
  relation: 第2章16-17節顯出人的自由是在神主權與話語之下運作；人被賦予真實選擇，也被清楚告知背叛的後果是死。
- title: 死的三層
  path: link_folder/神學/死的三層.md
  summary: 神警告「吃的日子必定死」；CT 整理為靈性之死、肉身之死與第二次的死，GT/BH 補充亞當犯罪當日即進入靈死與死亡權勢，肉身死亡則延後顯明。
  relation: 第2章在罪尚未發生前先宣告死亡的嚴重性；這成為第3章墮落、第5章「就死了」與整個救贖敘事的神學前提。
- title: 配偶與婚姻
  path: link_folder/神學/配偶與婚姻.md
  summary: 神說人獨居不好，為他造相配的幫助者；亞當在動物中找不到配偶，神便由其肋骨建造女人，並帶她到他面前。
  relation: 本章是婚姻制度的原初敘事：婚姻由神設立，男女同等相配，彼此連合成為一體；新約也以此為婚姻不可分開與基督教會奧祕的基礎。
- title: 婚姻的盟約與次序
  path: link_folder/神學/婚姻的盟約與次序.md
  summary: 第2章24節定下離開父母、與妻子連合、二人成為一體的原則；來源指出這是神所設立的一夫一妻、永久、排他的婚姻秩序。
  relation: 本章提供後續創世記中多妻、家庭競爭與婚姻破裂案例的評判基準；耶穌在馬太福音19章也回到這裡說明神原初的婚姻心意。
- title: 基督之新婦（豫表）
  path: link_folder/主題/基督之新婦（豫表）.md
  summary: CT/KC/BH 都將亞當沉睡、肋骨造女人、女人被帶到男人面前，整理為基督受死、復活生命建造教會、教會歸給基督的豫表。
  relation: 第2章的婚姻不只是人倫制度，也成為以弗所書5章解釋基督與教會關係的原初圖像；亞當與夏娃的一體預示基督與教會的聯合。
- title: 赤身露體不羞恥
  path: link_folder/主題/赤身露體不羞恥.md
  summary: 本章末節記載夫妻二人赤身露體並不羞恥；來源將其理解為墮落前的純潔、透明、信任與沒有罪咎遮隔的關係。
  relation: 這一狀態與第3章犯罪後羞恥、遮蓋形成強烈對照，也顯明原初婚姻與人神關係中的坦誠和無阻隔。
- title: 修理與看守
  path: link_folder/原文/修理與看守.md
  summary: 人被安置在伊甸園，使他修理看守；CT 解釋「修理」有工作、耕種、服事之意，「看守」有守護、謹慎、防備之意，KC/BH 則重在管理與保護。
  relation: 第2章15節把治理使命具體化為工作與守護，說明樂園中的工作不是咒詛，而是人在神面前承擔受託管家的使命。
- title: 神命名與主權
  path: link_folder/文化/神命名與主權.md
  summary: 第2章19-20節記載亞當為牲畜、飛鳥、走獸命名；來源指出命名在古代語境中表明辨識、權柄與受託管理。
  relation: 第1章是神命名顯明創造主權，第2章則是人命名顯明受託治理；人的命名權不是獨立主權，而是在神把活物帶到人面前時被授予的責任。
- title: 骨中的骨，肉中的肉
  path: link_folder/原文/骨中的骨，肉中的肉.md
  summary: 亞當見女人後稱她為「骨中的骨，肉中的肉」，來源指出這是喜樂的承認，也表明女人與男人同源、同質、親密相屬。
  relation: 本章此句成為婚姻一體的詩性宣告，既支撐男女平等相配，也被 CT 連到教會出於基督復活生命、與基督同生命同性質的豫表。
