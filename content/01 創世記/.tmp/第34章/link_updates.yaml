- title: 西緬
  path: link_folder/人物/西緬.md
  summary: '創世記第34章中，西緬作為底拿同母哥哥（利亞所生），與利未合謀報復：以割禮為詭計條件（13-17節），趁示劍城男丁受割禮第三天疼痛時（25節），二人「各拿刀劍」殺盡全城男丁（25-26節），並參與擄掠財物婦孺（27-29節）。面對父親責備，西緬與利未同聲辯稱：「他豈可待我們妹子如同妓女嗎」（31節）。CT指出西緬利未行動包含「背信毀約、以惡報惡」，KC引用創49:5-7雅各臨終咒詛二人「怒氣暴烈、殘忍殘害」。'
  relation: '本章為西緬生平關鍵轉折：從維護妹妹名譽的義憤，淪為殘暴報復的主謀，導致後裔被分散（創49:7）。展示「人的怒氣不成就神的義」（雅1:20）與以暴制暴的屬靈失敗。'
