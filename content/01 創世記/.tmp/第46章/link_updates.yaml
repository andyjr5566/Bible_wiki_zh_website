book: 創世記
chapter: 46
updates:
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 雅各在別是巴獻祭，蒙神准許並應許同下埃及；他帶全家遷徙，在歌珊與約瑟重逢。
  relation: 神的話解除雅各對離開應許地的疑慮，並把個人遷徙連到成為大族的應許。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: 約瑟親自套車到歌珊迎接父親，抱著父親哭泣良久；他又指導家人如何向法老陳明畜牧職業。
  relation: 約瑟在高位仍親自尊榮父親，並運用宮廷經驗為全家爭取合適居地。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 猶大（雅各之子）
  path: link_folder/人物/猶大（雅各之子）.md
  summary: 雅各差猶大先去見約瑟，安排前往歌珊的路。
  relation: 猶大在先前保護便雅憫後取得父親信任，開始承擔家族代表與領路角色。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 法老
  path: link_folder/人物/法老.md
  summary: 法老先前提供的車輛載雅各和婦孺下埃及；約瑟準備向法老報告全家到來及其畜牧職業。
  relation: 王室資源使遷徙可行，而最終居地仍須由法老正式核准。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 別是巴
  path: link_folder/地點/別是巴.md
  summary: 雅各在離開迦南前來到別是巴，向以撒的神獻祭，並在夜間領受神准許下埃及的異象。
  relation: 別是巴位於迦南南部邊界，是族長敬拜神與遷徙決策的重要停靠點。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 神應許與雅各同下埃及，使他在那裡成為大族；雅各全家七十人到埃及，準備定居歌珊。
  relation: 埃及是立約家族暫居、繁衍並等候日後被帶回應許地的地方。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 雅各全家帶著在迦南所得的牲畜貨財離開；神應許日後必帶他上來。
  relation: 暫離迦南沒有取消土地應許，雅各歸葬與後裔出埃及將延續回歸線索。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 神的護理
  path: link_folder/神學/神的護理.md
  summary: 神親自准許雅各下埃及，應許同行、使他成為大族並帶他上來；約瑟則在歌珊接應並安排全家居住。
  relation: 本章把家庭團聚、饑荒遷徙與立約應許納入同一條護理線。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
- title: 埃及車輛與遷徙
  path: link_folder/文化/埃及車輛與遷徙.md
  summary: 以色列眾子使用法老送來的車輛，載年老的雅各、妻子與兒女從別是巴前往埃及。
  relation: 車輛由相認的證據轉為實際完成全家長途遷徙的工具。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_46.txt, raw_data/ccbiblestudy_GT_genesis_46.txt, raw_data/kingcomments_genesis_46.txt, raw_data/biblehub_study_genesis_46.txt]
