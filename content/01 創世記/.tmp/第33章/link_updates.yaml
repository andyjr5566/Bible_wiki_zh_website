updates:
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: "雅各從毗努伊勒出發，見以掃帶四百人來，將家人分三組（兩使女在前、利亞居中、拉結約瑟在後）自保；自己走在最前、一連七次俯伏至地求和；見以掃跑來擁抱親嘴雙雙流淚；稱以掃「我主」、自稱「僕人」，堅持以掃收下禮物（視為歸還當年騙得的福分），說「見你的面如見神的面」；拒絕以掃同行、也拒留人保護，謊稱往西珥實往疏割；在疏割蓋房搭棚，後渡河至示劍買地、築壇稱「伊利伊羅伊以色列」。"
  relation: "本章為雅各與以掃恩怨二十年的高潮與和好，亦是雅各生命從「詭詐者」轉向「以色列」的關鍵見證，但行動仍顯軟弱（謊稱往西珥、未上伯特利），導致後來底拿事件。"
  sources:
  - CT
  - GT
  - KC
  - BH
  source_files:
