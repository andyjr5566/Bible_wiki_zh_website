book: 創世記
chapter: 50
updates:
- {title: 約瑟, path: link_folder/人物/約瑟.md, summary: 約瑟為父哀哭並依誓歸葬麥比拉；他拒絕向兄弟報復、承諾養活全家，臨終吩咐後裔將骸骨帶回應許地。, relation: 約瑟以神把惡意轉為保全生命的護理解讀一生，最後把盼望放在神必看顧並領民出埃及。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 雅各, path: link_folder/人物/雅各.md, summary: 雅各遺體經四十日薰屍、全埃及七十日哀悼，由王室與全家盛大送葬，最後依遺命葬入麥比拉洞。, relation: 歸葬迦南完成神在別是巴應許帶他上來的個人層面，也見證他至死持守土地應許。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 法老, path: link_folder/人物/法老.md, summary: 法老准許約瑟按誓言離開埃及歸葬父親，王室臣僕與埃及長老亦參與送葬。, relation: 王室批准和陪同使雅各葬禮兼具家族與埃及國家層面的尊榮。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 以法蓮, path: link_folder/人物/以法蓮.md, summary: 約瑟活到看見以法蓮第三代的子孫。, relation: 以法蓮多代後裔在約瑟生前出現，延續雅各對其生養眾多的祝福。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 瑪拿西, path: link_folder/人物/瑪拿西.md, summary: 瑪拿西的孫子瑪吉之子被養在約瑟膝上，表示約瑟接納並照顧這些後代。, relation: 瑪拿西家也在約瑟生前延續多代，實現支派昌大的祝福。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 埃及, path: link_folder/地點/埃及.md, summary: 埃及為雅各舉行七十日哀悼並派出盛大送葬隊伍；約瑟死後被薰屍，棺木暫停在埃及。, relation: 創世記結束時以色列家仍居埃及，但約瑟棺木成為日後離開此地的盼望記號。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 迦南地, path: link_folder/地點/迦南地.md, summary: 雅各遺體依誓送回迦南安葬；約瑟也相信神必領後裔回到向亞伯拉罕、以撒、雅各起誓之地。, relation: 迦南在全書結尾仍是立約家族最終歸回與安葬的應許地。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 歌珊地, path: link_folder/地點/歌珊地.md, summary: 雅各送葬時，婦人、孩子與牲畜留在歌珊，送葬者完成安葬後返回埃及。, relation: 留守群體顯示此次前往迦南只是歸葬，不是全家出埃及。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 麥比拉洞, path: link_folder/地點/麥比拉洞.md, summary: 雅各眾子把父親葬在幔利前麥比拉田間洞中，即亞伯拉罕向以弗崙購得的家族墳地。, relation: 雅各歸葬使族長家族再次以實際行動確認這塊迦南產業。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 神的護理, path: link_folder/神學/神的護理.md, summary: 約瑟宣告神把兄弟要害他的惡意轉為保全許多人性命，並相信神日後必看顧以色列人、領他們離開埃及。, relation: 本章總結約瑟故事中的護理：神不稱惡為善，卻能使惡行最終服務於保存生命和實現應許。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 神的主權與人的責任, path: link_folder/神學/神的主權與人的責任.md, summary: 約瑟同時說兄弟的意思是害他、神的意思原是好的，將人的惡意與神保全生命的旨意並列。, relation: 同一事件可包含人應負責的惡與神主權導向的善，神的旨意不替行惡者取消責任。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 饒恕與和好, path: link_folder/神學/饒恕與和好.md, summary: 兄弟在父親死後仍怕報復，約瑟卻拒絕代替神施行報應，再次承諾養活並以親愛的話安慰他們。, relation: 約瑟的饒恕不只是不追究過去，也包含持續供應曾傷害他的兄弟及其家庭。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
- {title: 約瑟骸骨葬於示劍, path: link_folder/歷史/約瑟骸骨葬於示劍.md, summary: 約瑟臨終要求以色列子孫起誓，神看顧並領他們離開埃及時要攜帶他的骸骨。, relation: 遺命後由摩西在出埃及時履行，骸骨最終葬於示劍，連結創世記、出埃及記與約書亞記。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_50.txt, raw_data/ccbiblestudy_GT_genesis_50.txt, raw_data/kingcomments_genesis_50.txt, raw_data/biblehub_study_genesis_50.txt]}
