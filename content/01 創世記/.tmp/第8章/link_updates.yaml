book: 創世記
chapter: 8
updates:
- title: 亞拉臘山
  path: link_folder/地點/亞拉臘山.md
  summary: 洪水開始後第七月十七日，方舟停在亞拉臘山地；經文指一片山區，不必限定為今日單一山峰。
  relation: 亞拉臘山地是洪水退落過程中方舟首次停靠之處，標誌挪亞一家由審判轉向新開始。
- title: 神的記念
  path: link_folder/神學/神的記念.md
  summary: 神記念挪亞及方舟中的活物，使風吹地，水勢逐漸退去。
  relation: 「記念」不是先前遺忘，而是神按所立關係採取拯救行動，使審判走向終止。
- title: 三一神同工
  path: link_folder/神學/三一神同工.md
  summary: 神使風吹地、止住水源並帶挪亞進入新造；來源以神、風與方舟救恩整理神工作的不同層面。
  relation: 本章的靈意整理將父的記念、靈的運行與基督所預表的方舟連於同一救恩進程。
- title: 審判已過
  path: link_folder/神學/審判已過.md
  summary: 大淵泉源與天上窗戶閉塞，雨止住，水退落，山頂顯露，洪水審判進入終止。
  relation: 第8章以連續時間標記顯明審判不是失控災變，而由神掌管開始與結束。
- title: 信心與忍耐
  path: link_folder/神學/信心與忍耐.md
  summary: 挪亞在方舟停住後仍等候，先後放出烏鴉與鴿子，直到神親自吩咐才出方舟。
  relation: 本章顯示信心不自行搶先，而在已有跡象時仍忍耐等候神清楚的時機。
- title: 潔淨與不潔淨
  path: link_folder/神學/潔淨與不潔淨.md
  summary: 烏鴉飛來飛去，鴿子因找不到落腳處返回；挪亞出方舟後從潔淨牲畜與飛鳥中取祭物。
  relation: 本章把洪水前的分類延伸到獻祭，顯出潔淨牲畜較多數量與敬拜用途的關聯。
- title: 新造與新生活
  path: link_folder/神學/新造與新生活.md
  summary: 神命挪亞一家和各類活物出方舟，在地上多多滋生、大大興旺。
  relation: 洪水退去後的命令呼應創造之初的生養使命，表明受審判的世界進入重新開始。
- title: 馨香之氣
  path: link_folder/神學/馨香之氣.md
  summary: 挪亞築壇獻潔淨牲畜與飛鳥為燔祭，耶和華聞其馨香之氣。
  relation: 馨香表達祭物蒙神悅納；來源並將其連於基督完全奉獻所成就的蒙悅納根基。
- title: 神的恩典之約
  path: link_folder/神學/神的恩典之約.md
  summary: 神因人的心從小懷惡，仍應許不再因人的緣故咒詛地，也不再照此次洪水滅盡活物。
  relation: 本章的應許不是建立在人性已改善，而建立在神恩典與蒙悅納祭物之上。
- title: 無條件之約
  path: link_folder/神學/無條件之約.md
  summary: 地還存留時，稼穡、寒暑、冬夏、晝夜就永不停息。
  relation: 此應許由神單方面宣告，維持受造秩序，並在第9章挪亞之約中進一步明確化。
- title: 方舟的豫表
  path: link_folder/神學/方舟的豫表.md
  summary: 方舟經過洪水後停在亞拉臘山地，所保存的人與活物最終按神命令出來。
  relation: 第8章使方舟預表從審判中的遮蔽推進到經過審判、進入新生活的救恩圖像。
- title: 橄欖葉子
  path: link_folder/主題/橄欖葉子.md
  summary: 鴿子第二次被放出，晚上叼著新擰下的橄欖葉返回，挪亞便知道地上水退了。
  relation: 橄欖葉成為生命恢復與平安將臨的可見記號，但挪亞仍繼續等候。
- title: 乾的兩個希伯來字
  path: link_folder/原文/乾的兩個希伯來字.md
  summary: 第13節地面「乾了」偏重水已消退，第14節地「都乾了」則指土地乾燥到可以居住行走。
  relation: 兩個詞的差別解釋挪亞看見地面無水後仍等待近兩個月才奉命出方舟。
- title: 風與靈同字
  path: link_folder/原文/風與靈同字.md
  summary: 神叫風吹地使水勢退去；希伯來文 ruach 可表示風、氣息或靈。
  relation: 此用語呼應創世記1章神的靈運行在水面上，使洪水後恢復秩序帶有新創造色彩。
- title: 基督復活預表
  path: link_folder/互文/基督復活預表.md
  summary: 方舟停在山上的日期被來源連於逾越節後的復活日期，作為經過審判而進入新生命的預表。
  relation: 此為基督教預表式閱讀，重點在方舟經過死亡之水後停穩，不等於經文明說日期對照。
- title: 創一章與創八章的對照
  path: link_folder/互文/創一章與創八章的對照.md
  summary: 神使風吹水退、旱地再現、活物出來繁衍，與創世記1章水中顯出旱地及生物繁殖相呼應。
  relation: 平行結構把洪水後世界描繪為新創造，同時保留人心仍然懷惡的張力。
- title: 古代近東洪水故事中的放鳥情節
  path: link_folder/背景/古代近東洪水故事中的放鳥情節.md
  summary: 古代近東若干洪水傳說也記放鳥探查水退，創世記則以烏鴉、三次放鴿及神命令構成獨特敘事。
  relation: 比較材料顯示共同古代背景，但創世記把焦點放在神的記念、挪亞的等候與盟約秩序。
- title: 神是否暫時忘記了挪亞
  path: link_folder/解經爭議/神是否暫時忘記了挪亞.md
  summary: 「神記念挪亞」不表示神曾失憶，而是盟約語言，表示神開始按承諾介入並施行拯救。
  relation: 本章由神記念轉入水退，說明這句話描述行動的轉折，不是神知識狀態的改變。
- title: 神是否改變心意
  path: link_folder/解經爭議/神是否改變心意.md
  summary: 神先因罪審判世界，後應許不再以同樣方式滅盡活物；兩者都正視人心從小懷惡。
  relation: 改變的是神在救贖歷史中的處置階段，不是祂的聖潔、全知或道德旨意反覆不定。
- title: 挪亞之約
  path: link_folder/神學/挪亞之約.md
  summary: 耶和華悅納挪亞的祭，宣告不再照洪水所行的滅各種活物，並保存稼穡、寒暑、冬夏與晝夜的循環。
  relation: 第8章先記神在心裡所作的世界保存應許，第9章才向挪亞、其後裔與一切活物正式宣告約並賜下虹的記號。
- title: 人的全面敗壞
  path: link_folder/神學/人的全面敗壞.md
  summary: 洪水過後，神仍指出「人從小時心裡懷著惡念」，顯示外在審判沒有根除人內在的罪性。
  relation: 第6章以人心終日盡惡說明審判原因；第8章在相同人性現實下轉而顯明神因蒙悅納之祭施憐憫、保存世界。
- title: 祭壇敬拜
  path: link_folder/神學/祭壇敬拜.md
  summary: 挪亞踏上洪水後土地所作的第一件事，是為耶和華築壇並獻上潔淨牲畜與飛鳥。
  relation: 第8章首次明用「壇」一詞，把蒙拯救後的新生活首先連於敬拜與獻上，而非只關注方舟這項拯救工具。
- title: 洪水與洗禮的豫表
  path: link_folder/互文/洪水與洗禮的豫表.md
  summary: 洪水退去後，挪亞一家按神命令離開方舟，進入重新顯露的土地，開始繁衍的新生活。
  relation: 彼前3:20-21把一家八口藉水得救連於洗禮；CT與KC據此把出方舟解作與基督同死同復活、行在生命新樣中。
- title: 洪水全程時間軸
  path: link_folder/背景/洪水全程時間軸.md
  summary: 本章依次記七月十七日方舟停靠、十月初一山頂顯露、其後放鳥、次年正月初一地面無積水及二月二十七日地全乾。
  relation: GT第7章拾穗列371日總數，第8章所收另一研讀本列在方舟377天；差別涉及是否包括洪水前七天及首尾計日，兩者都是重建值。
- title: 四十天降雨與一百五十天水勢
  path: link_folder/解經爭議/四十天降雨與一百五十天水勢.md
  summary: 水從地上逐漸退去，到一百五十天末了水勢減弱，方舟於七月十七日停在亞拉臘山區。
  relation: 第8章承接7:24的一百五十天，確認它是水勢浩大的整段時期；四十天只指最初大雨持續的時間。
