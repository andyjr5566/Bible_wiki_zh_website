- title: 約但河
  path: link_folder/地點/約但河.md
  summary: "雅各從雅博河北（約但河東岸）渡過約但河，來到迦南地西岸的示劍（18節）。渡河標誌從寄居地進入應許之地核心區。"
  relation: "本章記載雅各生平第二次過約但河（首次創32:10「只拿杖過約但河」），此次帶著兩隊人馬、大群牲畜、完整家庭回歸。"
