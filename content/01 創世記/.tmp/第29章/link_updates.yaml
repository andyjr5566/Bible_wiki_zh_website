- title: 拉班
  path: link_folder/人物/拉班.md
  summary: 拉班接待雅各，提出工價問題，後以利亞代替拉結欺哄雅各，再要求雅各為拉結服事七年。
  relation: 本章把拉班描繪為精於算計、利用親屬與女兒婚姻牟利的人，也成為神管教雅各的工具。
