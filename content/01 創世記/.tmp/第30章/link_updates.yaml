book: 創世記
chapter: 30
updates:
- title: 拉結
  path: link_folder/人物/拉結.md
  summary: 雅各最愛的妻子，因不育而嫉妒姊姊利亞，以使女辟拉為妾求生子。後神顧念應允，生約瑟。
  relation: 本章為拉結從自卑到蒙神應允的關鍵轉折；生子約瑟後雅各決定回迦南。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 利亞
  path: link_folder/人物/利亞.md
  summary: 雅各的失寵妻子，在生子競爭中以使女悉帕生子。本章生以薩迦、西布倫及女兒底拿。
  relation: 利亞透過風茄「雇下」雅各同寢，反映一夫多妻家庭中的競爭與張力。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 本章為雅各在拉班家服役期滿、請求回鄉的轉折點。與拉班議定以有斑點羊為工價，用計使羊群增殖。
  relation: 雅各承認神是賜福源頭（30:30），但手段仍顯狡猾；神透過夢中啟示引導他（31:10-12）。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 辟拉
  path: link_folder/人物/辟拉.md
  summary: 拉結的使女，被給雅各為妾，生子但、拿弗他利。
  relation: 作為代孕工具，孩子算為拉結名下；反映古代近東使女代孕習俗。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 悉帕
  path: link_folder/人物/悉帕.md
  summary: 利亞的使女，被給雅各為妾，生子迦得、亞設。
  relation: 與辟拉平行，反映兩姊妹互相競爭、以代孕手段爭取雅各寵愛。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 拉班
  path: link_folder/人物/拉班.md
  summary: 雅各的岳父，承認耶和華賜福是因雅各的緣故。議定工價時先將有斑點羊挑走，以詭詐對應雅各。
  relation: 拉班雖承認耶和華卻未脫離拜偶像（占卜）；代表利用親情牟利的典型。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 流便
  path: link_folder/人物/流便.md
  summary: 利亞的長子，本章因尋見風茄給母親而引發拉結與利亞的交易。
  relation: 流便此舉引發後續創35:22與辟拉通姦事件，反映教養與家庭混亂的關聯。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 雅各請求返回的「本鄉本土」，即神應許亞伯拉罕的迦南地。
  relation: 雅各此時已不視哈蘭為本鄉，表明對伯特利之約的認同日深。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 哈蘭
  path: link_folder/地點/哈蘭.md
  summary: 雅各逃避以掃時逃往之地，在拉班家居住約二十年。
  relation: 本章雅各正式請求離開哈蘭返回迦南，標誌居留哈蘭階段的結束。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
- title: 巴旦亞蘭
  path: link_folder/地點/巴旦亞蘭.md
  summary: 雅各在亞蘭地居住與服事拉班的地區。
  relation: 雅各在此娶妻生子、累積家業，本章為其在巴旦亞蘭階段的尾聲。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_30.txt, raw_data/ccbiblestudy_GT_genesis_30.txt, raw_data/kingcomments_genesis_30.txt, raw_data/biblehub_study_genesis_30.txt]
