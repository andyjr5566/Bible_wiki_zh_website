book: 創世記
chapter: 43
updates:
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 雅各在饑荒與糧食耗盡的壓力下，同意眾子帶便雅憫下埃及。他預備禮物、雙倍銀子與原先退還的銀子，並求全能的神使眾子蒙憐憫。
  relation: 雅各先盡人所能安排，最後把無法控制的結果交給神；「我若喪了兒子，就喪了吧」表達他接受可能損失的決定。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: 約瑟看見便雅憫同行，命家宰預備筵席；他詢問父親、因見同母弟弟而私下哭泣，並按長幼安排座次，給便雅憫五倍食物。
  relation: 約瑟以款待取代先前的嚴厲，仍透過座次與分量觀察哥哥們的反應；他尚未顯明身分，因試驗仍未完成。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 猶大（雅各之子）
  path: link_folder/人物/猶大（雅各之子）.md
  summary: 猶大說服雅各讓便雅憫同行，並親自為他作保，承諾若不能帶他回來便永遠擔罪。
  relation: 猶大從昔日提議賣約瑟的人，轉變為願對便雅憫安全負責的人；這承諾預備了下一章的代求。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 便雅憫
  path: link_folder/人物/便雅憫.md
  summary: 便雅憫隨兄長下埃及，首次站在約瑟面前。約瑟為他祝福、因見他而哭，並在筵席上給他五倍食物。
  relation: 便雅憫既是約瑟思念的同母弟弟，也是約瑟檢驗哥哥們是否仍因偏愛而嫉妒的關鍵人物。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 西緬
  path: link_folder/人物/西緬.md
  summary: 兄弟們帶便雅憫回到埃及後，約瑟的家宰將先前被扣留的西緬釋放，交還給他們。
  relation: 西緬獲釋表明兄弟們已履行約瑟提出的條件，也使全體兄弟能一同參與接下來的試驗。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 雅各眾子第二次下埃及糴糧，這次帶著便雅憫、禮物與雙倍銀子。他們進入約瑟家中，與約瑟同席宴樂。
  relation: 埃及仍是饑荒中的糧食供應地，也成為約瑟逐步試驗並恢復家族關係的場域。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 迦南地饑荒甚大，雅各一家吃盡從埃及帶來的糧食。雅各選取乳香、蜂蜜、香料、沒藥、榧子和杏仁作為當地禮物。
  relation: 迦南雖缺少主糧，仍有可作禮物的特色土產；饑荒迫使雅各放手讓便雅憫前往埃及。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 神的護理
  path: link_folder/神學/神的護理.md
  summary: 饑荒推動兄弟再下埃及；口袋銀子被家宰稱為神所賜的財寶；西緬獲釋，兄弟則在尚不知約瑟身分時已同他宴樂。
  relation: 本章沒有讓人物立即明白全局，卻讓多個事件共同推進家族保存與復和，呈現護理在人的恐懼之外運作。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 對兄弟的試驗
  path: link_folder/神學/對兄弟的試驗.md
  summary: 約瑟按兄弟長幼安排座次，並給便雅憫比別人多五倍的食物。兄弟們雖詫異，仍與約瑟一同宴樂。
  relation: 資料普遍把五倍分量理解為對嫉妒的試驗；經文未明說約瑟動機，因此應表述為與後續銀杯試驗相連的解經判斷。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 悔改與良心的覺醒
  path: link_folder/神學/悔改與良心的覺醒.md
  summary: 兄弟們因先前退還的銀子而害怕，主動向家宰說明並帶回原款；猶大也開始為便雅憫承擔個人責任。
  relation: 他們尚未直接向約瑟認罪，但對不義所得的敏感與保護弟弟的行動，顯示良心和行為正在改變。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 猶大的認罪與悔改
  path: link_folder/神學/猶大的認罪與悔改.md
  summary: 猶大為便雅憫作保，願在不能把他帶回時永遠擔罪。他考量的不只是糧食，也包括父親、婦人與孩子的存活。
  relation: 猶大以承擔責任回應昔日傷害約瑟、使父親哀痛的過失；本章顯出改變，下一章則以代替便雅憫作奴僕達到高潮。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 全能的神（El Shaddai）
  path: link_folder/神學/全能的神（El Shaddai）.md
  summary: 雅各求全能的神使眾子在埃及官員面前蒙憐憫，使西緬和便雅憫都能回來。
  relation: 此稱號把當前危機連回神對族長的立約顯現；雅各承認自己不能保證旅程結果，只能求神施憐憫。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 約瑟的夢（應驗）
  path: link_folder/神學/約瑟的夢（應驗）.md
  summary: 約瑟的兄弟帶禮物進屋，再次俯伏在地向他下拜；他們回答父親仍活著時又低頭下拜。
  relation: 兄弟反覆下拜延續創世記三十七章夢境的應驗，但此時仍不知道面前的埃及官員就是約瑟。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
- title: 「全能的神」原文
  path: link_folder/原文/「全能的神」原文.md
  summary: 創世記四十三章十四節雅各稱神為 El Shaddai，中文譯作「全能的神」。
  relation: 註釋對 Shaddai 的詞源有不同說明；本章語境的重點是雅各求這位足以施憐憫的神保守眾子。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_43.txt, raw_data/ccbiblestudy_GT_genesis_43.txt, raw_data/kingcomments_genesis_43.txt, raw_data/biblehub_study_genesis_43.txt]
