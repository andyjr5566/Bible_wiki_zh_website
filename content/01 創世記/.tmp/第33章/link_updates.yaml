- title: 拉結
  path: link_folder/人物/拉結.md
  summary: "拉結與約瑟在行列最後（最受保護位置），到以掃面前下拜。其位置確認雅各對拉結的偏愛延續至安排家人見以掃的順序。"
  relation: "本章印證創29:30「雅各也愛拉結，勝過愛利亞」，偏愛在面對潛在威脅時具體化為保護優先權。"
