book: 創世記
chapter: 19
updates:
- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: 亞伯拉罕清早回到先前站在耶和華面前代求之處，看見平原煙氣上騰；神毀滅諸城時記念亞伯拉罕，把羅得從傾覆中送出。
  relation: 第19章明確把羅得獲救與第18章亞伯拉罕的代求相連；全城未獲免災，但羅得在審判中被分別救出。
  sources: &all_sources
  - https://biblehub.com/study/genesis/19.htm
  - https://www.kingcomments.com/en/bible-studies/Gen/19
  - https://www.ccbiblestudy.org/Old%20Testament/01Gen/01CT19.htm
  - https://www.ccbiblestudy.org/Old%20Testament/01Gen/01GT19.htm
  source_files: &all_files
  - raw_data/biblehub_study_genesis_19.txt
  - raw_data/kingcomments_genesis_19.txt
  - raw_data/ccbiblestudy_CT_genesis_19.txt
  - raw_data/ccbiblestudy_GT_genesis_19.txt
- title: 硫磺與火從天上降下
  path: link_folder/神學/硫磺與火從天上降下.md
  summary: 羅得到達瑣珥後，耶和華從天上降硫磺與火，傾覆所多瑪、蛾摩拉、平原諸城、居民與植物。
  relation: 經文把事件定性為神的審判；死海地質引出的地震、瀝青或可燃氣體等說法仍是自然機制假說，不能代替經文明說。
  sources: *all_sources
  source_files: *all_files
- title: 羅得的世俗選擇與後果
  path: link_folder/主題/羅得的世俗選擇與後果.md
  summary: 羅得已坐在所多瑪城門口並有家人在城中；審判前他遲延，由天使因耶和華憐恤而拉出，最終失去城市生活，與兩女住進山洞。
  relation: 本章呈現他早先選擇平原與所多瑪的長期後果；但遲延是因財產、地位或驚惶，經文沒有明說，應保留為可能解釋。
  sources: *all_sources
  source_files: *all_files
- title: 鹽柱
  path: link_folder/主題/鹽柱.md
  summary: 羅得妻子違反不可回頭看的命令，在丈夫後邊回頭後成為鹽柱；路加福音17章以她警告人不可眷戀審判中的舊生活。
  relation: 死海地區存在天然鹽柱，只能提供地理背景；本章沒有說明轉變機制，也不能辨認今日某根鹽柱就是羅得妻子。
  sources: *all_sources
  source_files: *all_files
- title: 戲言
  path: link_folder/主題/戲言.md
  summary: 羅得警告女婿們耶和華將毀滅所多瑪，他們卻以為他說的是戲言，因而沒有隨他離城。
  relation: 經文只記載女婿不相信警告，沒有說原因；把反應完全歸因於羅得平日愛說笑或缺乏見證，是註釋推測。
  sources: *all_sources
  source_files: *all_files
- title: 古代近東接待客旅禮儀
  path: link_folder/背景/古代近東接待客旅禮儀.md
  summary: 羅得邀兩位天使進屋、供水洗腳、住宿與筵席；客人進入屋簷後，主人按古代習俗負有保護責任。
  relation: 待客責任能解釋羅得極力保護訪客，卻不能使他提出交出女兒承受性暴力成為正當。
  sources: *all_sources
  source_files: *all_files
- title: 所多瑪罪惡的呼喊
  path: link_folder/原文/所多瑪罪惡的呼喊.md
  summary: 天使說城內罪惡的聲音在耶和華面前甚大；隨後全城暴民企圖性侵訪客、威脅羅得並強行破門，具體呈現呼喊背後的傷害。
  relation: 第19章使第18章的司法性「呼喊」落到集體暴力事件中，支持其可包含受害者控訴與罪惡要求審判的含義。
  sources: *all_sources
  source_files: *all_files
