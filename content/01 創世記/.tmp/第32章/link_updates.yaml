- title: 耶和華
  path: link_folder/耶和華.md
  summary: '創32章：雅各禱告稱神為「耶和華、我祖亞伯拉罕的神、我父親以撒的神」（v.9），使用耶和華（YHWH）立約之名。雅博渡口摔跤者自稱「神」（v.28），雅各命名毗努伊勒說「我面對面見了神」（v.30），何西阿12:4-5確認對手為「天使」＝「耶和華萬軍之神、耶和華是他的紀念」。神以耶和華之名與雅各立約、改名以色列、賜福、保全性命，彰顯立約信實。'
  relation: '耶和華為神立約之名（出3:14-15），在雅各生命中貫穿始終：創28:13「我是耶和華、你祖亞伯拉罕的神」、創31:3、13「我是伯特利的神」、創32:9禱告呼求耶和華、創32:28-30雅博摔跤毗努伊勒、創35:9-13再次顯現立約。本章將「耶和華」從許願對象（創28:20-21）推進為面對面相遇、改名賜福、保全性命的立約之神。何西阿12:5「耶和華萬軍之神、耶和華是他的紀念」將雅博對手認定為耶和華自我啟示。'
