book: 創世記
chapter: 37
updates:
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: '創世記37章以「雅各住在迦南地」承接以掃離開西珥的分流，並轉入「雅各的記略」即約瑟故事。雅各偏愛約瑟，給他彩衣；後來又差他從希伯崙往示劍探望哥哥們。最後雅各被兒子們以染血彩衣欺騙，以為約瑟被惡獸撕碎，為他悲哀多日、不肯受安慰。'
  relation: '本章顯出雅各家庭中偏愛與欺騙的後果：他曾欺騙父親以撒，如今被兒子們欺騙；同時神仍藉約瑟被賣推進雅各家族下埃及的救贖歷史。'
- title: 以色列
  path: link_folder/原文/以色列.md
  summary: '創世記37章在雅各愛約瑟、差約瑟探望哥哥時使用「以色列」稱呼。來源注意到經文在雅各/以色列之間切換，顯出他既是父親雅各，也是承受神新名與聖約身分的族長。'
  relation: '本章使用「以色列」不是民族總稱，而是雅各新名；在家庭危機中，聖約族長仍帶著舊家庭模式的張力。'
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: '創世記37章正式展開約瑟故事：十七歲與哥哥牧羊，將惡行報給父親；因雅各偏愛與彩衣被恨；兩個夢預告將來被高舉；奉父命尋找哥哥，卻被同謀殺害、剝衣、丟坑、賣給商隊，最後被帶下埃及賣給波提乏。'
  relation: '本章是約瑟從受父愛的兒子進入受苦道路的起點，也為後續在埃及高升、保全雅各家族和夢的應驗鋪路。'
- title: 辟拉
  path: link_folder/人物/辟拉.md
  summary: '創世記37章提到約瑟與父親的妾辟拉、悉帕的兒子們一同牧羊。來源指出辟拉與悉帕之子包括但、拿弗他利、迦得、亞設，可能在家中地位較拉結、利亞之子低。'
  relation: '本章把辟拉放入約瑟早期牧羊與家庭張力的場景；她本人未行動，但她所生支線成為約瑟被哥哥們排斥的背景之一。'
- title: 悉帕
  path: link_folder/人物/悉帕.md
  summary: '創世記37章提到約瑟與辟拉、悉帕的兒子們一同牧羊。來源將悉帕之子與辟拉之子一併列入雅各家複雜的妻妾與子嗣結構。'
  relation: '本章中悉帕作為家族支線背景出現，幫助說明約瑟與不同母系兄弟同處卻關係緊張的家庭環境。'
- title: 流便
  path: link_folder/人物/流便.md
  summary: '創世記37章中，流便聽見弟兄要殺約瑟，提議不可流血、只把他丟在坑裡，原意是稍後救他歸還父親。後來他回到坑邊見約瑟不在，就撕裂衣服，哀歎「童子沒有了」。'
  relation: '本章呈現流便作長子的責任感與軟弱並存：他阻止殺人，卻沒有能力公開制止眾弟兄或真正救回約瑟，也延續他在創35犯罪後長子權威受損的脈絡。'
- title: 猶大（雅各之子）
  path: link_folder/人物/猶大（雅各之子）.md
  summary: '創世記37章中，猶大提議不要殺約瑟，而把他賣給以實瑪利人，理由是約瑟是他們的兄弟、骨肉。來源指出他避免流血，卻以買賣弟弟代替真正保護；也與新約同名的猶大出賣耶穌形成互文。'
  relation: '本章是猶大在約瑟故事中的首次重大行動，顯出其務實與道德妥協；後續創38與創44會繼續呈現猶大的轉變。'
- title: 以實瑪利
  path: link_folder/人物/以實瑪利.md
  summary: '創世記37章記以實瑪利人商隊從基列來，帶著香料、乳香、沒藥下埃及；猶大提議把約瑟賣給他們，約瑟遂被帶往埃及。來源指出以實瑪利人與米甸人同為亞伯拉罕後裔，稱呼在本段中可交替或指同一商隊群體。'
  relation: '本章補足以實瑪利後裔作為商旅民族的角色；他們成為約瑟離開迦南、進入埃及的歷史媒介。'
- title: 米甸
  path: link_folder/人物/米甸.md
  summary: '創世記37章提到米甸商人經過，把約瑟從坑中拉上來並賣給以實瑪利人；36節又說米甸人把約瑟賣到埃及給波提乏。來源指出米甸人與以實瑪利人的稱呼可能因血緣、商隊混合或民族關聯而交替使用。'
  relation: '本章把米甸後裔從家譜人物推進到商旅民族角色，成為約瑟被賣下埃及的轉運者。'
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: '創世記37章開頭說雅各住在迦南地，就是他父親寄居的地。來源把這與以掃住西珥山形成對照：雅各留在應許之地，但仍只是寄居，等候神應許更完全成就。'
  relation: '本章以迦南地作為約瑟故事起點，隨後約瑟被帶下埃及，展開應許家族離開迦南又將歸回的長線敘事。'
- title: 示劍（城）
  path: link_folder/地點/示劍（城）.md
  summary: '創世記37章中，雅各差約瑟往示劍查看哥哥們與群羊是否平安；來源提醒示劍曾是創34衝突之地，雅各可能因附近居民報復風險而關切兒子們是否平安。'
  relation: '本章再次讓示劍成為雅各家庭危機的背景：約瑟未在示劍找到哥哥，轉往多坍後被賣，示劍因此成為危機轉折前的搜尋地點。'
- title: 希伯崙
  path: link_folder/地點/希伯崙.md
  summary: '創世記37章記雅各從希伯崙谷打發約瑟往示劍探望哥哥們。來源指出希伯崙是雅各此時居住地，與示劍、多坍之間形成約瑟被差遣的路線。'
  relation: '本章將希伯崙作為父家與約瑟出發地，連到他被差遣、被棄絕、最終下埃及的道路。'
- title: 基列
  path: link_folder/地點/基列.md
  summary: '創世記37章商隊從基列來，駱駝馱著香料、乳香、沒藥往埃及去。來源指出基列盛產香料與乳香，且位於約但河東與通往埃及商道相關的地帶。'
  relation: '本章使基列成為約瑟被賣敘事中的貿易來源地，說明商隊貨物與路線背景。'
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: '創世記37章中，商隊原本要把香料帶下埃及，約瑟也被賣給以實瑪利人帶到埃及，最後轉賣給法老內臣波提乏。來源指出本章從迦南地開始、以埃及收束，應驗創15關於亞伯拉罕後裔寄居外地的預告。'
  relation: '本章把埃及從饑荒避難地推進為約瑟受苦與高升之地，也為以色列全家日後下埃及和出埃及背景鋪路。'
- title: 嫉妒與爭競
  path: link_folder/神學/嫉妒與爭競.md
  summary: '創世記37章中，哥哥們因父親偏愛、彩衣、約瑟報惡行和兩個夢而越發恨他，甚至同謀殺害並賣掉他。來源將這種嫉妒與該隱、以掃、掃羅、法利賽人等因嫉妒而行惡的模式相連。'
  relation: '本章把創30拉結利亞的嫉妒擴大到下一代兄弟衝突，顯明未處理的家庭偏愛與爭競會發展成暴力、欺騙與長期破裂。'
