- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: |
    本章中亞倫與摩西一同首次見法老，開口傳達神言（v1）。法老斥責摩西和亞倫「為什麼叫百姓曠工」（v4）。亞倫在法老面前默默站立（不像4:30那樣說話行神蹟），可能因法老即刻下令加重苦工而不再有機會展示神蹟。結尾官長埋怨的是摩西和亞倫二人（v20-21），但只有摩西回到神面前（v22）。
  relation: |
    亞倫在本章的角色是摩西的同伴，同受法老藐視和百姓埋怨。他的經驗構成事奉者必經的考驗：與領袖同受苦、同被誤解。KC暗示摩西和亞倫在官長埋怨時「默默轉離」，這是受苦僕人的典型反應——不作辯護，轉向神。
