- title: 悉帕
  path: link_folder/人物/悉帕.md
  summary: "悉帕作為利亞的使女，與孩子們在行列最前面見以掃下拜。反映古代近東使女地位低、在危急時被安排在前的現實。"
  relation: "本章為悉帕在創世記中第二次出現（首見創29:24作利亞使女），見證其從幕後人物被推上前台面對威脅。"
