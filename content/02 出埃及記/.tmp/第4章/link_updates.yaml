- title: 葉忒羅
  path: link_folder/人物/葉忒羅.md
  summary: |
    摩西順從神的差遣後，回到岳父葉忒羅那裡辭行。摩西沒有提神的顯現，只說「求你容我回去見我在埃及的弟兄，看他們還在不在」，葉忒羅回應「你可以平平安安地去吧」。這辭行場景令人聯想雅各離開拉班時的情形。
  relation: |
    葉忒羅在此以岳父身分平靜地同意摩西的旅程，未攔阻也未進一步追問原因。他的「平平安安地去」與摩西沒有透露神的呼召形成含蓄對比。後續在18章葉忒羅成為智慧建言者；本節僅呈現短暫的辭行場景。
  sources:
  - KC_KingComments
  source_files:
  - kingcomments_exodus_4.txt
- title: 西坡拉
  path: link_folder/人物/西坡拉.md
  summary: |
    本章中，西坡拉在摩西危急之際（耶和華欲殺摩西，v24-26）採取果斷行動：拿火石割下兒子的陽皮，丟在摩西腳前，說「你真是我的血郎了」。這一行動挽救了摩西的性命。西坡拉說出「血郎」兩次：v25「你真是我的血郎了」，v26「你因割禮就是血郎了」。
  relation: |
    西坡拉在本章扮演拯救者角色──雖然耶和華要殺的是摩西（作為家主與割禮的主要責任人），但行動的是西坡拉。她的話「血郎」含義有多種解讀：可能指她用割禮之血從死亡「買回」丈夫如同新郎，也可能透露她本人對割禮習俗的不情願或責備。她本是米甸人，本章顯示她與以色列聖約傳統的直接接觸與急迫下的行動力。
  sources:
  - CT_註解
  - GT_拾穗
  - KC_KingComments
