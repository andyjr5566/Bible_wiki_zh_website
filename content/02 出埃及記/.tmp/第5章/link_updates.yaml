- title: 耶和華的話臨到
  path: link_folder/神學/耶和華的話臨到.md
  summary: |
    本章中「耶和華的話」體現在摩西和亞倫對法老的宣告格式：「耶和華以色列的神這樣說」（v1，CT指出這是先知書的標準句式），以及摩西「回到耶和華那裡」（v22）與神對話。本章充滿耶和華名字的密集使用（v1「耶和華以色列的神」、v2法老問「耶和華是誰」、v3「祭祀耶和華我們的神」、v21官長說「願耶和華鑒察你們」、v22摩西「回到耶和華那裡」）。
  relation: |
    本章中耶和華的話首次以先知宣告的形式對法老發出（v1「這樣說」）。法老以「耶和華是誰」否認這話的權柄，全章事件就此展開──耶和華的話不被世界承認、甚至導致百姓受苦更深（v22-23）。但摩西「回到耶和華那裡」表明他仍信這話的源頭，只是在黑暗中尋求理解。CT靈訓：神的工人必須親自從神領受話語，才能為神說話。
