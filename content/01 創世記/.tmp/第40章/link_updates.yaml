book: 創世記
chapter: 40
updates:
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: 在護衛長府內的監獄中，約瑟伺候被囚的酒政和膳長，察覺他們愁悶，宣告「解夢不是出於神嗎？」，為他們解夢。酒政夢預示三天內官復原職，膳長夢預示被處死掛木頭。約瑟求酒政出監後記念自己、在法老面前說情救自己出監，表明自己是從希伯來人之地被拐來、無罪下監。四大來源一致強調：約瑟在冤獄中仍服事人、將榮耀歸神、誠實傳達不利預言、不報復不埋怨。
  relation: 本章是約瑟從「受苦的囚犯」向「被神使用的解夢者」轉折；其解夢成就為創41章見法老、治理埃及鋪路。CT、GT、KC、BH均指出約瑟此時仍存「我」意（14-15節七個「我」），尚未完全學會向己死，故仍須在獄中再等兩年（41:1）。
- title: 法老
  path: link_folder/人物/法老.md
  summary: 本章法老惱怒酒政膳長下監（1-3節），第三天生日設宴大赦，酒政官復原職、膳長被掛木頭（20-22節）。法老的「抬起頭」成語雙關：對酒政指恢復職位，對膳長指斬首。四大來源指出：古埃及法老生日例行大赦囚犯，此為神安排應驗約瑟解夢的時機。法老的絕對權柄（生殺予奪）與神的主權安排形成對比。
  relation: 本章法老雖非直接對話者，但其生日宴會成為約瑟解夢應驗的公開場合，並為創41章法老自做夢、召見約瑟埋下伏筆。KC、BH強調法老權柄下的「生與死」抉擇，預表基督再來審判的雙重結局（得救/滅亡）。
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 本章全程背景為埃及宮廷監獄體系：護衛長府內的監、王的囚犯被囚之處。來源補充：埃及宮廷設酒政、膳長等高官掌管飲食安全（防毒殺），埃及人習慣頭頂搬運物件（膳長頭頂三筐），法老生日設宴大赦為宮廷慣例。古代近東流行「夢經」文獻，埃及有專門解夢術士（41:8），但約瑟不依賴術士經驗，直接求問神。監獄中「掛在木頭上」為極刑，屍體不得入土示眾，符合埃及/古近東習俗（申21:22-23）。
  relation: 本章將埃及從「約瑟受苦之地」（37,39章）推進為「神安排約瑟見法老的舞臺」；宮廷結構、監獄體系、生日習俗、解夢文化，皆為神救贖計畫中的具體鋪墊。CT、KC指出埃及作為世界強國，其宮廷機制成為神保全雅各家族的工具。