- title: 心正手潔
  path: link_folder/主題/心正手潔.md
  summary: 亞比米勒以亞伯拉罕、撒拉共同提供的兄妹說法為根據，申辯自己心正手潔；神承認他此事心中正直，也說是神攔阻他沒有碰撒拉。
  relation: 主觀無知與實際未親近說明他不是明知故犯；知道真相後仍須歸還撒拉，顯示正直意圖不能取代改正錯誤的責任。
  sources: *all_sources
  source_files: *all_files
- title: 遮羞
  path: link_folder/主題/遮羞.md
  summary: 亞比米勒給亞伯拉罕一千銀子，作撒拉在全家與眾人面前的「遮羞／遮眼」，並宣告她沒有不是。
  relation: 贈禮具有公開補償與昭雪功能；原文難句可有數種細節解釋，但不應使人誤以為撒拉已被玷污或本身需要為羞恥行為贖罪。
  sources: *all_sources
  source_files: *all_files
- title: 神在夢中顯現與引導
  path: link_folder/神學/神在夢中顯現與引導.md
  summary: 神夜間在夢中警告外邦王亞比米勒，揭露撒拉是有夫之婦，並命他歸還，否則他和所有的人都必死。
  relation: 本章的夢不是模糊象徵，而是帶有道德資訊、命令與後果的直接警告，也顯示神能向立約家族以外的人說話。
  sources: *all_sources
  source_files: *all_files
- title: 神是生育的源頭
  path: link_folder/神學/神是生育的源頭.md
  summary: 耶和華因撒拉的緣故使亞比米勒家婦人不能生育；亞伯拉罕禱告後，神醫好亞比米勒、妻子和女僕，使她們恢復生育。
  relation: 在撒拉仍等待應許之子出生之際，本章先以另一家庭的不育與醫治，強調生育能力在神掌管之下。
  sources: *all_sources
  source_files: *all_files
- title: 亞伯蘭稱撒萊為妹子的性質
  path: link_folder/解經爭議/亞伯蘭稱撒萊為妹子的性質.md
  summary: 亞伯拉罕承認撒拉確是同父異母的妹子，兩人早已約定在各處以兄妹相稱；但她同時是他的妻子，隱瞞婚姻使亞比米勒受騙。
  relation: 第20章證實第12章說法有血緣基礎，也更清楚顯示部分真話仍可因省略關鍵事實和誤導目的構成欺騙。
  sources: *all_sources
  source_files: *all_files
