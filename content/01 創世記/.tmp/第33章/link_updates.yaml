- title: 雅博
  path: link_folder/原文/雅博.md
  summary: "雅各已過雅博河（創32:22-31），現位於雅博河北岸地區（毗努伊勒至疏割一帶）準備見以掃。雅博摔跤經歷賜給雅各面對以掃的屬靈資本。"
  relation: "本章行動發生在雅博渡口事件之後，地理上位於雅博河北，屬靈上承接雅博「與神摔跤、生命被倒空重塑」的果效。"
