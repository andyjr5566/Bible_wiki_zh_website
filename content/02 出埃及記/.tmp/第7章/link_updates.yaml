book: 出埃及記
chapter: 7
updates:
- title: 摩西
  path: link_folder/人物/摩西.md
  summary: v1神使摩西在法老面前代替神，賜他屬天權柄；v6摩西亞倫完全順服神的吩咐；v7摩西八十歲見法老，一生三個四十年成熟的領袖；v9-12杖變蛇的神蹟印證神的差派；v15-17摩西在尼羅河邊向法老宣告第一災
  relation: 本章摩西身分由「推辭者」轉為「代替神者」——前所未有地擁有神的權柄；與出六12-30的推辭形成對比；v7的八十歲標記其一生三個四十年的成熟期；BH預表基督擁有一切權柄（太二十八18）
- title: 亞倫
  path: link_folder/人物/亞倫.md
  summary: v1亞倫作摩西的先知（代言人）；v10,19-20亞倫舉杖擊打河水行第一災；v12亞倫的杖吞了術士的杖——預表復活主的大能
  relation: v1「你的先知」確立亞倫為摩西發言人的身分；KC指出亞倫的杖後來發芽（民十七8）含復活生命的能力，亞倫預表復活的主——復活後宣告「天上地下所有權柄都賜給我了」（太二十八18）；與出六23亞倫祭司譜系相承
- title: 法老
  path: link_folder/人物/法老.md
  summary: v3-4神預言法老心剛硬不聽、十災即將開始；v11法老召博士術士以邪術對抗；v13,22法老心剛硬正如耶和華所說；v23法老轉身進宮不把這事放在心上
  relation: v3神使法老心剛硬的預言首次實現於本章；GT李道生詳解頭兩次剛硬出於神的預言、其餘是神任憑法老自己先剛硬；v23法老對百姓苦難無動於衷延續五2「耶和華是誰」的傲慢；BH指出法老剛硬是神主權與人責任的交織（羅九17-18）
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: v3-4神將在埃及地多行神蹟奇事；v17-25第一災打擊尼羅河——埃及的生命線與敬拜對象；v19所有江、河、池、塘、木器、石器中的水都變血
  relation: 本章為十災的開端，埃及作為迫害以色列的代表世界遭受神全面審判；偶像遍地的埃及被神「大掃除」（GT啟導本）——尼羅河神Hapi、蛙神、牛羊、太陽神、法老逐一被擊打；BH指出埃及在聖經中常預表世界，從中蒙拯救預表基督的救贖
- title: 尼羅河
  path: link_folder/地點/尼羅河.md
  summary: v15法老清早到尼羅河邊主持祭祀大典；v17-20摩西亞倫舉杖擊打河水變血——第一災的對象；v18河魚必死、河必腥臭；v24埃及人在河兩邊挖地求水
  relation: 尼羅河是埃及生命線與宗教中心；GT舊約背景指出哈皮神（Hapi）是尼羅河氾濫的化身；BH指出法老清早到水邊可能主持迎接氾濫的祭祀；第一災擊打尼羅河直接挑戰埃及信仰體系；古代近東文獻《伊普沃的警告》記載同樣現象
- title: 歌珊地
  path: link_folder/地點/歌珊地.md
  summary: 本章未直接提及歌珊地，但第一災「埃及遍地」的範圍與後續災中神「分別歌珊地」的對比在此埋下伏筆
  relation: v19「埃及遍地」的水都變血；GT命題13指出後續神會分別歌珊地使以色列人免災（八22）；本章第一災尚未分別，顯示神在災中逐步啟示祂的分別原則
- title: 容我的百姓去
  path: link_folder/神學/容我的百姓去.md
  summary: v2神命亞倫對法老說「容以色列人出他的地」；v16重申「容我的百姓去，好在曠野事奉我」
  relation: v16摩西在尼羅河邊向法老宣告「容我的百姓去」——這是神第七次以此命令法老中的第三次；CT指出「我的百姓」強調以色列不屬法老而是神的產業；重申五1-3的要求但語氣更堅定，配合即將降臨的第一災
- title: 以色列人的軍隊
  path: link_folder/神學/以色列人的軍隊.md
  summary: v4神稱以色列民為「我的軍隊以色列民」，預告他們將從埃及地被領出來
  relation: 延續六26「按著軍隊從埃及地領出來」的主題；GT中文聖經註釋指出指以色列人要像軍隊般排列整齊大步踏出埃及；CT延伸應用——新約信徒也是屬神的軍隊，必須從世界出來才能為神爭戰
