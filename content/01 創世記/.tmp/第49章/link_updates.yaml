book: 創世記
chapter: 49
updates:
- {title: 雅各, path: link_folder/人物/雅各.md, summary: 雅各臨終召聚眾子，按各人及其後代支派宣告日後之事，重申歸葬麥比拉後安然離世。, relation: 祝福兼含往事評價、支派命運與應許傳承，是雅各信仰與家族領導的最後行動。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 流便, path: link_folder/人物/流便.md, summary: 流便本有長子尊榮和權力，卻因污穢父床、性情如滾沸之水而不得居首位。, relation: 他的長子領導地位轉離，說明天然次序不能抵消個人行為的後果。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 西緬, path: link_folder/人物/西緬.md, summary: 西緬與利未因示劍事件中的暴怒殘忍受責，後裔被宣告分散在以色列中。, relation: 西緬後來在猶大境內得地，沒有形成獨立連片的大產業。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 利未, path: link_folder/人物/利未.md, summary: 利未與西緬因示劍屠殺被宣告散住以色列地中。, relation: 利未後裔後來蒙召事奉並散居各支派城邑，使分散在新處境中成為教導與祭司服事的安排。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 猶大（雅各之子）, path: link_folder/人物/猶大（雅各之子）.md, summary: 猶大得弟兄讚美、勝敵、獅子威勢與持續王權的祝福，並連到細羅及萬民歸順。, relation: 家族領導與王權歸猶大，後由大衛王朝及彌賽亞盼望進一步發展。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 約瑟, path: link_folder/人物/約瑟.md, summary: 約瑟被比作泉旁多結果子的枝子；雖受弓箭手逼迫，卻因雅各的大能者站立並承受天、地與生育之福。, relation: 祝福總結其受苦、蒙神堅固和藉以法蓮瑪拿西廣得產業的生命軌跡。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 便雅憫, path: link_folder/人物/便雅憫.md, summary: 便雅憫被比作早晚撕掠分物的狼。, relation: 資料通常把此意象連到便雅憫支派後來著名的戰士和強悍爭戰傳統。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 麥比拉洞, path: link_folder/地點/麥比拉洞.md, summary: 雅各臨終指定葬在麥比拉洞，並列出亞伯拉罕撒拉、以撒利百加和利亞已葬於此。, relation: 麥比拉是族長合法購得並實際持有的迦南產業，也是家族墓地和土地應許的記號。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 迦南地, path: link_folder/地點/迦南地.md, summary: 雅各雖死於埃及，仍要求葬在迦南幔利前的麥比拉田間洞中。, relation: 歸葬選擇再次表明埃及是暫居地，迦南才與列祖所得應許相連。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 十二支派起源, path: link_folder/神學/十二支派起源.md, summary: 雅各對眾子的宣告被經文統稱為對以色列十二支派按各人福分所作的祝福。, relation: 個人品格與往事在詩歌中延伸為後代支派的地理、政治、經濟和爭戰特徵。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 全能的神（El Shaddai）, path: link_folder/神學/全能的神（El Shaddai）.md, summary: 雅各在約瑟的祝福中稱神為全能者，祈求祂賜下天、地與生育乳養的福。, relation: 全能者在此是能以全面豐盛成就族長祝福的神。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
- {title: 神的護理, path: link_folder/神學/神的護理.md, summary: 約瑟雖被弓箭手苦害逼迫，弓仍堅硬、手仍健壯，因力量來自雅各的大能者、以色列的牧者與磐石。, relation: 祝福把約瑟在敵意中得保守及結果眾多歸於神持續的扶助。, sources: [CT, GT, KC, BH], source_files: [raw_data/ccbiblestudy_CT_genesis_49.txt, raw_data/ccbiblestudy_GT_genesis_49.txt, raw_data/kingcomments_genesis_49.txt, raw_data/biblehub_study_genesis_49.txt]}
