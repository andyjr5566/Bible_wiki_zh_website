book: 創世記
chapter: 6
updates:
- title: 挪亞
  path: link_folder/人物/挪亞.md
  summary: 挪亞在普世敗壞中蒙耶和華恩典，被稱為義人、完全人並與神同行；神向他宣告洪水，命他造方舟保存家人與各類活物。
  relation: 第6章使挪亞成為審判與救恩敘事的中心；他的義出於信，他在審判來臨前的寬限中照神一切吩咐而行，顯出信心所結的長期順服。經文沒有明說方舟恰好建造一百二十年。
- title: 閃
  path: link_folder/人物/閃.md
  summary: 閃是挪亞三子之一，在洪水前與含、雅弗一同被列名，並將隨父母進入方舟。
  relation: 第6章把閃置於神藉挪亞保存人類的家庭中，為洪水後從閃延續至亞伯拉罕的家譜預作準備。
- title: 含
  path: link_folder/人物/含.md
  summary: 含是挪亞三子之一，與閃、雅弗同屬洪水中蒙保存的家庭。
  relation: 本章只簡要列出含，重點在於神的救恩不僅保守挪亞個人，也把他的兒子及兒婦包括在方舟之約的安排中。
- title: 雅弗
  path: link_folder/人物/雅弗.md
  summary: 雅弗是挪亞三子之一，與閃、含一同被神納入進方舟、保存生命的安排。
  relation: 第6章把雅弗列入洪水後新世界的人類祖先；他與兄弟的出現連接第5章家譜與第10章列國分布。
- title: 偉人
  path: link_folder/人物/偉人.md
  summary: 創世記6章4節稱洪水前有「偉人」（Nephilim）在地上，又提到上古英武有名的人；來源對兩者的關係、偉人是否為巨人，以及是否由神的兒子與人的女子所生，都有不同解釋。
  relation: 本章用偉人與英武有名者描繪洪水前強權與聲名的世界，但沒有給出足以消除爭議的身分說明，因此條目應保留多種來源觀點，不把其中一說寫成經文明言。
- title: 人的全面敗壞
  path: link_folder/神學/人的全面敗壞.md
  summary: 耶和華看見人的罪惡極大，心中一切思想終日盡都是惡；全地在神面前敗壞，凡有血氣者都敗壞了行為。
  relation: 第6章同時描寫內在意念、外在行為與社會強暴，說明罪的敗壞既深且廣，成為洪水審判的直接背景。
- title: 神的後悔與憂傷
  path: link_folder/神學/神的後悔與憂傷.md
  summary: 神因人類罪惡而後悔造人在地上，心中憂傷；「後悔」含嘆息與悲痛之意，不表示全知的神犯了錯誤。
  relation: 本章以擬人化語言顯出神對罪並非冷漠；祂對人的態度因人的敗壞轉為審判，同時仍在挪亞身上施恩。
- title: 恩典的首次出現
  path: link_folder/神學/恩典的首次出現.md
  summary: 「惟有挪亞在耶和華眼前蒙恩」是聖經首次使用「恩」的記載，原文 chen 帶有恩惠、恩寵或喜愛之意。
  relation: 恩典首次明說於普世審判的背景中，表明挪亞得救的根源在神的恩待，而他的義與順服則顯明這恩典在生命中的結果。
- title: 義人與完全人
  path: link_folder/神學/義人與完全人.md
  summary: 挪亞被稱為義人、在當時世代為完全人，並與神同行；「完全」指純全、完整與對神專一，不是宣稱他毫無罪性。
  relation: 第6章把信靠神、對神存完全的心和實際與神同行並列，刻畫敗壞世代中蒙恩者的整全見證。
- title: 方舟的豫表
  path: link_folder/神學/方舟的豫表.md
  summary: 神命挪亞以歌斐木造方舟，設隔間、裡外抹松香並按指定尺寸建造；來源把方舟視為在審判中提供遮蔽與拯救的預表。
  relation: 方舟把神的審判與救恩結合：凡在其中者得保存生命，來源因而將其連於基督的救贖、遮蓋與信徒在基督裡的安全。
- title: 挪亞之約
  path: link_folder/神學/挪亞之約.md
  summary: 神首次明說「我卻要與你立約」，應許挪亞與妻子、兒子和兒婦可進入方舟，各類活物也藉此保存生命。
  relation: 第6章是挪亞之約的宣告階段，重點在審判臨到以前神主動設立拯救安排；約的記號與洪水後應許要到第9章進一步展開。
- title: 強暴
  path: link_folder/主題/強暴.md
  summary: 洪水前的地在神面前敗壞並充滿強暴；來源將其解作無法無天、壓迫與不服神所定秩序。
  relation: 強暴是人的內在邪惡成為社會行動的表現，也是神向挪亞說明要毀滅凡有血氣者的直接理由。
- title: 歌斐木
  path: link_folder/背景/歌斐木.md
  summary: 歌斐木是建造方舟的材料，確切樹種不明，常被理解為富含樹脂、耐水的柏木或絲柏類木材。
  relation: 第6章只在方舟建造命令中使用此詞；其耐久性配合裡外抹松香，使方舟成為能承受洪水的保存生命之器。
- title: 神的兒子們
  path: link_folder/解經爭議/神的兒子們.md
  summary: 創世記6章2至4節記神的兒子們看中人的女子並隨意娶妻；主要解釋包括墮落天使、塞特敬虔後裔與古代君王或權貴。
  relation: 本章的語境把這段婚配與界線混亂、肉體化及洪水前敗壞相連；各說各有語言與上下文理由，不能把單一立場當作經文明說。
