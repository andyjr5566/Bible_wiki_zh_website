- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 雅各到達東方人之地，在井旁遇見拉結，為娶她服事拉班七年；拉班以利亞欺哄他後，他又為拉結再服事七年。
  relation: 本章顯出雅各在神保守下到達母族之地，也開始在拉班手下經歷被欺哄與管教，為其性格受磨練的二十年揭開序幕。
