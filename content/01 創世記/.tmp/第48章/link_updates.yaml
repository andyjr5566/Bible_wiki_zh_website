book: 創世記
chapter: 48
updates:
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 雅各病重時回顧路斯之約，收納約瑟二子，交叉雙手祝福並立以法蓮在瑪拿西以上，重申神必領後裔回歸。
  relation: 雅各臨終以清楚判斷傳遞土地、後裔與支派產業，並稱神為一生牧養和救贖他的神。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: 約瑟帶瑪拿西和以法蓮接受祖父祝福，按長幼安排位置；他試圖更正父親手位，最後領受兩子各成支派及額外一分地。
  relation: 約瑟透過兩個兒子取得雙份產業，但需接受雅各把以法蓮置於瑪拿西以上。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 以法蓮
  path: link_folder/人物/以法蓮.md
  summary: 以法蓮被雅各收納為兒子；雅各有意把右手按在次子以法蓮頭上，預告其後裔比瑪拿西更大。
  relation: 以法蓮後來成為重要支派，其名在先知書中可代表北國以色列。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 瑪拿西
  path: link_folder/人物/瑪拿西.md
  summary: 瑪拿西雖為約瑟長子，雅各卻以左手祝福他；雅各明說他也要成為一族並昌大。
  relation: 瑪拿西仍承受完整支派地位，只是祝福次序與未來規模在以法蓮之下。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 拉結
  path: link_folder/人物/拉結.md
  summary: 雅各在收納約瑟二子時回憶拉結死於通往以法他的迦南路上，並葬在伯利恆附近。
  relation: 拉結的死亡回憶與雅各厚待她的後裔並列，但經文未明說收納只出於紀念拉結。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 路斯
  path: link_folder/地點/路斯.md
  summary: 雅各臨終回顧全能神曾在迦南的路斯向他顯現，應許後裔眾多並賜地為業。
  relation: 路斯即伯特利；該處的立約應許成為他分配支派產業的根據。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 伯利恆
  path: link_folder/地點/伯利恆.md
  summary: 雅各說拉結死在以法他路上並葬在那裡，經文註明以法他就是伯利恆。
  relation: 伯利恆在本章是拉結墓地的地理標記。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 雅各回顧神在迦南應許賜地永遠為業，並相信神必把在埃及的後裔領回列祖之地。
  relation: 迦南應許支配本章的收納、支派產業及額外一分地安排。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 全能的神（El Shaddai）
  path: link_folder/神學/全能的神（El Shaddai）.md
  summary: 雅各稱在路斯向他顯現、賜下生養眾多與土地應許的神為全能的神。
  relation: 此稱號把臨終的產業安排連回神有能力成就的族長之約。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 神的護理
  path: link_folder/神學/神的護理.md
  summary: 雅各承認神使他不只重見約瑟，也看見約瑟兒子；他稱神為一生牧養並救贖自己脫離患難的神。
  relation: 雅各晚年回望全生涯，把長期供應、保護與超出預期的團聚歸於神。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 以法蓮與瑪拿西出生在埃及，卻被雅各收納為以色列支派成員；雅各也相信神必領後裔離開埃及回到列祖之地。
  relation: 出生地不妨礙兩子承受立約產業，埃及仍是暫居而非應許的最終所在地。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_48.txt, raw_data/ccbiblestudy_GT_genesis_48.txt, raw_data/kingcomments_genesis_48.txt, raw_data/biblehub_study_genesis_48.txt]
