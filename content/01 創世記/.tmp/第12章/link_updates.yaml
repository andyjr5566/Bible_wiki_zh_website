book: 創世記
chapter: 12
updates:
- title: 哈蘭
  path: link_folder/地點/哈蘭.md
  summary: 亞伯蘭七十五歲時照耶和華吩咐離開哈蘭，帶著撒萊、羅得及在哈蘭所得財物和人口前往迦南。
  relation: 第12章使哈蘭由他拉一家停居之地變成亞伯蘭信心旅程的出發點，銜接第11章未完成的迦南行程。
  sources: [經文, 創世記第十二章註解, 創世記第十二章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第12章.txt, raw_data/ccbiblestudy_CT_genesis_12.txt, raw_data/ccbiblestudy_GT_genesis_12.txt, raw_data/kingcomments_genesis_12.txt, raw_data/biblehub_study_genesis_12.txt]
- title: 亞伯拉罕之約
  path: link_folder/神學/亞伯拉罕之約.md
  summary: 神應許使亞伯蘭成為大國、賜福、使其名為大、保護他，並使地上萬族因他得福；到迦南後又應許把地賜給其後裔。
  relation: 本章首次集中陳述土地、後裔、名聲、保護與萬族得福等約的核心，後續第13、15、17章再逐步重申和展開。
  sources: [經文, 創世記第十二章註解, 創世記第十二章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第12章.txt, raw_data/ccbiblestudy_CT_genesis_12.txt, raw_data/ccbiblestudy_GT_genesis_12.txt, raw_data/kingcomments_genesis_12.txt, raw_data/biblehub_study_genesis_12.txt]
- title: 信心的本質
  path: link_folder/神學/信心的本質.md
  summary: 神先命令亞伯蘭離開本地、本族、父家並賜下應許；亞伯蘭照著吩咐出發，當時還不知道神要指示的地在哪裡。
  relation: 來11:8把這次出發解作因信順服；本章同時記下饑荒中亞伯蘭以自保方法面對危險，呈現信心與軟弱並存。
  sources: [經文, 創世記第十二章註解, 創世記第十二章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第12章.txt, raw_data/ccbiblestudy_CT_genesis_12.txt, raw_data/ccbiblestudy_GT_genesis_12.txt, raw_data/kingcomments_genesis_12.txt, raw_data/biblehub_study_genesis_12.txt]
- title: 帳棚與祭壇
  path: link_folder/主題/帳棚與祭壇.md
  summary: 亞伯蘭在示劍回應神顯現而築壇，又在伯特利與艾之間支搭帳棚、築壇並求告耶和華的名。
  relation: 帳棚是族長寄居生活的居所，祭壇是回應神顯現的敬拜場所；來11:9-10進一步以寄居生活說明信心與盼望。
  sources: [經文, 創世記第十二章註解, 創世記第十二章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第12章.txt, raw_data/ccbiblestudy_CT_genesis_12.txt, raw_data/ccbiblestudy_GT_genesis_12.txt, raw_data/kingcomments_genesis_12.txt, raw_data/biblehub_study_genesis_12.txt]
- title: 漸漸的墮落
  path: link_folder/主題/漸漸的墮落.md
  summary: 亞伯蘭由伯特利附近漸漸遷往南地，後因嚴重饑荒下埃及，並以撒萊是妹子的說法保全自己。
  relation: 《創世記第十二章註解》把地理移動整理成逐步遠離信靠的靈訓；經文直接記錄的是遷徙、饑荒、自保策略及其後果。
  sources: [經文, 創世記第十二章註解, 創世記第十二章拾穗, Kingcomments, BibleHub Study]
  source_files: [raw_scripture/創世記/第12章.txt, raw_data/ccbiblestudy_CT_genesis_12.txt, raw_data/ccbiblestudy_GT_genesis_12.txt, raw_data/kingcomments_genesis_12.txt, raw_data/biblehub_study_genesis_12.txt]
- title: 亞伯蘭下埃及與出埃及
  path: link_folder/互文/亞伯蘭下埃及與出埃及.md
  summary: 亞伯蘭因饑荒下埃及，撒萊進入法老宮中，神降災於法老全家，最後一家帶著所得財物被送離埃及。
  relation: 本章與後來以色列因饑荒入埃及、神降災及帶財物離開形成敘事平行；這是跨段落互文，不表示每項細節完全對應。
  sources: [經文, 創世記第十二章註解, 創世記第十二章拾穗, Kingcomments, BibleHub Study]
