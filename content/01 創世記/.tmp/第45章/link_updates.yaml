book: 創世記
chapter: 45
updates:
- title: 約瑟
  path: link_folder/人物/約瑟.md
  summary: 約瑟在猶大代求後表明身分，安慰驚惶的兄弟，三次說神差他先到埃及保存生命；他安排全家住歌珊並供應遷徙所需。
  relation: 約瑟不否認兄弟曾賣他，卻從神的護理解讀苦難，因而不報復並主動恢復關係。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: 雅各起初不信約瑟仍活著，心裡冰涼；聽見約瑟的話並看見埃及車輛後心就甦醒，決意在死前去見兒子。
  relation: 雅各由長期喪子之痛轉向盼望，也開始全家遷往埃及、進入應許歷史下一階段。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
- title: 便雅憫
  path: link_folder/人物/便雅憫.md
  summary: 便雅憫親眼見證約瑟表明身分，與約瑟相擁而哭；回程前另得三百銀子和五套衣服。
  relation: 便雅憫既是相認的親近見證人，也再次得到約瑟格外的厚待。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
- title: 法老
  path: link_folder/人物/法老.md
  summary: 法老與臣僕因約瑟兄弟來到而喜歡，正式邀請雅各全家遷入埃及，提供車輛並應許埃及地的美物。
  relation: 法老的命令使約瑟私人提出的家庭遷徙獲得王室批准與資源。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: 約瑟在埃及與兄弟相認，說神使他成為全地的主以保存生命；法老邀請雅各全家遷來並享用全地美物。
  relation: 埃及由約瑟受苦之地轉為立約家族在饑荒中的避難與供養之地。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 約瑟兄弟攜帶車輛和供應回到迦南地，向雅各報告約瑟仍活著並作埃及宰相。
  relation: 迦南仍受饑荒影響，全家即將暫離應許之地前往埃及蒙保全。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
- title: 神的護理
  path: link_folder/神學/神的護理.md
  summary: 約瑟三次說神差他先到埃及，為保存生命、存留餘種並施行大拯救。
  relation: 神沒有認可兄弟賣人的惡行，卻使其結果轉而服務於立約家族和饑荒中眾人的存活。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
- title: 約瑟預表基督
  path: link_folder/神學/約瑟預表基督.md
  summary: 本章資料把約瑟被兄弟棄絕、後在榮耀中向他們顯明並成為拯救者，視為基督受棄而後得榮耀的預表。
  relation: 這是基於整體敘事的類型解讀；本章明說的是神藉約瑟保存雅各家，並未直接指名基督。
  sources: [CT, GT, KC]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt]
- title: 埃及宰相職位（維齊爾）
  path: link_folder/歷史/埃及宰相職位（維齊爾）.md
  summary: 約瑟自稱如法老的父、作法老全家的主和埃及全地的宰相，涵蓋君王顧問、宮廷管理與全國治理三方面。
  relation: 「法老的父」通常被解為位高權重的尊稱或顧問角色，不是親屬稱謂。
  sources: [CT, GT, KC, BH]
  source_files: [raw_data/ccbiblestudy_CT_genesis_45.txt, raw_data/ccbiblestudy_GT_genesis_45.txt, raw_data/kingcomments_genesis_45.txt, raw_data/biblehub_study_genesis_45.txt]
