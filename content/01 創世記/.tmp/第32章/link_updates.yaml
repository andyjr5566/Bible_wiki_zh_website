- title: 亞伯拉罕的神與我同在
  path: link_folder/神學/亞伯拉罕的神與我同在.md
  summary: '創32章：雅各禱告稱神為「耶和華、我祖亞伯拉罕的神、我父親以撒的神」（v.9），見證神跨代的信實同在。v.10「你向僕人所施的一切慈愛誠實、我一點也不配得」承認二十年來神的同在保護（創31:5「我父親的神向來與我同在」）。v.12持定「你曾說我必厚待你」的應許。雅博渡口摔跤、毗努伊勒見神面（v.30「我面對面見了神、性命仍得保全」），將「同在」從隱藏的護衛（瑪哈念天軍）推進到面對面的親密相遇。何西阿12:4-5「他與天使摔跤、哭泣懇求、在伯特利尋見神、耶和華萬軍之神、耶和華是他的紀念」確認同在的深化歷程。'
  relation: '「亞伯拉罕的神與我同在」貫穿雅各一生：創28:15「我與你同在、保守你」、創31:5、42、創32:9-10禱告見證、創32:24-30毗努伊勒面對面、創35:3「那在苦難日應允我、與我同行的神」、創48:15-16「亞伯拉罕以撒所敬畏的神、一生牧養我的神」。本章為同在體驗的高峰：從隱藏護衛→禱告倚靠→摔跤對質→面對面見神→得新名以色列。'
