- title: 以色列
  path: link_folder/原文/以色列.md
  summary: |
    本章中「以色列」一詞頻繁出現，且在兩種脈絡中使用：(1)「以色列的神」（v1）──首次在聖經中使用此全稱（KC）；(2)「以色列人」指百姓，法老稱之為「這地的以色列人」（v5，GT分析原文' am ha'aretz 在此是輕蔑語氣「賤民」）。v16以色列官長自稱「僕人」，顯示這名稱在壓迫中的身份自覺。
  relation: |
    本章中「以色列」的名稱在法老口中帶蔑視（v5），在摩西口中帶尊榮（v1「以色列的神」），在官長口中帶受苦的自稱（v15-16「你的僕人」）。以色列身分的雙重性在此顯露：在神面前是「我的百姓」（v1），在人面前是「賤民」和「僕人」。CT靈訓指出神拯救的主要目的是使以色列成為敬拜事奉真神的子民。
