- title: 以撒
  path: link_folder/人物/以撒.md
  summary: '創32章：雅各禱告稱神為「我父親以撒的神」（v.9），見證代際信仰傳承。雅各向以掃報告「我先前只拿著杖過約旦河」（v.10），呼應以撒當年差遣雅各往巴旦亞蘭娶妻（創28:1-5）、並賜福「願全能的神賜福給你、使你生養眾多」（創28:3）。以撒作為應許之子（創21）、獻祭預表（創22）、雅各父親，其「敬畏神」成為雅各家族獨特守護神稱謂「敬畏以撒的神」（創31:42、53；32:9）的來源。'
  relation: '以撒在雅各一生中為關鍵樞紐：創28:1-5差遣雅各往哈蘭、創28:3-4賜福傳承亞伯拉罕之約、創31:42、53「敬畏以撒的神」為雅各守護、創32:9雅各禱告呼求以撒的神、創35:27-29雅各回來見以撒、創48:15-16「亞伯拉罕以撒所敬畏的神、一生牧養我的神」。本章雅各稱神為「我父親以撒的神」（v.9），將代際立約信仰具體化為面對以掃威脅時的禱告依靠。'
