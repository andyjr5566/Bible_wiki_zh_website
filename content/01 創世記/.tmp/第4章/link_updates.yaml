book: 創世記
chapter: 4
updates:
- title: 亞當
  path: link_folder/人物/亞當.md
  summary: '本章記亞當與夏娃在亞伯被殺後又生塞特；塞特被說成神另立來代替亞伯的兒子。'
  relation: '亞當在本章延續墮落後人類家庭的歷史，也藉塞特出生顯出神沒有讓見證線斷絕。'
- title: 夏娃
  path: link_folder/人物/夏娃.md
  summary: '夏娃生該隱時說耶和華使她得了一個男子；亞伯被殺後，又在塞特命名中承認神另立兒子代替亞伯。'
  relation: '夏娃在本章兩次命名相關敘事中表達對後裔的理解，從該隱的「得著」到塞特的「另立、代替」。'
- title: 該隱
  path: link_folder/人物/該隱.md
  summary: '該隱是亞當夏娃的長子，名字與「得著」相關；他以種地為業，憑己意獻地裡出產，供物不蒙悅納後發怒，拒絕神對罪的提醒，殺害亞伯，受咒詛並離開耶和華的面。'
  relation: '本章以該隱呈現罪從敬拜偏差、嫉妒怒氣到兄弟相殺與離神而居的擴散，也開啟該隱支線的無神文化敘事。'
- title: 亞伯
  path: link_folder/人物/亞伯.md
  summary: '亞伯是該隱的兄弟，名字有氣息、虛空之意；他作牧羊者，將羊群中頭生的和脂油獻上，因信蒙神看中，後被該隱殺害。'
  relation: '亞伯在本章代表因信親近神、蒙神悅納的路線；他的血從地裡哀告，成為無辜義人受害與基督寶血互文的起點。'
- title: 塞特
  path: link_folder/人物/塞特.md
  summary: '塞特是亞當與夏娃在亞伯被殺後所生的兒子，名字帶有設立、代替之意；夏娃說神另立一個兒子代替亞伯。'
  relation: '塞特在本章作為亞伯之後的替代與盼望，與該隱支線形成對比，並引出求告耶和華名的支線。'
- title: 以挪士
  path: link_folder/人物/以挪士.md
  summary: '以挪士是塞特的兒子，名字有軟弱、必死之人的含義；本章在他出生時說人才求告耶和華的名。'
  relation: '以挪士使本章從該隱支線的自恃文化轉向人在軟弱中呼求神，顯出塞特支線的屬靈方向。'
- title: 以諾（該隱之子）
  path: link_folder/人物/以諾（該隱之子）.md
  summary: '以諾是該隱的兒子；該隱建造一座城，按兒子的名將那城叫作以諾。來源指出此名與開始、學習、奉獻等意思相連。'
  relation: '以諾在本章標示該隱離開神面後試圖藉建城與家族延續取得安定與名聲。'
- title: 拉麥
  path: link_folder/人物/拉麥.md
  summary: '拉麥是該隱支線中瑪土撒利的兒子，娶亞大與洗拉兩個妻，並以殺人與七十七倍報復自誇。'
  relation: '拉麥在本章顯示該隱支線敗壞的高峰：婚姻秩序被破壞，暴力被詩歌化並自我神化。'
- title: 伊甸
  path: link_folder/地點/伊甸.md
  summary: '該隱離開耶和華的面，住在伊甸東邊挪得之地；來源指出向東的移動延續離開神同在與祝福的方向。'
  relation: '伊甸在本章不再是人被安置並享受神供應的地方，而成為該隱離開神面後逐步遠離的參照點。'
- title: 挪得
  path: link_folder/地點/挪得.md
  summary: '挪得位於伊甸東邊，名字有流浪、飄蕩、放逐之意，是該隱離開耶和華面後居住之地。'
  relation: '挪得在本章具象化該隱受咒詛後的流離飄蕩，也象徵人離神後仍嘗試定居安頓的矛盾。'
- title: 血祭與素祭
  path: link_folder/主題/血祭與素祭.md
  summary: '該隱帶地裡出產，亞伯獻羊群中頭生的和脂油；來源指出關鍵不只在祭物種類，也在信心、啟示、祭物品質與獻祭者本人。'
  relation: '本章藉兩種供物顯出兩條親近神的路線：憑己意與自義，或因信照神啟示而來。'
- title: 罪伏在門前
  path: link_folder/神學/罪伏在門前.md
  summary: '神警告該隱，若行得不好，罪就伏在門前，戀慕他，他卻要制伏它；來源共同指出罪被人格化為蹲伏、伺機撲來的危險。'
  relation: '本章把罪從創世記3章的入口推進到人的內在與人際關係，顯示神在犯罪前先施警戒。'
- title: 亞伯的血哀告
  path: link_folder/神學/亞伯的血哀告.md
  summary: '亞伯被殺後，他的血有聲音從地裡向神哀告；來源指出無辜之血在神面前作見證，並與希伯來書12章基督的血形成對比。'
  relation: '本章以亞伯之血顯明神聽見被害義人的呼聲，也為後續伸冤與救贖的互文奠基。'
- title: 該隱的記號
  path: link_folder/神學/該隱的記號.md
  summary: '神給該隱立記號，免得人遇見他就殺他；來源指出記號不是鼓勵暴力，而是在審判中限制報復並保護該隱性命。'
  relation: '本章以記號呈現神的審判與憐憫並行：該隱仍受咒詛，卻不被任意血仇吞沒。'
- title: 該隱的後代與無神文化
  path: link_folder/主題/該隱的後代與無神文化.md
  summary: '該隱支線從建城延伸到住帳棚與畜牧、音樂、銅鐵利器，並在拉麥的多妻與暴力歌中顯出文化進步與道德敗壞並存。'
  relation: '本章用該隱後代展示人離開神面後仍能發展文明，但文明無法處理罪、暴力與驕傲。'
- title: 我豈是看守我兄弟的麼
  path: link_folder/主題/我豈是看守我兄弟的麼.md
  summary: '該隱被神詢問亞伯在哪裡時，以「我不知道，我豈是看守我兄弟的嗎」回答；來源指出這包含說謊、冷酷與頂撞神。'
  relation: '本章藉此句揭露罪如何破壞弟兄責任，也把人對神的逃避從亞當夏娃推進到明目張膽的否認。'
- title: 求告耶和華的名
  path: link_folder/主題/求告耶和華的名.md
  summary: '以挪士出生時，經文說人才求告耶和華的名；來源指出這與人認識自身軟弱必死、轉向倚靠神有關。'
  relation: '本章以求告耶和華的名結束，與該隱支線自立名、自保護、自娛樂形成鮮明對照。'
- title: 該隱殺亞伯
  path: link_folder/互文/該隱殺亞伯.md
  summary: '該隱在田間起來打亞伯並殺了他；來源將此事連到約壹3:12、15與加4:29，說明嫉妒、恨弟兄與屬血氣逼迫屬靈。'
  relation: '本章是該互文的原始事件，後續兄弟相爭、義人受逼迫與宗教性暴力都以此為重要原型。'
