- title: 哈抹
  path: link_folder/人物/哈抹.md
  summary: '創世記第34章中，哈抹為示劍父、希未人族長（「那地的主」，2節）。女兒示劍污辱底拿後，哈抹出面與雅各商議（6節），提議「彼此結親、同住、做買賣、置產業」（9-10節），並願付重聘金禮物（11-12節）。哈抹在城門口說服全城男丁受割禮（20-23節），其動機顯見為貪圖雅各財產（「他們的群畜貨財豈不歸我們嗎」，23節）。最終與示劍同被西緬利未殺害（26節）。GT引用華爾頓《背景註釋》指出哈抹意為「驢子」，示劍意為「肩膀」。'
  relation: '本章為哈抹唯一詳細敘事章節，呈現迦南族長為利益犧牲傳統（接受割禮）、利用婚姻同化聖約族群的典型模式，與創33:19雅各向其家族購地形成呼應。'
