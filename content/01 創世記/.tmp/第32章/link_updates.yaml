- title: 拉班
  path: link_folder/人物/拉班.md
  summary: '創32章：雅各向以掃報告「我在拉班那裡寄居、直到如今」（v.4），見證二十年服事拉班經歷。雅各禱告回顧「我先前只拿著我的杖過這約旦河、如今我卻成了兩隊了」（v.10），隱含對比拉班欺哄十次改工價（創31:7、41）、神卻將拉班牲畜奪來賜給雅各（創31:9、16）。拉班作為雅各舅舅、雇主、後成為立約對象（創31:44-54迦累得/米斯巴立約），其欺詐與神保護形成鮮明對比。'
  relation: '拉班贯穿創29-31章：欺騙雅各娶利亞（創29:23-25）、十次改工價（創31:7、41）、追趕雅各七日（創31:23）、神夢中警告不可說好說歹（創31:24）、最終立約分道揚鑣（創31:44-54）。本章雅各歸途見證「只拿杖過河、如今成兩隊」（v.10）即為對拉班欺詐與神信實的最強回應。創31:42「若不是我父親以撒所敬畏的神……你如今必定打發我空手而去」將拉班威脅與神保護對照。'
