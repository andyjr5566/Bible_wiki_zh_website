book: 創世記
chapter: 36
updates:
- title: 以掃
  path: link_folder/人物/以掃.md
  summary: '創世記36章集中記錄以掃的妻子、兒子、族長、遷居西珥山及以東王族；多次重申「以掃就是以東」，顯示他成為以東人的始祖。來源指出以掃離開迦南、住西珥山，與雅各承受應許之地形成分流；以東後來成為以色列的重要對立民族。'
  relation: '本章是以掃譜系與以東民族起源的總整理，承接創25賣長子名分、創27所得祝福與創33回西珥的線索。'
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: '創世記36章中雅各只在以掃遷離時被提及：以掃帶家眷與財物離了兄弟雅各，因二人財物群畜甚多，寄居之地容不下。來源把這段與亞伯拉罕和羅得分離相比，也將其理解為神護理下應許支線與以東支線的分開。'
  relation: '本章不展開雅各行動，卻藉以掃離開迦南凸顯雅各留在應許之地的地位。'
- title: 巴實抹
  path: link_folder/人物/巴實抹.md
  summary: '創世記36章有兩個與「巴實抹」相關的辨識：一是26章赫人以倫之女巴實抹在36章稱為亞大；二是以實瑪利的女兒、尼拜約的妹子在36章稱為巴實抹，28章稱瑪哈拉。來源指出東方婦女婚後或可有新名，且同名不同人需分辨。'
  relation: '本章修正並澄清巴實抹名號的歧義：26章的巴實抹與36章3節的巴實抹不是同一人。'
- title: 以實瑪利
  path: link_folder/人物/以實瑪利.md
  summary: '創世記36章記以掃又娶以實瑪利的女兒、尼拜約的妹子巴實抹。來源指出這使以掃家族與以實瑪利直系連結，但仍不屬承受應許的雅各支線。'
  relation: '本章補足以實瑪利家族與以掃後裔之間的婚姻連結。'
- title: 尼拜約
  path: link_folder/人物/尼拜約.md
  summary: '創世記36章稱巴實抹為以實瑪利的女兒、尼拜約的妹子，與創28章對瑪哈拉的稱呼相互對照。來源以此確認她出自以實瑪利直系家族。'
  relation: '本章再次用「尼拜約的妹子」作為以掃妻子身分的家譜標記。'
- title: 亞瑪力人
  path: link_folder/人物/亞瑪力人.md
  summary: '創世記36章記亭納是以利法的妾，給以利法生亞瑪力；亞瑪力後來成為亞瑪力人的始祖。來源指出亞瑪力人日後成為以色列的大仇敵，出17與申25記其攻擊以色列，並使創14章亞瑪力人的身分問題更需分辨。'
  relation: '本章明確給出以掃後裔亞瑪力的家譜來源，是後續亞瑪力人敵對以色列傳統的重要根據。'
- title: 何利人
  path: link_folder/人物/何利人.md
  summary: '創世記36章列出西珥地原居民何利人西珥的子孫與族長。來源指出何利人原住西珥山，後來被以掃後裔征服、同化；「何利」有洞穴居民之意，並可能與36章2節的希未人稱呼有關。'
  relation: '本章把創14章已出現的何利人放入西珥與以東形成史中，說明以東不是單純血緣譜系，也包含與原住民融合。'
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: '創世記36章記以掃的兒子在迦南地出生，又記以掃帶著在迦南地所得的財物離開雅各、往西珥山去。來源指出這是以掃支線離開應許之地，與雅各留在迦南形成對照。'
  relation: '本章凸顯迦南地作為雅各承受應許之地，而以掃雖在其中得財物，最終遷往西珥。'
