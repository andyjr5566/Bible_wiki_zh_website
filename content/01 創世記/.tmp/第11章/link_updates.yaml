book: 創世記
chapter: 11
updates:
- title: 希伯
  path: link_folder/人物/希伯.md
  summary: 第11章從閃經亞法撒、沙拉、希伯、法勒一路記到他拉與亞伯蘭；希伯在三十四歲生法勒後又活四百三十年。
  relation: 希伯位於通往亞伯蘭的應許家譜中；法勒名字與其在世時地上人口分開相連，來源並把希伯與希伯來名稱及過河客旅的靈訓聯繫。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 他拉
  path: link_folder/人物/他拉.md
  summary: 他拉從七十歲起生亞伯蘭、拿鶴、哈蘭；後帶亞伯蘭、撒萊與羅得離開吾珥往迦南，到了哈蘭便住下，二百零五歲死在那裡。
  relation: 本章把他拉置於巴別列國與亞伯蘭蒙召之間；結合創11:32、12:4與徒7:4，常見解法是他拉約一百三十歲才生亞伯蘭。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 示拿地
  path: link_folder/地點/示拿地.md
  summary: 天下人向東遷移，在示拿地找到平原定居，以燒透的磚和石漆建城造塔。
  relation: 示拿地在本章成為巴別工程的地理舞台；南部美索不達米亞缺石而多黏土、瀝青的背景，解釋其建材選擇。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 巴別
  path: link_folder/地點/巴別.md
  summary: 人在示拿建城造塔傳揚自己的名；耶和華在那裡變亂天下人的言語、使人分散，因此城名叫巴別。
  relation: 巴別同時讓人聯想到巴比倫語「神之門」與希伯來文「變亂」的諧音，人的榮耀之名反成混亂與分散之名。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 吾珥
  path: link_folder/地點/吾珥.md
  summary: 哈蘭死在本地迦勒底的吾珥；他拉後來帶家人從吾珥出發往迦南。
  relation: 吾珥是南部美索不達米亞富裕且敬拜月神的重要城市；離開吾珥使亞伯蘭家族踏上由異教中心前往應許地的旅程。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 哈蘭
  path: link_folder/地點/哈蘭.md
  summary: 他拉一家離開吾珥前往迦南，抵達幼發拉底河上游商道重鎮哈蘭後住下；他拉最終死在哈蘭。
  relation: 哈蘭既是長途遷徙的合理中途站，也是來源靈訓中不完全順服與遲延的象徵；神的呼召在此暫時停頓，下一章再推進。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 巴別塔
  path: link_folder/主題/巴別塔.md
  summary: 人們以磚和石漆在示拿建城造塔，想使塔頂通天、傳揚自己的名並避免分散；神降臨變亂言語，使工程停工。
  relation: 本章使巴別塔成為集體驕傲、自立與抗拒遍滿全地使命的象徵；古代神塔背景說明其建築形態，經文則聚焦動機與神的回應。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 假合一
  path: link_folder/神學/假合一.md
  summary: 巴別眾人有共同語言與集體能力，卻以人的商議、材料和榮耀建造自己的名，拒絕分散全地。
  relation: CT以此區分人工維繫的假合一與聖靈所成就的真合一；問題不是合一自身，而是共同目標與神旨意相抗。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 言語的混亂
  path: link_folder/主題/言語的混亂.md
  summary: 耶和華變亂人共同的口音，使他們彼此不能明白並分散全地，巴別工程因此停止。
  relation: 言語混亂既是對集體驕傲的審判，也限制人無止境合作行惡；來源並由此勸勉教會重視真實溝通而非外表一致。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
- title: 巴別塔與五旬節
  path: link_folder/互文/巴別塔與五旬節.md
  summary: 巴別因言語不通而分散；使徒行傳2章則記不同語言的人各自聽見使徒述說神的大作為，聖靈在多元語言中成就福音見證。
  relation: 兩段形成審判與恩典、人的自高與神所賜能力、被迫分散與奉差普世見證的互文對照；五旬節不是消除語言差異，而是使差異不再阻隔福音。
  sources: [經文, CT, GT, KC, BH]
  source_files: [raw_scripture/創世記/第11章.txt, raw_data/ccbiblestudy_CT_genesis_11.txt, raw_data/ccbiblestudy_GT_genesis_11.txt, raw_data/kingcomments_genesis_11.txt, raw_data/biblehub_study_genesis_11.txt]
