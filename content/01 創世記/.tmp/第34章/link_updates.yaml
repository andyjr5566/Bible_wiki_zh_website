- title: 雅各
  path: link_folder/人物/雅各.md
  summary: '創世記第34章中，雅各得知女兒底拿被污，「閉口不言，等他們回來」（5節），面對哈抹求婚與兒子詭計均保持被動沈默。事後僅責備西緬利未「連累我，使我有了臭名」（30節），顧慮自身安危而非神榮耀。CT評論雅各「畏懼對方權勢」或「重男輕女」，且久居示劍違背伯特利許願（創31:13），導致家庭暴露於迦南文化衝擊。KC指出雅各「連累」一詞反映其以自我為中心，未顧神見證。'
  relation: '本章揭示雅各屬靈領袖缺位：女兒出事不禱告不處理、兒子設詭計不知情、事後只顧性命不顧公義。這是創32章雅博渡口經歷後仍未完全脫離舊性的明證，也成創35章神再命「起上伯特利」的背景。'
