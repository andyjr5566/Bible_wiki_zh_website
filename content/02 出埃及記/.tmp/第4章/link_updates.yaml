- title: 法老
  path: link_folder/人物/法老.md
  summary: |
    神囑咐摩西回到埃及後要在法老面前施行一切奇事（v21），並預告法老的心將剛硬，不容百姓去。神也吩咐摩西向法老宣告：「以色列是我的兒子，我的長子」（v22），若不釋放，神將擊殺埃及的長子（v23）。
  relation: |
    本章法老尚未親身出現，卻已是神計畫的核心對象。神預先告知剛硬的事實，不是剝奪法老的選擇權，而是預示法老自己先硬心之後，神將審判性地加劇其剛硬。摩西首次被委派直接對法老發言，話語以「耶和華這樣說」開頭，先知式宣告從本章開始。
  sources:
  - CT_註解
  - GT_拾穗
  - KC_KingComments
