  - raw_data/kingcomments_genesis_17.txt
  - raw_data/ccbiblestudy_CT_genesis_17.txt
  - raw_data/ccbiblestudy_GT_genesis_17.txt
- title: 迦南地
  path: link_folder/地點/迦南地.md
  summary: 神應許把亞伯拉罕當時寄居的迦南全地賜給他和他的後裔永遠為業，並重申祂要作他們的神。
  relation: 本章把土地應許納入神與亞伯拉罕及其世代後裔所堅立的約，延續創世記第12、13與15章的應許。
  sources:
