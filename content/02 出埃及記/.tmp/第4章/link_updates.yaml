- title: 亞伯拉罕
  path: link_folder/人物/亞伯拉罕.md
  summary: |
    神賜摩西杖變蛇的神蹟，「如此好叫他們信耶和華他們祖宗的神，就是亞伯拉罕的神，以撒的神，雅各的神，是向你顯現了」（v5）。經文三次組合提到列祖（v5, v16在其他章節出現）。
  relation: |
    本章將亞伯拉罕置於「列祖」公式中（v5），用以建立摩西蒙召與神向先祖立約的連續性。三神蹟的目的不單是證明摩西的權柄，更是證明那位曾向亞伯拉罕、以撒、雅各顯現的神，如今一樣向摩西顯現，接續拯救計畫。
  sources:
  - BH_BibleHub Study
  source_files:
  - biblehub_study_exodus_4.txt
- title: 以撒
  path: link_folder/人物/以撒.md
  summary: |
    神賜摩西杖變蛇的神蹟的目的，是叫以色列民「信耶和華他們祖宗的神，就是亞伯拉罕的神，以撒的神，雅各的神，是向你顯現了」（v5）。以撒作為應許之子，代表神對盟約的持續信實。
  relation: |
    以撒在列祖公式中被提及，與亞伯拉罕、雅各共同形成盟約傳承的鏈條，為摩西的差遣提供神學正當性。
  sources:
  - BH_BibleHub Study
  source_files:
  - biblehub_study_exodus_4.txt
- title: 雅各
  path: link_folder/人物/雅各.md
  summary: |
    神賜摩西杖變蛇的神蹟的目的，是叫以色列民「信耶和華他們祖宗的神，就是亞伯拉罕的神，以撒的神，雅各的神，是向你顯現了」（v5）。雅各作為十二支派之父，代表神親自介入人生命的轉化能力。
  relation: |
    雅各在列祖公式中被提及，作為盟約列祖的最後一位，將神對列祖的應許與摩西時代的以色列人緊密聯繫。
  sources:
  - BH_BibleHub Study
  source_files:
  - biblehub_study_exodus_4.txt
- title: 埃及
  path: link_folder/地點/埃及.md
  summary: |
    本章中埃及是摩西返回的目的地。神在米甸吩咐摩西「回埃及去，因為尋索你命的人都死了」（v19）。摩西攜妻兒騎驢返回埃及（v20），並在回到埃及後要將一切奇事行在法老面前（v21）。31節百姓在埃及聽見神眷顧他們，低頭下拜。
  relation: |
    埃及在神學層面是壓迫之地的象徵，但在本章中以地理目的地出現：摩西從米甸返回埃及，踏上執行使命的路程。神宣告「以色列是我的兒子我的長子」，將以色列與埃及對立──法老以為擁有以色列為奴隸，神宣告以色列是祂的兒子。
  sources:
  - CT_註解
  - GT_拾穗
  - KC_KingComments
  - BH_BibleHub Study
  source_files:
  - ccbiblestudy_CT_exodus_4.txt
  - ccbiblestudy_GT_exodus_4.txt
  - kingcomments_exodus_4.txt
  - biblehub_study_exodus_4.txt
- title: 割禮之約
  path: link_folder/神學/割禮之約.md
  summary: |
    本章24-26節是割禮之約在出埃及記中最戲劇化的呈現：耶和華在摩西往埃及的路上「遇見他，想要殺他」，原因是摩西未給兒子行割禮，違背了神與亞伯拉罕所立的割禮之約（創17章）。西坡拉緊急之下拿火石割下兒子的陽皮，耶和華才放了摩西。
  relation: |
    本章表明割禮之約在摩西個人生命中的絕對性：即使是神親選的領袖，若家中未守聖約記號，也在死亡的威脅之下。KC指出神不能容忍祂要使用的人身上有任何不義；領袖必須先管好自己的家。割禮在此不是儀式條規，而是生死攸關的盟約記號。
  sources:
  - CT_註解
  - GT_拾穗
  - KC_KingComments
  - BH_BibleHub Study
  source_files:
  - ccbiblestudy_CT_exodus_4.txt
  - ccbiblestudy_GT_exodus_4.txt
  - kingcomments_exodus_4.txt
  - biblehub_study_exodus_4.txt
- title: 尼羅河
  path: link_folder/地點/尼羅河.md
  summary: |
    本章v9神賜第三個神蹟：從尼羅河取水倒在旱地上，水必變作血。尼羅河被埃及人視為神靈與生命之源，神藉此神蹟宣告對埃及諸神的審判（BH），並預示第一災（GT）。KC指出：若前兩神蹟不被接受，祝福就會變為咒詛（如太陽使蠟融化卻使泥土硬化）。
  relation: |
    本章中尼羅河首次被標記為審判的對象：水變血的神蹟直接挑戰埃及人對尼羅河的宗教依賴。摩西受命從尼羅河取水，宣告神的主權超越埃及的地理與宗教根基。
  sources:
  - CT_註解
